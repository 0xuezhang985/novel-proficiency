// ===== 状态管理 =====
const STATE_KEY = 'novel_reader_state';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STATE_KEY)) || {};
  } catch { return {}; }
}

function saveState(patch) {
  const state = { ...loadState(), ...patch };
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

// ===== 初始化 =====
let currentChapter = 0;
let fontSize = 17;
let theme = 'light';
let barsVisible = true;
let settingsVisible = false;

function init() {
  const state = loadState();
  currentChapter = state.chapter || 0;
  fontSize = state.fontSize || 17;

  // 首次访问跟随系统暗色偏好
  if (!state.theme && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    theme = 'dark';
  } else {
    theme = state.theme || 'light';
  }

  applyTheme(theme);
  applyFontSize(fontSize);
  renderChapterList();
  updateContinueBtn();
}

// ===== 书架 =====
function renderChapterList() {
  const state = loadState();
  const lastRead = state.chapter || 0;
  const container = document.getElementById('chapterListContainer');
  container.innerHTML = chapters.map((ch, i) => `
    <div class="chapter-item" onclick="openChapter(${i})">
      <span class="ch-title">${ch.title}</span>
      ${i === lastRead ? '<span class="ch-read">上次读到</span>' : (i < lastRead ? '<span class="ch-read" style="color:var(--text-secondary)">已读</span>' : '')}
    </div>
  `).join('');
}

function updateContinueBtn() {
  const state = loadState();
  const ch = state.chapter || 0;
  const btn = document.getElementById('continueBtn');
  btn.textContent = ch > 0 ? `继续阅读 · ${chapters[ch].title}` : `开始阅读`;
}

function continueReading() {
  const state = loadState();
  openChapter(state.chapter || 0);
}

// ===== 阅读 =====
function openChapter(index) {
  if (index < 0 || index >= chapters.length) return;
  currentChapter = index;
  saveState({ chapter: index });

  const ch = chapters[index];
  document.getElementById('readerChName').textContent = ch.title;

  // 渲染内容
  const content = document.getElementById('readerContent');
  let html = `<h2>${ch.title}</h2>`;

  const paragraphs = ch.content.split('\n').filter(line => line.trim() !== '');

  let i = 0;
  while (i < paragraphs.length) {
    const trimmed = paragraphs[i].trim();

    // 分隔线
    if (trimmed === '===') {
      html += '<div class="separator">* * *</div>';
    } else if (trimmed === '——') {
      html += '<div class="separator">——</div>';

    // 时间标记 {{TIME: ...}}
    } else if (trimmed.startsWith('{{TIME:') && trimmed.endsWith('}}')) {
      html += `<div class="time-stamp">${escapeHtml(trimmed.slice(7, -2).trim())}</div>`;

    // 升级特效 {{LEVELUP: ...}}
    } else if (trimmed.startsWith('{{LEVELUP:') && trimmed.endsWith('}}')) {
      html += `<div class="levelup">${escapeHtml(trimmed.slice(10, -2).trim())}</div>`;

    // 强调段 {{EM: ...}}
    } else if (trimmed.startsWith('{{EM:') && trimmed.endsWith('}}')) {
      html += `<p class="emphasis">${escapeHtml(trimmed.slice(5, -2).trim())}</p>`;

    // 内心独白 {{T: ...}}
    } else if (trimmed.startsWith('{{T:') && trimmed.endsWith('}}')) {
      html += `<p class="thought">${escapeHtml(trimmed.slice(4, -2).trim())}</p>`;

    // 系统面板块 {{PANEL}} ... {{/PANEL}}
    } else if (trimmed === '{{PANEL}}') {
      let panelHtml = '<div class="system-panel">';
      i++;
      while (i < paragraphs.length && paragraphs[i].trim() !== '{{/PANEL}}') {
        const line = paragraphs[i].trim();
        if (line.startsWith('##')) {
          panelHtml += `<div class="panel-title">${escapeHtml(line.slice(2).trim())}</div>`;
        } else if (line.includes('|')) {
          const parts = line.split('|');
          panelHtml += `<div class="panel-line"><span>${escapeHtml(parts[0].trim())}</span><span>${escapeHtml(parts[1].trim())}</span></div>`;
        } else {
          panelHtml += `<div>${escapeHtml(line)}</div>`;
        }
        i++;
      }
      panelHtml += '</div>';
      html += panelHtml;

    // 笔记块 {{NOTE}} ... {{/NOTE}}
    } else if (trimmed === '{{NOTE}}') {
      let noteHtml = '<div class="notebook">';
      i++;
      while (i < paragraphs.length && paragraphs[i].trim() !== '{{/NOTE}}') {
        const line = paragraphs[i].trim();
        if (line.startsWith('##')) {
          noteHtml += `<div class="nb-title">${escapeHtml(line.slice(2).trim())}</div>`;
        } else {
          noteHtml += `<div>${escapeHtml(line)}</div>`;
        }
        i++;
      }
      noteHtml += '</div>';
      html += noteHtml;

    // 进度条 {{BAR: 名称 | 当前/总数}}
    } else if (trimmed.startsWith('{{BAR:') && trimmed.endsWith('}}')) {
      const inner = trimmed.slice(6, -2).trim();
      const parts = inner.split('|');
      if (parts.length === 2) {
        const name = parts[0].trim();
        const val = parts[1].trim();
        const nums = val.match(/(\d+)\/(\d+)/);
        const pct = nums ? (parseInt(nums[1]) / parseInt(nums[2]) * 100) : 0;
        html += `<div class="stat-bar"><span class="stat-name">${escapeHtml(name)}</span><div class="stat-track"><div class="stat-fill" style="width:${pct}%"></div></div><span class="stat-val">${escapeHtml(val)}</span></div>`;
      }

    // 系统文字（【...】开头）
    } else if (trimmed.startsWith('【')) {
      html += `<p class="system-text">${escapeHtml(trimmed)}</p>`;

    // 普通段落（支持行内标记）
    } else {
      let text = escapeHtml(trimmed);
      // 行内加粗 **...**
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // 行内强调色 !!...!!
      text = text.replace(/!!(.+?)!!/g, '<span style="color:var(--accent);font-weight:600">$1</span>');
      html += `<p>${text}</p>`;
    }
    i++;
  }

  html += `<div class="end-mark">— 本章完 —</div>`;
  content.innerHTML = html;

  // 切换视图
  document.getElementById('bookshelf').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  document.getElementById('progressBar').style.width = '0%';

  // 更新按钮状态
  document.getElementById('prevBtn').disabled = (index === 0);
  document.getElementById('nextBtn').disabled = (index === chapters.length - 1);

  // 恢复滚动位置
  const state = loadState();
  const scrollKey = `scroll_${index}`;
  if (state[scrollKey]) {
    setTimeout(() => window.scrollTo(0, state[scrollKey]), 50);
  } else {
    window.scrollTo(0, 0);
  }

  barsVisible = true;
  settingsVisible = false;
  document.getElementById('settingsPanel').classList.remove('show');
}

function goBack() {
  saveScrollPos();
  document.getElementById('bookshelf').style.display = 'block';
  document.getElementById('reader').style.display = 'none';
  document.getElementById('progressBar').style.width = '0%';
  renderChapterList();
  updateContinueBtn();
  window.scrollTo(0, 0);
}

function prevChapter() { openChapter(currentChapter - 1); }
function nextChapter() { openChapter(currentChapter + 1); }

// ===== 保存滚动位置 =====
function saveScrollPos() {
  saveState({ [`scroll_${currentChapter}`]: window.scrollY });
}

let scrollTimer;
window.addEventListener('scroll', () => {
  // 更新进度条
  if (document.getElementById('reader').style.display === 'block') {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight * 100) : 0;
    document.getElementById('progressBar').style.width = progress + '%';
  }

  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(saveScrollPos, 300);
});

// ===== 点击切换顶栏底栏 =====
document.addEventListener('click', (e) => {
  if (document.getElementById('reader').style.display !== 'block') return;
  if (e.target.closest('.reader-topbar, .reader-bottombar, .settings-panel, .nav-btn, .back-btn, .size-btn, .theme-btn')) return;

  barsVisible = !barsVisible;
  document.getElementById('topbar').classList.toggle('hidden', !barsVisible);
  document.getElementById('bottombar').classList.toggle('hidden', !barsVisible);
  if (!barsVisible) {
    settingsVisible = false;
    document.getElementById('settingsPanel').classList.remove('show');
  }
});

// ===== 设置 =====
function toggleSettings() {
  settingsVisible = !settingsVisible;
  document.getElementById('settingsPanel').classList.toggle('show', settingsVisible);
}

function changeFontSize(delta) {
  fontSize = Math.max(14, Math.min(24, fontSize + delta));
  applyFontSize(fontSize);
  saveState({ fontSize });
}

function applyFontSize(size) {
  document.getElementById('fontSizeVal').textContent = size;
  document.querySelectorAll('.reader-content p').forEach(p => p.style.fontSize = size + 'px');
  // 也存到 CSS 变量上，让新渲染的内容也生效
  document.documentElement.style.setProperty('--reader-font-size', size + 'px');
}

function setTheme(t) {
  theme = t;
  applyTheme(t);
  saveState({ theme: t });
}

function applyTheme(t) {
  document.body.className = t === 'light' ? '' : t;
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === t);
  });
  updateNightIcon(t);
}

function toggleNight() {
  if (theme === 'dark') {
    // 切回上次的非暗黑主题，默认米黄
    const state = loadState();
    const prev = state.prevTheme || 'light';
    setTheme(prev);
  } else {
    saveState({ prevTheme: theme });
    setTheme('dark');
  }
}

function updateNightIcon(t) {
  const icon = document.getElementById('nightIcon');
  if (icon) icon.textContent = t === 'dark' ? '☀️' : '🌙';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== 启动 =====
init();
</script>
</body>
</html>
