<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>万物熟练度</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f0e8;
  --text: #333;
  --text-secondary: #888;
  --accent: #b8860b;
  --card-bg: #fff;
  --border: #e0d8c8;
  --shadow: rgba(0,0,0,0.06);
}

.dark {
  --bg: #1a1a1a;
  --text: #ccc;
  --text-secondary: #666;
  --accent: #d4a24e;
  --card-bg: #242424;
  --border: #333;
  --shadow: rgba(0,0,0,0.3);
}

body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
  -webkit-tap-highlight-color: transparent;
}

/* ===== 书架页 ===== */
.bookshelf {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px 16px;
  min-height: 100vh;
}

.bookshelf-header {
  text-align: center;
  padding: 40px 0 30px;
  position: relative;
}

/* ===== 夜间模式开关 ===== */
.night-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 300;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px var(--shadow);
  transition: background 0.3s, border-color 0.3s;
  line-height: 1;
}

.night-toggle:active { opacity: 0.7; }

.bookshelf-header h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 4px;
}

.bookshelf-header .subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
}

.book-info {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 2px 12px var(--shadow);
  margin-bottom: 20px;
}

.book-info .tag {
  display: inline-block;
  font-size: 12px;
  background: var(--accent);
  color: #fff;
  padding: 2px 10px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.book-info .desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.8;
}

.book-info .continue-btn {
  display: block;
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.book-info .continue-btn:active { opacity: 0.8; }

.chapter-list {
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 2px 12px var(--shadow);
  overflow: hidden;
}

.chapter-list-title {
  font-size: 16px;
  font-weight: 600;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}

.chapter-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}

.chapter-item:last-child { border-bottom: none; }
.chapter-item:active { background: var(--border); }

.chapter-item .ch-title {
  font-size: 15px;
  flex: 1;
}

.chapter-item .ch-read {
  font-size: 12px;
  color: var(--accent);
  margin-left: 8px;
  white-space: nowrap;
}

/* ===== 阅读页 ===== */
.reader {
  display: none;
  max-width: 600px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

.reader-topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: transform 0.3s;
}

.reader-topbar.hidden { transform: translateY(-100%); }

.back-btn {
  background: none;
  border: none;
  font-size: 15px;
  color: var(--accent);
  cursor: pointer;
  padding: 4px 8px;
}

.reader-topbar .ch-name {
  font-size: 14px;
  color: var(--text-secondary);
  flex: 1;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin: 0 12px;
}

.reader-content {
  padding: 20px 18px 100px;
}

.reader-content h2 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 28px;
  color: var(--accent);
}

.reader-content p {
  font-size: 17px;
  line-height: 1.9;
  text-indent: 2em;
  margin-bottom: 12px;
}

.reader-content p.system-text {
  text-indent: 0;
  font-weight: 600;
  color: var(--accent);
}

/* 系统面板框 */
.reader-content .system-panel {
  background: linear-gradient(135deg, rgba(184,134,11,0.08), rgba(184,134,11,0.03));
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 14px 16px;
  margin: 16px 0;
  font-family: "Courier New", "Source Code Pro", monospace;
  font-size: 14px;
  line-height: 1.8;
  color: var(--accent);
}
.dark .system-panel { background: linear-gradient(135deg, rgba(212,162,78,0.12), rgba(212,162,78,0.04)); }

.system-panel .panel-title {
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 2px;
  margin-bottom: 8px;
  opacity: 0.7;
}

.system-panel .panel-line {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
}

/* 升级特效文字 */
.reader-content .levelup {
  text-align: center;
  font-weight: 700;
  font-size: 18px;
  color: var(--accent);
  margin: 20px 0;
  padding: 12px;
  background: linear-gradient(90deg, transparent, rgba(184,134,11,0.1), transparent);
  letter-spacing: 2px;
  text-shadow: 0 0 12px rgba(184,134,11,0.3);
}

/* 内心独白 */
.reader-content p.thought {
  text-indent: 0;
  font-style: italic;
  color: var(--text-secondary);
  border-left: 2px solid var(--text-secondary);
  padding-left: 14px;
  margin: 14px 0;
  line-height: 1.8;
}

/* 笔记/备忘录样式 */
.reader-content .notebook {
  background: var(--card-bg);
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 16px 0;
  font-family: "Courier New", "Source Code Pro", monospace;
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
}

.notebook .nb-title {
  font-weight: 700;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

/* 强调段落 */
.reader-content p.emphasis {
  text-indent: 0;
  text-align: center;
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin: 24px 0;
  letter-spacing: 1px;
}

/* 时间标记 */
.reader-content .time-stamp {
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin: 24px 0 16px;
  font-family: "Courier New", monospace;
}

/* 数据对比条 */
.reader-content .stat-bar {
  display: flex;
  align-items: center;
  margin: 4px 0;
  font-family: "Courier New", monospace;
  font-size: 13px;
}

.stat-bar .stat-name {
  width: 120px;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.stat-bar .stat-track {
  flex: 1;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  margin: 0 8px;
  overflow: hidden;
}

.stat-bar .stat-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.3s;
}

.stat-bar .stat-val {
  width: 60px;
  text-align: right;
  color: var(--accent);
  font-weight: 600;
}

.reader-content .separator {
  text-align: center;
  font-size: 14px;
  color: var(--text-secondary);
  margin: 28px 0;
  letter-spacing: 8px;
}

.reader-content .end-mark {
  text-align: center;
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

/* ===== 底部导航 ===== */
.reader-bottombar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 600px;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 10px 0;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  z-index: 100;
  transition: transform 0.3s;
}

.reader-bottombar.hidden { transform: translate(-50%, 100%); }

.nav-btn {
  background: none;
  border: none;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 6px;
  transition: background 0.15s;
}

.nav-btn:active { background: var(--border); }
.nav-btn:disabled { color: var(--text-secondary); opacity: 0.4; }

/* ===== 设置面板 ===== */
.settings-panel {
  display: none;
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 568px;
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 -4px 20px var(--shadow);
  padding: 20px;
  z-index: 200;
}

.settings-panel.show { display: block; }

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.setting-row:last-child { margin-bottom: 0; }

.setting-label {
  font-size: 14px;
  color: var(--text-secondary);
}

.setting-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.size-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.size-btn:active { background: var(--border); }

.size-value {
  font-size: 14px;
  min-width: 30px;
  text-align: center;
}

.theme-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
}

.theme-btn.active { border-color: var(--accent); }
.theme-btn[data-theme="light"] { background: #f5f0e8; }
.theme-btn[data-theme="dark"] { background: #1a1a1a; }
.theme-btn[data-theme="green"] { background: #c7edcc; }
.theme-btn[data-theme="blue"] { background: #d4e4f7; }

/* ===== 主题色 ===== */
.green {
  --bg: #c7edcc;
  --text: #2d3a2e;
  --text-secondary: #6a7d6b;
  --card-bg: #d8f2db;
  --border: #b3d9b7;
  --shadow: rgba(0,0,0,0.06);
}

.blue {
  --bg: #d4e4f7;
  --text: #2a3545;
  --text-secondary: #6a7d94;
  --card-bg: #e0ecf8;
  --border: #bdd0e8;
  --shadow: rgba(0,0,0,0.06);
}

/* ===== 进度条 ===== */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: var(--accent);
  z-index: 999;
  transition: width 0.1s;
}

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 0; }

@media (min-width: 601px) {
  .bookshelf, .reader { max-width: 600px; }
}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<!-- ===== 夜间模式按钮 ===== -->
<button class="night-toggle" id="nightToggle" onclick="toggleNight()" aria-label="切换夜间模式">
  <span id="nightIcon">🌙</span>
</button>

<!-- ===== 书架页 ===== -->
<div class="bookshelf" id="bookshelf">
  <div class="bookshelf-header">
    <h1>万物熟练度</h1>
    <div class="subtitle">都市 / 系统 / 逆袭</div>
  </div>

  <div class="book-info">
    <span class="tag">连载中</span>
    <div class="desc">
      林远，24岁，快递分拣员，月薪四千。某天深夜，一个名为"万物熟练度"的系统悄然觉醒——他的每一个行为都被量化为可见的熟练度数值，反复练习即可提升，没有上限。从此，削苹果、搬包裹、做俯卧撑……每一次不起眼的重复，都成了通往蜕变的阶梯。
    </div>
    <button class="continue-btn" id="continueBtn" onclick="continueReading()">继续阅读</button>
  </div>

  <div class="chapter-list">
    <div class="chapter-list-title">目录</div>
    <div id="chapterListContainer"></div>
  </div>
</div>

<!-- ===== 阅读页 ===== -->
<div class="reader" id="reader">
  <div class="reader-topbar" id="topbar">
    <button class="back-btn" onclick="goBack()">← 返回</button>
    <span class="ch-name" id="readerChName"></span>
    <span style="width:50px"></span>
  </div>

  <div class="reader-content" id="readerContent"></div>

  <div class="reader-bottombar" id="bottombar">
    <button class="nav-btn" id="prevBtn" onclick="prevChapter()">上一章</button>
    <button class="nav-btn" onclick="toggleSettings()">设置</button>
    <button class="nav-btn" id="nextBtn" onclick="nextChapter()">下一章</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="setting-row">
      <span class="setting-label">字号</span>
      <div class="setting-controls">
        <button class="size-btn" onclick="changeFontSize(-1)">−</button>
        <span class="size-value" id="fontSizeVal">17</span>
        <button class="size-btn" onclick="changeFontSize(1)">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">背景</span>
      <div class="setting-controls">
        <button class="theme-btn active" data-theme="light" onclick="setTheme('light')"></button>
        <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')"></button>
        <button class="theme-btn" data-theme="green" onclick="setTheme('green')"></button>
        <button class="theme-btn" data-theme="blue" onclick="setTheme('blue')"></button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== 章节数据 =====
const chapters = [
{
  title: "第一章 系统觉醒",
  content: `林远觉得自己这辈子就这样了。

二十四岁，大专毕业两年，在城东一家快递站点当分拣员。每天早上六点起床，晚上九点回到那间月租八百的隔断房，累得连泡面都不想泡。

他不是没努力过。

高中时拼命刷题，差本科线十一分。复读一年，差了八分。家里拿不出第二年复读的钱，他去读了大专，学了个"物流管理"。毕业后投了两百多份简历，面试了三十几家公司，最后还是回到了快递站。

不是他不够聪明，也不是他不够勤奋。他只是……普通。

普通到任何事情都比别人慢半拍。别人三天能上手的业务，他要一周。别人随便练练就能过的驾照科目二，他挂了三次。高中同桌随手翻翻书就能考前十，他把课本翻烂了还是中游偏下。

周五晚上九点半，林远拖着酸痛的身体回到出租屋。

今天他搬了一千二百多个包裹。手指上的胶带残胶洗了三遍还是黏糊糊的，腰像是被人打了一锤子。他把外套扔在床上，整个人倒进那张吱呀作响的折叠床里。

手机亮了。

是高中班级群。他本来不想看，但手指划开了屏幕。

"陈嘉豪刚拿了B轮融资，估值两个亿，牛逼啊！"

下面一串恭喜。

陈嘉豪。高中时坐他后排的男生，上课打游戏，考试照样前五。后来去了985，大三开始创业，现在已经是"青年企业家"。

林远盯着屏幕看了几秒，退出了群聊。

不是嫉妒。是那种更深的东西——一种从骨头里渗出来的无力感。就像你站在一条传送带上，拼命跑，脚下的带子却在往后退，你永远跑不到前面去。

他闭上眼。

然后头痛开始了。

不是普通的头痛，是像有什么东西在颅骨内壁上用指甲刮，从后脑勺一直刮到眉心。林远"嘶"了一声，猛地坐起来，双手抱住脑袋。

疼痛持续了大概十几秒，然后戛然而止。

取而代之的，是一行半透明的淡蓝色文字，悬浮在他视野正中央。

【万物熟练度系统已激活】

林远愣了。

他眨了眨眼。那行字还在。

他伸手去碰——手指穿过了文字，什么也摸不到。

"我他妈不会是脑子出问题了吧？"

话音刚落，又一行字弹出来：

【宿主状态正常。系统初始化完成。】

【核心能力：万物皆可量化。宿主的一切行为、技能、知识，均可转化为可视化的熟练度数值。熟练度提升无上限。】

林远坐在床边，一动不动地盯着虚空中的蓝色文字。

他的第一反应不是兴奋，而是恐惧。这要么是幻觉，要么是脑瘤。他掏出手机，打开搜索引擎，输入"突然出现幻觉 看到文字"。

搜索结果加载的瞬间，视野边缘跳出了一个小小的提示：

【检测到行为：信息检索】
【信息检索 Lv.1 — 0/100】
【+1 熟练度】

林远的手指停在了屏幕上。

他又搜了一条。

【信息检索 Lv.1 — 2/100】
【+1 熟练度】

他深吸一口气，放下手机。

好。就算是幻觉，这个幻觉也太有条理了。他决定做一个实验。

林远站起来，走到那张充当餐桌的折叠桌前。桌上放着一把水果刀和两个苹果——昨天超市打折买的。

他拿起刀，开始削苹果。

【检测到行为：刀具操作（削皮）】
【刀具操作 Lv.1 — 0/200】
【+1 熟练度】

果皮断了。他削苹果一直很烂，每次都是坑坑洼洼。

他继续削。第二刀，+1。第三刀，+1。

削完一个苹果，熟练度涨到了12。苹果被他削得像个被狗啃过的土豆。

他开始削第二个。

到第二个苹果削完的时候，熟练度变成了23。他低头看了看手里的苹果——仍然丑，但至少比第一个好一点。皮薄了一些，没有之前那么多深坑。

但这也可能是心理作用。

林远把苹果放下，站到房间中央。隔断房只有六平米，站在中间伸开手臂，两侧都快碰到墙。

他开始做俯卧撑。

【检测到行为：俯卧撑】
【俯卧撑 Lv.1 — 0/50】
【+1 熟练度】

一个。两个。三个。

每做一个，跳一次提示。

他平时的极限是十五个。到第十三个的时候手臂开始发抖，第十五个勉强撑起来，第十六个——

撑不起来了。

他趴在地上喘气，看了眼面板：

【俯卧撑 Lv.1 — 15/50】

没有因为有了系统就突然变成超人。该做不动还是做不动。

这反而让林远安心了一点。如果做了一个俯卧撑就能飞天，那一定是幻觉。但这个系统似乎只是在忠实地记录——他做了什么，做了多少，然后把这些变成一个数字。

他坐起来，靠着墙，开始认真地阅读系统界面。

他发现只要在心里默念"面板"，就能调出一个完整的状态页面：

——

【林远 — 个人面板】

- 到底有没有上限？

【检测到行为：信息检索】
【信息检索 Lv.1 — 3/100】
【+1 熟练度】

林远愣了一下。

记笔记也算信息检索？

不对……他回想了一下，"信息检索"这个技能是昨晚搜索引擎查东西的时候触发的。现在他在备忘录里整理信息、归纳规律——这也算吗？

也许"信息检索"这个名字不够准确。也许它的本质是"信息处理"——搜集、整理、分析信息的能力。

他又打了两行字。+1。

有意思。

【信息检索 Lv.1 — 5/100】

林远收起手机，骑上电动车。夜风从两侧吹过来，带着春天特有的那种潮湿的泥土味，还有远处烧烤摊的烟火气。

他骑得很慢，不是因为累，而是因为他在想事情。

以前他每天下班骑车回家的这二十分钟，脑子里要么是空的，要么在想"明天又要搬多少包裹"。那是一种钝的、灰色的疲惫。

今天不一样。

今天他的脑子里有一张表格，有待验证的假设，有明天要做的实验。

他还想到了一件事——

俯卧撑还差29个就满了。

回到出租屋，洗完澡，林远站在那六平米的房间中央。

九点四十分。身体已经很疲惫了。搬了一整天的包裹，胳膊和腰都在抗议。

但是29个。

他趴下去，开始做。

第一个就很费力。身体跟他说不行了，每一根肌肉纤维都在喊停。

但数字跳了。22/50。

第二个。23。

他咬着牙。每一个俯卧撑之间的间隔越来越长，从两秒变成五秒，从五秒变成十秒。到了第三十个的时候，他的手臂在剧烈发抖，汗水滴在地板上，呼吸粗得像拉风箱。

30/50。还差20个。

今天做不完。

他清楚地知道这一点。不是意志力的问题，是肌肉真的到了极限。如果硬撑，受伤的概率比完成的概率大。

林远趴在地板上，胸口紧贴着冰凉的瓷砖，喘了足足两分钟。

然后他慢慢撑起身体，没有再做下一个。

【俯卧撑 Lv.1 — 30/50】

还差20个。

他擦了擦脸上的汗，坐到床边，拿起了那把水果刀和冰箱里最后一个苹果。

如果身体练不动了，就练别的。

他开始削苹果。这次他比昨晚更认真——刻意放慢速度，尽量让果皮保持连续，控制刀刃入肉的深度。每一刀下去他都在观察：这里削深了，那里角度歪了，手腕应该再稳一点。

【刀具操作 Lv.1 — 24/200】

25，26，27……

一个苹果削完了，果皮断了五次，但比昨天的七次少了两次。苹果的形状也没那么坑洼了，至少像个苹果而不是土豆了。

他把削好的苹果切成四块，慢慢吃掉。甜的，汁水很多。超市打折的苹果，一块五一个，但削干净了吃起来跟五块钱的也没区别。

吃完苹果，他看了一眼面板。

【刀具操作 Lv.1 — 35/200】

他把水果刀洗干净，擦干，放回桌上。

然后他躺到床上，关了灯。

黑暗里，他又调出了面板。五个技能，大部分还在Lv.1，数字小得可怜。最高的"包裹分拣"也才Lv.2，效果是"轻微的记忆增强"。

如果让陈嘉豪看到这个面板，大概会笑出来吧——你的人生面板上最强的技能是"快递分拣"？

但林远没有觉得丢人。

因为他发现了一件事。这一整天，从早上六点到现在，将近十六个小时——他没有一刻觉得自己的时间是被浪费的。

以前那种"在传送带上跑却永远跑不到前面"的感觉消失了。

取而代之的是另一种感觉：他在走一条路。很长很长的路，但每一步都有脚印，每一步都在往前。

他看着黑暗中那些淡蓝色的数字，嘴角不自觉地翘了起来。

然后他想到了一件事。

明天是周六。站里轮休，他不用上班。

一整天的空闲时间。

他可以用来做很多实验。

林远闭上眼睛。这一次，他很快就睡着了。`

  title: "第三章 实验日",
  content: `周六早上八点，林远被阳光晃醒了。

这是两个月以来他第一次睡到自然醒。没有闹钟，没有赵哥的催促，窗外是懒洋洋的春日阳光，隔壁也没有电视的声音——那个合租的外卖小哥周末估计也在补觉。

他躺在床上，第一件事就是调出面板。

【林远 — 个人面板】

信息检索 Lv.1 — 5/100
刀具操作 Lv.1 — 35/200
俯卧撑 Lv.1 — 30/50
包裹分拣 Lv.2 — 38/500
定点投掷 Lv.1 — 1/150

五个技能，静静地排在那里。

林远在心里盘算了一下今天的计划。他有一整天的时间，没有任何安排。这是他拥有系统以来第一个完整的"实验日"。

他要做三件事。

第一，把俯卧撑升到Lv.2。还差20个，今天一定能完成。

第二，尽可能多地触发新技能，验证昨天"意图假说"的边界。

第三，观察不同技能之间有没有关联。

他翻身下床，洗漱完毕，啃了两个馒头，喝了一杯热水。然后站到房间中央，开始做俯卧撑。

经过一晚的休息，身体恢复了不少。前十个做得很流畅，手臂虽然还有些酸，但不像昨晚那样每一个都要拼命。

31，32，33……

到第四十个的时候，肌肉开始抗议了。胳膊发抖，呼吸变粗，额头上渗出汗珠。

他咬牙又做了五个。

【俯卧撑 Lv.1 — 45/50】

还差5个。

他趴在地上喘了一分钟，然后撑起来。

46。

47。

48——胳膊猛地一软，他差点摔在地上，用膝盖撑住了。

休息。两分钟。

49。

浑身都在发抖。但他撑住了。

最后一个。

林远深吸一口气，把注意力集中到手掌和地板的接触面上，两只手慢慢弯曲，胸口贴近地面，然后——

撑起来。

【俯卧撑 Lv.1 — 50/50】

金色的文字再次出现。

【俯卧撑 — 升级！】
【Lv.1 → Lv.2】
【下一级：0/120】

【Lv.2效果：肌肉恢复加速（初级）——运动后肌肉疲劳的恢复速度小幅提升。微弱的肌肉记忆增强。】

林远趴在地上，喘着粗气，嘴角却翘了起来。

肌肉恢复加速。

他立刻注意到了一件事——这个效果不是"做俯卧撑时力量更大"，而是"做完之后恢复得更快"。系统给的增强不是直接加属性，而是优化整个过程的某个环节。

而且"微弱的肌肉记忆增强"这条更有意思。肌肉记忆是什么？就是你做一个动作做多了之后，身体自动记住了最优的发力方式，不需要大脑刻意控制。

换句话说，同样做50个俯卧撑，别人的身体可能需要三个月才能形成肌肉记忆，而他可能只需要……更短的时间。

这不是一个一次性的增强，这是一个加速器。

而且升到Lv.2之后，下一级只需要120。比分拣的500少很多。俯卧撑这种纯体力技能，升级门槛确实更低。

他记下这个数据点，然后站起来。

身体确实还是酸的，但好像……没有昨晚那么酸？是心理作用，还是Lv.2的效果已经开始生效了？

分不清。但这不重要。

===

接下来是今天的重头戏——触发新技能。

林远坐在折叠桌前，摊开手机备忘录，把自己能想到的"可以被改进的行为"列了一个清单：

跑步。打字。做饭。画画。唱歌。看书。下棋。打扫卫生。叠衣服。系鞋带。

他决定从最简单的开始。

首先，打字。

他打开手机的备忘录，认真地开始打一段话。不是随便乱打，而是有意识地追求速度和准确性——他想打得更快，打得更准。

"今天是系统激活的第二天，我要测试尽可能多的技能触发条件……"

【检测到行为：文字输入】
【文字输入 Lv.1 — 0/120】
【+1 熟练度】

成功。

他又打了几行。每一行+1。他注意到"文字输入"而不是"打字"——系统对技能的命名似乎有自己的规则。

接下来，叠衣服。

林远把床上那堆揉成一团的衣服拿出来，认真地叠了起来。他以前叠衣服都是随便对折几下塞进柜子，但这次他有意识地想着"要叠整齐"。

【检测到行为：衣物整理】
【衣物整理 Lv.1 — 0/80】
【+1 熟练度】

80就能升级。果然，越日常、越简单的技能，门槛越低。

然后他扫了地。六平米的房间不需要扫多久，但他认真地把每个角落都扫到了。

【检测到行为：清洁打扫】
【清洁打扫 Lv.1 — 0/100】
【+1 熟练度】

三个新技能，不到二十分钟。

他越来越兴奋。但他强迫自己冷静下来。开新技能很容易，关键是——开了之后有什么用？每个技能升到Lv.2才能获得效果增强。而升级需要大量重复。

如果他什么都练，结果就是什么都是Lv.1，什么增强都没有。

质量还是数量？

他在备忘录上写下了这个问题，然后画了一条线，在线的两边分别写了两个策略：

策略A：广撒网。尽量开更多技能，期待某些技能之间产生组合效应。
策略B：深挖掘。集中精力把少数技能练到高等级，先把单个技能的增强效果吃透。

目前信息太少，他无法判断哪个更优。但直觉告诉他，两个都需要。

先广撒网，找到那些有潜力的技能；然后深挖掘，把有潜力的技能练上去。

【信息检索 Lv.1 — 7/100】

连分析策略都算信息检索。这个技能的触发范围比他想象的还广。

===

上午十点，林远出了门。

他不打算在那六平米的房间里待一整天。外面有更大的世界，有更多的技能等着他去触发。

第一站，小区楼下的空地。

准确地说，是一块被居民自发改造成健身角的空地。两副单杠，一个石桌石凳，地上画了几个跳房子的格子，已经被踩得看不太清了。

林远走到单杠前，双手握住横杆，试着把自己拉上去。

他上一次做引体向上大概是高中体测的时候。那时候他勉强能做三个。现在嘛——

他挣扎着拉了一下，下巴刚到横杆的高度，手臂就撑不住了，整个人又掉了下来。

但提示跳出来了。

【检测到行为：引体向上】
【引体向上 Lv.1 — 0/80】
【+1 熟练度】

他又试了两次。第二次勉强过了杆，第三次只拉到一半就掉了。

3/80。

引体向上的升级门槛也是80，跟衣物整理一样。但做一个引体向上的难度比叠一件衣服高多了。这说明升级门槛不完全跟"难度"挂钩，可能更多跟"复杂度"有关——引体向上虽然吃力，但动作模式单一；而包裹分拣需要识别、判断、搬运、投放，所以门槛更高。

又一个数据点。

他在空地上还做了几组深蹲和开合跳，分别触发了"深蹲"和"跳跃"两个新技能。门槛分别是60和70。

然后他沿着小区的步道跑了一圈，大概八百米。

【检测到行为：跑步】
【跑步 Lv.1 — 0/100】
【+1 熟练度】

跑步这个技能有点特殊。他发现每跑大约一百米，熟练度就+1。不是按"次数"计算的，而是按某种"有效距离"或"持续时间"计算的。

他跑了三圈，大概两千四百米。跑完气喘吁吁，大腿发酸。

【跑步 Lv.1 — 24/100】

这时候已经快十一点了。他坐在石凳上休息，调出面板看了看：

【林远 — 个人面板】

信息检索 Lv.1 — 8/100
刀具操作 Lv.1 — 35/200
俯卧撑 Lv.2 — 0/120
包裹分拣 Lv.2 — 38/500

清洁打扫 Lv.1 — 1/100
引体向上 Lv.1 — 3/80
深蹲 Lv.1 — 15/60
跳跃 Lv.1 — 8/70
跑步 Lv.1 — 24/100

十二个技能。

一个上午，从五个变成了十二个。面板变得拥挤了起来，但看着那些整整齐齐的数字，林远有一种说不出的满足感。

不过他注意到了一个问题——技能列表是按照获得顺序排列的，没有分类。如果以后技能变成几十个甚至上百个，找起来会很麻烦。

他试着在心里想"分类"这个词。

没有反应。

又试了"排序"。

还是没有。

看来面板的功能目前就是这样，不支持自定义。也许等级更高之后会解锁新功能？又一个未知数。

===

中午，林远在路边的兰州拉面馆吃了一碗牛肉面。九块钱，加了个鸡蛋。

他坐在塑料凳上吸溜面条的时候，突然想到一件事。

吃饭算不算技能？

他放慢了速度，认真地感受了一下筷子夹面条的过程。左手端碗，右手用筷子把面条挑起来，送到嘴里，吸入，咀嚼。

没有提示。

他又试了一次，这次集中注意力想着"我要把筷子用得更好"。

还是没有。

吃饭太本能了？还是说，"吃饭"这个行为无法被"改进"——你不可能把饭吃得"更好"？

但是……厨师呢？品酒师呢？他们的"吃"就是一种可以精进的技能。

也许不是"吃饭"不行，而是他的目标太模糊了。"把筷子用得更好"——更好是什么意思？更快？更准？更优雅？

他换了一个思路。

林远拿起筷子，夹起碗里的一片牛肉薄片——很薄，很滑，在面汤里飘来飘去。他集中注意力，想着"我要一次夹起这片肉，不掉"。

筷子合拢，夹住肉片，提起——

肉片滑落，掉回碗里。

没有提示。

他皱了皱眉，又试了一次。这次夹住了，但在提到嘴边的半路上又滑了。

第三次。他调整了筷子的角度，用筷子尖而不是筷子肚去夹，手指略微用力——

夹住了。送到嘴里。没掉。

【检测到行为：精细操作（筷子）】
【精细操作 Lv.1 — 0/200】
【+1 熟练度】

林远差点被面条呛到。

精细操作！

不是"吃饭"，不是"使用筷子"，而是"精细操作"——后面括号里标注了"筷子"，说明这是一个大类技能下的子分支。

而且注意门槛：200。跟"刀具操作"一样。

他立刻想到——"刀具操作"会不会也是"精细操作"的一个子分支？

他看了看面板。"刀具操作"和"精细操作"是两个独立的条目，各有各的进度。但它们的升级门槛一样，名字也有相似性。

如果它们之间有某种关联……

他暂时没法验证，但把这个猜想记在了备忘录里。

===

下午两点，林远来到了离出租屋最近的一家公共图书馆。

说是图书馆，其实就是街道社区服务中心二楼的一个阅览室，面积不大，书也不多，但有空调。周六下午人不多，只有几个老人在看报纸，一个戴眼镜的中学生在写作业。

林远在书架前站了一会儿，最后抽出一本《五分钟速写入门》。他从没学过画画，连火柴人都画不好。

他找了个空位坐下，翻开书，照着第一页的示范开始画。

一支铅笔，一张纸。画的是一个圆——书上说，所有速写的基础都是线条和形状，先学画圆。

他的圆歪歪扭扭，像个被坐扁了的鸡蛋。

【检测到行为：绘画】
【绘画 Lv.1 — 0/300】
【+1 熟练度】

300。绘画的门槛是300，跟包裹分拣一样高。

这说明绘画在系统的评估体系里是一个"高复杂度"技能。想想也对——绘画涉及手眼协调、空间感知、线条控制、审美判断，远比做俯卧撑复杂得多。

林远在那张纸上画了一个又一个圆。大的，小的，快的，慢的。二十分钟后，纸上密密麻麻全是圆圈，像一张月球表面的照片。

【绘画 Lv.1 — 23/300】

他的圆还是不圆。但比最开始的鸡蛋好了一点——至少首尾能接上了。

然后他翻到下一页，开始画直线。横线，竖线，对角线。书上说，画出又直又匀的线条是速写的基本功。

他画的线条跟蛇走过的路一样弯弯曲曲。但每一条线都是+1。

在图书馆待了两个小时。除了画画，他还做了另一件事——阅读。

他拿了一本关于物流行业的书，认认真真地看了五十多页。不是那种"翻一翻就放下"的看法，而是带着"我要理解这个行业的运作逻辑"的目的去读的。

【检测到行为：阅读理解】
【阅读理解 Lv.1 — 0/150】
【+1 熟练度】

又一个新技能。门槛150。

他注意到"信息检索"和"阅读理解"是两个不同的技能。信息检索偏向搜集和整理，阅读理解偏向深度消化。

系统对技能的分类比他想象的更细致。

===

下午四点半，林远走出图书馆。

阳光还很好，街道上人来人往。他站在路边，掏出手机看了一眼面板——十四个技能了。

林远请了半天假，坐公交过去的。他特意穿了一件干净的衬衫——去年过年老妈寄来的，一直没穿过。

仓库比他想象的大。是一个标准的钢结构厂房，面积大概是他们快递站的十倍。里面分了好几个区域——入库区、分拣区、出库区、暂存区。有传送带，有叉车，有十几个工人在忙碌。

张经理在办公室等他。四十岁左右，戴眼镜，说话很快。

"坐，喝水。"

林远坐下。

"赵站长跟我说了你的情况。干了两年快递分拣，最近进步很快。上周你们站里的内部赛，他说你一周之内把速度提升了50%以上。"

"是。"

"我需要的不是分拣速度最快的人。"张经理推了推眼镜，"我需要的是一个能理解分拣流程、能优化排班、能管理人员的调度。你知道调度是干什么的吗？"

"安排什么时候干什么活，谁干什么活。"

"差不多。但不只是排个班表那么简单。我们这个仓库一天处理八千到一万件包裹。高峰期的订单量是平时的三到五倍。怎么在高峰期不崩溃，怎么在低谷期不浪费人力，这才是调度的核心。"

林远点了点头。

张经理带他参观了仓库。走一圈大概花了二十分钟。林远一边走一边看，一边在心里默默记录。

{{T: 入库区有两个卸货口，同时只能卸两辆车。如果三辆车同时到，第三辆要等。等待时间越长，下游分拣压力越大。}}

{{T: 分拣区的布局跟我们站里差不多，但大了四五倍。十二个格口变成了三十六个。分拣员有十个人，但分布不均匀——靠近传送带的区域人多，远端的区域只有两个人。}}

{{T: 出库区有一个明显的瓶颈——称重和贴标签的环节只有一台机器，所有包裹都要排队过。}}

他没有说出来，但这些观察被自动整理成了一张流程图储存在了脑子里。

信息检索Lv.2的"信息关联增强"在工作。

张经理走完一圈，回到办公室，问他："你觉得我们仓库有什么问题？"

林远想了三秒。

"出库区的称重贴标是瓶颈。前面分拣再快，到这里都得排队。如果加一台设备或者增加一个人工称重的工位，出库效率至少能提升30%。"

张经理看了他一眼。那个眼神林远见过——赵哥和唐峰都用过类似的眼神。行家打量新人时的那种目光。

"你怎么看出来的？"

"走的时候看了一下各个环节的包裹堆积量。入库区和分拣区的堆积量都不大，说明处理速度够快。但出库区前面堆了大概两三百件等待称重，说明上游来的速度比这里消化的速度快。"

张经理沉默了几秒，然后笑了。

"赵站长没说错。你确实有点东西。"

"月薪六千，五险，每月八号发。试用期三个月，试用期薪资一样。你什么时候能来？"

===

回去的路上，林远没有坐公交。他跑回去的。

六公里，跑了二十八分钟。到快递站的时候，正好赶上下午的分拣。他换了工服，照常干活。

但脑子里一直在想那个仓库。

调度岗位意味着什么？

意味着他不用再每天搬一千多个包裹了。但也意味着他需要学习一大堆新东西——排班、人员管理、数据分析、流程优化。

从系统的角度来看，这是一个巨大的"技能池扩张"机会。调度工作可能触发的技能：

{{NOTE}}
## 新岗位可能触发的技能
- 人员管理 / 沟通协调
- 数据分析（进阶版的信息检索？）
- 流程优化（可能是全新技能）
- 排班规划（策略类技能）
- 应急处理（突发情况应对）
- 口头表达 / 汇报
{{/NOTE}}

至少六个潜在新技能。而且这些是"认知类"和"管理类"技能——跟体能类完全不同的赛道。

他做了一个决定：接受这份工作。

但不是立刻。他打算在快递站再干两周，把手头的技能推到一个满意的阶段，然后再跳过去。

他需要跟赵哥谈谈。

===

下班后，林远找到了赵哥。

赵哥在他那个纸板隔出来的小办公室里，正在填什么表格。

"赵哥，我想跟您说个事。"

赵哥抬头。"张经理的事？"

"您知道了。"

"废话，是我推荐你的。"赵哥放下笔，靠回椅子，"你去吧。在这站里分拣一辈子没意思。"

"我想再干两周。"

赵哥皱了皱眉。"为什么？"

"我想把手里的活交接好。您帮我带的这些，我不想走得太急。"

这不完全是真话。但也不完全是假话。

赵哥看了他几秒，然后点了点头。

"行。两周后走。这两周你抓紧把投掷的手法教教张磊和小孙他们。你走了之后，站里不能没人会扔件。"

"好。"

林远转身要走的时候，赵哥在后面说了一句。

"小林。"

"嗯？"

"你最近变化挺大的。不知道你怎么做到的，但挺好的。继续。"

赵哥说完低头继续填表格了。

林远站在门口，喉咙有点紧。

他从来没有被一个"领导"这样肯定过。高中的时候班主任说他"努力但不聪明"。大专的时候导员连他名字都记不住。

而赵哥——一个快递站站长，一个曾经日分三千件的分拣高手——说他"挺好的"。

{{T: 这两个字比任何系统提示都让他心跳加速。}}

他走出棚子，站在夜色里，深吸了一口气。

然后开始跑步回家。

四公里的路，他跑得飞快。

【跑步 Lv.2 — 203/250】`

  title: "第十五章 传授",
  content: `{{TIME: 第四周 · 周四至第五周 · 周三}}

接下来的两周，林远的日子被分成了两个部分。

白天在快递站，他做两件事：分拣，和教人。

赵哥让他教张磊和小孙投掷分拣的手法。张磊是之前找他学过一次的那个，小孙是今年刚来的新人，比林远还年轻两岁。

教人比他想象的难。

他以为只要把赵哥教他的那句话——"手肘固定，手腕拨"——传递下去就行了。但当他看着张磊做的时候，他发现不行。

张磊的问题不是手腕不会拨。而是他站的位置不对——离格口太近了，没有给抛物线留足够的空间。

小孙的问题又不一样。小孙的手腕力量不够，拨出去的包裹飞行距离太短。他需要的不是"手腕拨"，而是先把手腕力量练上来。

同一个技能，不同的人卡在不同的环节。

{{T: 我以前以为教学就是"告诉别人怎么做"。现在才知道，教学的核心是"看出别人卡在哪里"。}}

他开始观察每个人的动作，找到他们各自的短板，然后给出针对性的建议。

对张磊："退后一步。你太近了，包裹还没形成抛物线就到了。"

对小孙："先别扔远的。两米以内开始，把手腕的感觉找到再加距离。"

效果出来了。一周之后，张磊的命中率从50%提升到了75%。小孙从完全扔不进，到了两米以内60%的命中率。

【口头教学 Lv.1 — 67/200】

涨得不快——教学不像分拣那样可以大量重复。但每一次有效的教学互动都+1。

而且他发现了一件有趣的事：教别人的时候，他自己的理解也在加深。

有一次他在帮张磊纠正姿势的时候，突然意识到一个他自己以前没有注意到的细节——投掷时，脚尖的朝向会影响手臂的发力方向。脚尖朝着格口，投出去的包裹更容易走直线。

他试了一下。果然。

【定点投掷 Lv.2 — 312/350】

教学不仅是在帮别人，也是在帮自己。

===

工作之外的两周也没有闲着。

每周二、四、六去拳馆。唐峰的课从"打空气"进阶到了"打靶"。

打靶就是教练拿着一对手靶，你对着靶面打拳。靶面是活动的——教练会移动位置、变换角度，你要在移动中找到目标打上去。

比打空气难了一个数量级。

打空气的时候你可以慢慢来，随便打。打靶要求速度、准确、力量，三者缺一不可。唐峰举靶的时候，如果你打得太慢，他会把靶收回去："太慢了，打空了。"

前几次课林远打得很狼狈。不是打偏就是打慢，偶尔打到了力量又不够——拳头砸在靶面上发出一声"啪"的闷响，跟唐峰示范时那种清脆的"啪！"完全不同。

但他在进步。每一堂课都在进步。

直拳到了165/200。组合拳到了94/300。格斗站架到了152/200。

而且他发现了一个现象——打靶的时候，他的"定点投掷"和"移动投掷"的经验在起作用。

投掷的本质是什么？判断距离→控制力度→在移动中命中目标。

打靶的本质是什么？判断距离→控制力度→在移动中命中目标。

底层逻辑几乎一模一样。

深蹲Lv.3的"爆发力感知"让他出拳更有爆发力。跑步Lv.2的"心肺耐力"让他打三个回合不气喘吁吁。俯卧撑Lv.3的"核心力量感知"让他的腰部旋转更有力。

所有以前积累的体能技能都在格斗中汇合了。

{{EM: 格斗，是他目前所有技能的最佳交汇点。}}

唐峰注意到了他的进步速度。

第三堂课结束后，唐峰叫住了他。

"你除了来这儿，平时自己有练？"

"每天跑步，做俯卧撑和深蹲。回家也会练拳。"

"嗯。"唐峰拿毛巾擦了擦汗，"你的基础出拳已经可以了。下周开始教你踢。"

踢。腿法。

林远的心跳加速了。

新技能。

===

{{TIME: 第五周 · 周三 · 最后一天}}

这是林远在快递站的最后一天。

早上他提前十分钟到，把自己工位周围收拾了一下。没什么东西——一副手套，一个水杯，一卷他自己买的胶带。

分拣的时候他特别认真。每一个包裹都处理得干净利落。

他看了一眼面板。

{{PANEL}}
## 包裹分拣
Lv.3 | 687/800
{{/PANEL}}

还差113就Lv.4。但他不会在这里等到Lv.4了。

下午五点，分拣结束。赵哥没有搞什么欢送仪式——快递站不兴这个。但他让老周和李萌提前十分钟收工。

几个人站在棚子外面。

老周递了一根烟过来。林远不抽烟，但他接了。没点，夹在手指间。

"到了新地方好好干。"老周说，"干不下去了随时回来。"

"谢周哥。"

李萌站在旁边，沉默了一会儿，然后递过来一个塑料袋。

"给你的。搬家礼物。"

林远打开一看——一把水果刀。比他现在用的好很多，刀刃更薄更亮，手柄是防滑的。

"你不是天天削苹果吗。用好一点的刀。"

林远看了看刀，又看了看李萌。

"谢谢。"

"走了啊。"李萌转身就走了，马尾辫在脑后晃了晃。

赵哥最后走过来，拍了一下他的肩膀。

"好好干。"

没有多余的话。赵哥从来不说多余的话。

林远把东西装进背包，走出了快递站。

站在巷子口，他回头看了一眼那个两层铁皮棚子。夏天像蒸笼，冬天像冰窖。他在这里待了两年零三个月。

两年前他走进这里的时候，什么都不会。

现在他走出来的时候——

他看了一眼面板。二十一个技能。最高的"包裹分拣"Lv.3。五个Lv.2。三个Lv.3。

这些数字不会显示在简历上。没有人会知道他有一个系统。

但数字不会骗人。

他转身，开始跑步。

不是跑回出租屋。是跑向城东开发区的方向。

明天开始，新的工作，新的技能，新的起点。

四公里变成了六公里。但他跑得很轻松。

【跑步 Lv.2 — 241/250】

快了。

还差九公里。`

  title: "第十六章 调度员林远",
  content: `{{TIME: 第五周 · 周四 · 新工作第一天}}

张经理带他做了简单的入职流程，然后把他交给了仓库主管老马。

而且他发现了一个有趣的现象——"口头沟通"和"口头教学"是两个不同的技能。教学的核心是"让对方理解一个技能"，沟通的核心是"让对方接受一个决定"。

===

新工作的收入变化也很明显。

第一个月的工资到账——六千整。扣掉五险个人部分大概五六百，到手五千四左右。

比快递站多了一千四。

他坐在出租屋里，看着银行卡余额，做了一个决定：

续费拳馆。四百八一个月。

然后他算了一下——每月到手五千四，房租八百，伙食费一千二（自己做饭后降低了），拳馆四百八，交通和杂项五百。

每月能存两千四。

一分钟过去。

前手直拳虚晃。

读秒。

一。二。三。

王浩站了起来。他咬着牙，重新举起了拳头。

裁判问："可以继续吗？"

"可以。"

"继续！"

最后十五秒。王浩拼命冲了上来——他知道自己落后很多，必须抓住最后的机会。

但他的动作已经变形了。力量还在，精度和速度都不在了。

林远后退、格挡、侧移。没有给他任何追击成功的机会。

叮——

这次的场地比上次那个小型比赛大了一个级别。正规的体育馆，标准擂台，有LED记分屏，有专业裁判组，观众席能坐五百人。

林远换好装备，开始热身。

林远调整策略。

既然前手直拳被轻松应对，他换了一个进攻方式——低鞭腿。

前手虚晃，吸引张磊的注意力到上方，然后低鞭腿扫大腿。

抗击打能力很强。

第一回合两分钟，双方都没有太大的突破。互有攻守。林远觉得自己大概是微弱落后——张磊的有效击打稍微多一点。

回到角落，唐峰说："他等待反击的模式有个弱点——他需要你先出手。如果你不出手，他就不出手。所以第二回合你可以试试用**节奏变化**来骗他的反击。"

右手抬起——像是要出后手直拳——但不出。

最后三十秒，比分应该很接近。

林远做了一个决定——冒险。

他突然加速冲了上去。不是常规的逼近，是一个全力的突进。

林远的鞭腿扫到了张磊的肋部。

周六下午。他做了一件"毫无意义"的事——去了市里的图书馆。

他看了一个小时。看不懂棋谱，但觉得有意思。

然后他又翻了一本关于音乐理论的书。也是从来没接触过的领域。

他又看了半个小时。

离开图书馆的时候，他带走了两本书——一本围棋入门，一本音乐理论基础。

纯粹的好奇。

直觉。

他说不清楚。但他决定——每周至少留半天做"没有目的的事"。

  title: "第五十五章 围棋",
  content: `{{TIME: 九月第一周}}

林远开始学围棋了。

不是正式拜师——而是自学。那本围棋入门书加上手机上下载的一个围棋APP。

他每天睡前花三十分钟下棋。和AI对弈。APP的AI有九个等级，他从最低级开始。

第一天。他输了。而且输得很惨——他甚至不知道自己为什么输的。棋盘上的黑白棋子像一团乱麻，他看不出任何"形状"。

第二天。又输了。但他开始理解了一些基本概念——气、眼、活棋、死棋。

第三天。赢了最低级AI一局。不是因为他下得好，而是AI太弱了。

一周下来。

【新技能解锁：围棋 Lv.1 — 0/300】

{{NOTE
系统说明：围棋
类别：智力/策略
等级：Lv.1
效果：
▸ 基础规则和概念掌握

第三十七项技能。

不是技术层面的——显然出拳和下棋没有关系。而是**战略层面的**。

格斗比赛中的试探、控制节奏、寻找弱点、选择时机——这些思维方式在围棋中都能找到对应物。

格斗中的"前手直拳试探" ≈ 围棋中的"小飞挂角试探"
格斗中的"控制距离" ≈ 围棋中的"控制中央"

{{T: 数据思维Lv.1的"模式迁移"被动可能在这里生效了——它让他能把格斗中学到的战略模式自动映射到围棋上。虽然两个领域的表面形式完全不同，但底层的战略逻辑是相通的。这就像——国际象棋大师学中国象棋会比普通人快得多，不是因为规则相同，而是因为"战略思维"这个底层能力是通用的。}}

空间推理——和物流调度的"路线优化"有关？
策略规划——和格斗的"比赛策略"有关？

但他提醒自己——现在还是Lv.1。别想太远。

先下棋。先享受。

他打开APP，和五级AI开了一局。`

  title: "第五十六章 工具上线",
  content: `{{TIME: 九月第二周}}

物流调度优化工具的Web版终于做好了。

花了将近两个月。从命令行脚本到有完整界面的Web应用——这中间的工作量比他预想的大得多。

6. 异常预警：当配送延迟超过阈值时自动提醒

界面不算漂亮——他不是UI设计师。但功能完整，操作简单。

周一早上，他把工具部署到了公司的内部服务器上。

然后——让调度组的同事们开始用。

第一天。

"林远！这个怎么上传文件？"
"等下，我点了计算怎么没反应？哦——要等一下。"
"这个地图加载好慢啊。"

各种小问题。他一个一个解决。

第二天。

问题少了一半。同事们开始习惯了操作流程。

第三天。

主管老张走过来。"今天的方案——我试了一下和我自己排的比较了一下。你这个工具排出来的方案每辆车少跑了大概十公里。六辆车就是六十公里。一个月就是——"

"大约1800公里。按油费算省两千多块。"

老张沉默了几秒。"你小子。"

===

工具上线一周后，经理组织了一次内部评审。

参加的人包括：经理、主管老张、调度组三个同事、IT部的一个技术主管。

林远做了一个简短的汇报——PPT只有六页。

{{PANEL
【物流调度优化工具 v2.0 上线报告】

上线时间：2024年9月第二周
使用部门：物流调度组（4人）

一周数据对比（工具方案 vs 上月人工方案均值）：
▸ 平均每车配送量：+21.3%
▸ 平均配送里程：-16.8%
▸ 准时率：96.7% vs 91.2%（+5.5%）

预计月度成本节约：

年化节约：约6万元
/PANEL}}

IT部的技术主管问了几个技术问题——用的什么算法、数据怎么存储、有没有做备份。

林远一一回答。

技术主管听完后沉默了一下，然后对经理说："这个工具的技术水平——怎么说呢——超出了我对一个物流调度员的预期。如果让我们IT部门做同样的东西，至少要两个月的开发周期，再加一个月的测试。他一个人用了两个月做完了。"

经理说："所以他现在不是调度员了。他是物流优化专员。"

技术主管看了林远一眼。"如果你有兴趣，我们IT部门随时欢迎你。"

林远想了一下。"谢谢。但我现在的岗位挺好的——既能做技术也能接触业务。"

月薪11000。加兼职。月收入将近15000。

七个月前是4500。

"还有一件事，"经理说，"总部那边看了我们分公司最近的配送数据，问为什么效率突然提升了20%。我把你的工具报上去了。他们可能会派人来看看。"

"总部的人？"

"嗯。如果他们觉得这个工具值得推广到其他分公司——那就不只是我们这一家的事了。"

林远的心跳加速了一下。

不是紧张。是期待。

【Web开发 Lv.1 — 198/300 (+131)】
【编程（Python） Lv.2 — 367/600 (+133)】
【物流调度 Lv.2 — 234/500 (+167)】

三项技能大幅增长。做一个完整的产品并上线——系统给予的熟练度比任何单纯的"练习"都多。

{{T: 创造的价值越大，系统给予的回报越大。这不是玄学——这是一个合理的激励机制。系统鼓励的不是"无意义的重复"，而是"有价值的产出"。你做了一个能给公司省六万块的工具——这比你在家写一百个练习脚本的价值大得多。系统看到了这一点。}}`

{
  title: "第五十七章 新的格斗目标",
  content: `{{TIME: 九月第三周}}

工具上线之后的工作节奏反而变轻松了——以前每天早上花四十五分钟做的调度排列，现在三分钟搞定。空出来的时间他可以用来完善工具和做数据分析。

空出来的精力，他投向了格斗。

联赛结束后已经三个月了。他一直在保持训练，但没有参加新的比赛。

唐峰找他谈了一次。

"林远，你下一步想怎么发展？"

"什么意思？"

"格斗方面。你现在是业余联赛亚军。如果继续在这个级别打，你赢不到太多东西了——对手的水平已经不够你成长了。"

这是事实。联赛里除了陈刚，其他人已经无法给他足够的挑战。而挑战不够，熟练度增长就会变慢。

"你的选择有两个。"唐峰说。

"第一，升级别。从65公斤级升到70公斤级。对手更重、更壮。你需要增重五公斤。好处是对手的水平和多样性都会提升。"

"第二，换赛事。从市级业余赛升到省级。同样是65公斤级，但省级的对手比市级强一个档次。有些人练了六七年，有些人是退役专业选手。"

林远想了想。

"第二个。省级65公斤级。"

"为什么？"

"因为增重需要改变饮食和训练方式，会影响跑步和体能训练。而且——我想在同一个体重级别下探索能力的极限。增重只是换了一个变量，不是真正变强了。"

唐峰点了点头。"你这个分析又很'你'。"

"什么意思？"

"每次问你问题你都像在做SWOT分析。"

"……职业病。"

===

省级业余散打赛在十一月。还有两个月的准备时间。

唐峰重新制定了训练计划。

"省级赛的对手有几个特点——第一，技术全面。不会有明显的弱点。第二，体能好。大部分人都经过系统训练。第三，比赛经验丰富。你四场比赛的经验在市级还行，在省级可能是最少的。"

"那我的优势在哪？"

"速度。你的出拳速度在这个级别已经是顶尖的。直拳Lv.3带来的速度优势——虽然我不知道你是怎么做到的——但事实就是你的前手直拳比大多数练了五六年的人还快。"

"第二个优势呢？"

"体能。这不用说了。你跑步Lv.4的心肺耐力在业余格斗界简直是作弊级别的。"

"第三呢？"

"你的适应能力。四场比赛，你每场都在变。第一场还是新手，第四场已经像打了十几场了。如果给你两个月继续比赛——我不知道你会变成什么样。"

林远记下了这些。

然后他问了一个唐峰意想不到的问题："有没有可能找陈刚来陪练？"

唐峰愣了。"陈刚？联赛冠军那个？"

"对。他是我目前遇到过最强的对手。和他练对我的提升最大。"

"我可以问问。但他不一定有时间——他自己也在备赛。"

"帮我问一下。"

===

两天后。唐峰带来了消息。

"陈刚同意了。但他有一个条件——每次陪练他也要对等的训练效果。他不做'陪练沙袋'。"

"当然。全力对抗。"

"他每周三和周六晚上有空。你们可以在我的馆里练。"

"好。"

===

第一次和陈刚正式陪练是周三晚上。

陈刚准时到了。他换好装备之后走到林远面前。

"上次联赛你是唯一一个只输了我一分的人。"

"你也是唯一一个我输了的人。"

两人碰了碰拳套。

"三分钟一组。全力。"陈刚说。

"来吧。"

===

三分钟后。

林远趴在擂台上大口喘气。

三个月前他和陈刚打比赛时，他还能拼一拼。但现在的陈刚——

"你也进步了。"林远说。

"当然。你以为我这三个月在睡觉？"陈刚说，呼吸也有些急促——但比林远好得多。

陈刚的进步体现在两个方面——第一，他的后手摆拳更快了。快到林远即使有条件反射防御也只能勉强格挡。第二，他的抗击打更强了。林远的鞭腿打在他身上，他几乎不为所动。

"再来。"林远站起来。

又是三分钟。

这次林远尝试了寸劲——在近身距离出了一记。

砰。

陈刚的头晃了一下。他退后一步，摸了摸下巴。

"寸劲？"

"嗯。"

"不错。但你的问题是——你只有在近距离才有这个杀手锏。如果我不让你靠近呢？"

说完他开始用长拳控制距离。前手伸得很长，步伐后退得很快。林远根本无法进入寸劲的有效距离。

这就是和高手练的意义——他们会暴露你的弱点。

  content: `{{TIME: 九月第四周}}

总部的人来了。

两个人——一个叫周明的技术总监，一个叫李薇的运营经理。

经理提前跟林远打了招呼："他们主要是来看你那个调度工具的。你准备一下，做个演示。"

周一下午。会议室。

林远打开笔记本电脑，投屏到会议室的大屏幕上。

"这是物流调度优化工具的Web版。我演示一下完整的工作流程。"

他导入了一组测试数据——五十个配送任务，八辆车。

点击"优化"。

三秒钟。结果出来了。地图上显示了八条不同颜色的路线，每条路线上标注了配送顺序和预计到达时间。

"比人工排列节约大概多少？"周明问。

"根据过去一个月的数据，平均节约16-22%的总配送里程，准时率提升5个百分点。"

"算法是什么？"

"改进的贪心算法加局部搜索。先用最近邻启发式生成初始解，然后用2-opt和交换算子做局部优化。"

周明点了点头。"能处理多大规模的数据？"

"目前测试过最大的规模是两百个任务、十五辆车。优化时间大约十五秒。"

"两百个任务够了。我们大部分分公司的日均任务在一百到两百之间。"

李薇问了一个更实际的问题："调度员学这个工具难不难？"

"基本操作培训大约需要半天。我们调度组四个人，学了两天就完全上手了。"

演示持续了一个小时。周明和李薇问了很多细节——数据安全、服务器部署、维护成本、可扩展性。

林远一一回答。有些问题他能答（算法、功能），有些不太确定（企业级部署、安全合规）。

不确定的他直说。"这部分我经验不够。如果要推广到其他分公司，可能需要专业的IT团队做部署和安全审计。"

周明和李薇互相看了一眼。

然后周明说了一句让林远意外的话。

"林远——你有没有兴趣来总部工作？"

===

会后，经理把林远叫到办公室。

"他们的意思是——把你调到总部的技术部门。负责把这个工具产品化，推广到全国二十七个分公司。"

"薪资呢？"

"他们说至少两万。具体看你怎么谈。"

月薪两万。

从四千五到两万。八个月。

"但你不用急着答复。"经理说，"好好想想。总部在省城——你得搬家。而且工作强度不一样——推产品比做产品累得多。"

林远说："我想几天。"

===

回家之后，他坐在书桌前。

不是在想薪资——两万够不够的问题。是在想一个更根本的问题：**这个机会对他的长期成长是不是最优的？**

{{T: 用数据思维分析这个决定。}}

去总部的好处：
1. 薪资翻倍。经济自由度大幅提升。
2. 接触更大的数据量和更复杂的业务场景——编程和数据分析技能会快速成长。
3. 认识更多人。社交网络扩大。

去总部的坏处：
1. 搬到省城。需要找新的住处、新的武馆。训练节奏会被打断。
2. 工作强度可能增加——留给训练和兼职的时间会减少。
3. 离开当前的舒适区——现在的工作已经"够用"了，他的时间分配很稳定。

不去总部的好处：
1. 维持现状。当前的成长速度已经很快了。
2. 保持训练节奏。省级散打赛还有两个月。
3. 兼职收入稳定增长中。不需要依赖单一雇主。

不去总部的坏处：
1. 天花板。当前岗位的成长空间有限。数据量和复杂度不够。
2. 收入增长放缓。兼职虽然在涨，但有上限。
3. 舒适区陷阱——"稳定"有时候是"停滞"的另一个名字。

他在纸上画了一个2×2的矩阵。

然后他意识到——**这个决定不应该只用理性分析。**

因为有一个因素是数据无法量化的——他的直觉。

他闭上眼睛。问自己：你想去吗？

答案几乎是立刻出来的。

**想。**

不是因为钱。是因为——他能感觉到当前环境的极限在哪里。而极限之外还有很大的空间。

他需要更大的舞台。`

  title: "第五十九章 告别",
  content: `{{TIME: 十月第一周}}

林远做了决定——去总部。

但不是马上去。他提出了两个条件：

第一，入职时间推迟到十一月中旬。因为十一月上旬有省级业余散打赛，他不想错过。

第二，到了总部之后，他需要有灵活的工作时间——至少保证每天有两到三个小时的训练时间。

周明通过电话回复了他："第一个条件没问题。第二个条件——你把工具做好了，其他时间你自己安排。我们看结果不看过程。"

条件达成。

===

接下来是一系列的准备工作。

在省城找房子——他在网上看了几十套。最后选了一个离省城体育中心比较近的一室一厅。月租2000元。比现在的1200贵了800块。但位置好——步行十分钟就能到体育中心的公共跑道和健身房。

找新武馆——他让唐峰推荐了省城的几家散打馆。

唐峰在电话里沉默了很久。

"你要走？"

"嗯。总部调我去省城。"

"什么时候？"

"十一月中旬。打完省赛之后。"

"……好。"唐峰的声音有点低。"我给你推荐一个人——刘洪。省城最好的散打教练之一。以前是省队的。你去找他，就说是唐峰介绍的。"

"谢谢唐哥。"

"别谢。你是我教过的最特别的学员。"唐峰说，"别的学员——我教他们招式，他们学招式。你——我教你招式，你回去把整套训练体系都改了。我有时候都不知道是我在教你还是你在教我。"

林远笑了。

"省赛好好打。你能拿名次。"

老张看了文档之后说："你这文档比我们公司IT部门写的都好。"

同事们也陆续知道了他要走的消息。

"林哥，你走了谁来修bug啊？"
"你才来了八个月就被调到总部？"
"月薪两万啊……我在这干了五年还没到一万……"

最后那句让林远有些不好意思。他知道自己的"进步速度"不正常。但他不能解释原因。

武馆最后一次集体训练是十月底。

唐峰安排了一次全馆的实战轮换——每个人和其他所有人各打两分钟。

林远和阿东打的时候，阿东明显有些用力过猛——他在拼命地试图打中林远，好像要把什么东西证明给自己看。

这次林远主动参与了聊天。社交Lv.1虽然等级低，但他已经找到了自己的社交节奏——倾听为主，偶尔分享一个观点或者讲一个训练中的趣事。

阿东喝了几瓶啤酒之后有些感性。"林远，你走了之后我跟谁练啊？你是唯一一个能让我知道自己差距有多大的人。"

大家笑了。

唐峰没怎么说话。他坐在角落里喝茶——他从来不喝酒。

临走的时候，唐峰把林远拉到一边。

"然后你的进步速度验证了我的判断。"唐峰说，"你不是普通人。你有某种东西——我不知道是什么——但它让你学习的方式和所有人都不一样。"

林远没有回答。因为他不知道该怎么回答。

说"我有一个把一切量化的系统"？这听起来太疯了。

"去了省城好好发展。"唐峰拍了拍他的肩膀。"如果省赛拿了名次，回来请我吃饭。"

"一定。"

{{T: 告别是一种奇怪的感觉。你以为你不在乎——因为你有系统，有目标，有计划。一切都是"最优解"。但当你真的要离开一个地方的时候，你才发现——那些不能被量化的东西，也许才是真正重要的。唐峰教给他的不只是拳——还有什么叫"认真对待一件事"。阿东给他的不只是陪练——还有什么叫"因为喜欢而坚持"。这些东西，系统面板上不会显示。但它们确实让他变成了一个不一样的人。}}`

  title: "第六十章 省赛（上）",
  content: `{{TIME: 十一月第一周·周六}}

省级业余散打锦标赛。

场地在省体育中心——标准的室内竞技馆。观众席三千个座位，坐满了大半。

这是一个和市级联赛完全不同的级别。

参赛选手128人，涵盖从56公斤级到91公斤级七个级别。65公斤级有18个参赛者。单败淘汰制——输一场就出局。

林远在后台看了参赛名册。

18个人中，有三个标注了"前省队"，五个标注了"市级冠军"，其他都是各地级市的联赛前三名。

他是整个65公斤级里格斗经历最短的——八个月。排在他前面最短的人也练了三年。

唐峰特地从市里赶过来。他作为林远的教练团成员坐在角落位。

"抽签结果出来了。你第一轮对手是张伟——省城本地的，练了四年，去年省赛八强。"

"实力怎么样？"

"中等偏上。不算最强但也不弱。他的特点是防守好——很难打穿他的防守。"

"防守好的人一般缺什么？"

"进攻主动性。他习惯防守反击，不喜欢主动出击。"

"那就反过来——我也不主动出击。看谁先沉不住气。"

唐峰笑了。"你现在的比赛阅读能力真的不像是只打了四场的人。"

===

上午十点。65公斤级第一轮。

张伟是个中等身材的年轻人。站架很标准——双手高举，肘部夹紧，重心微低。一看就是经过系统训练的。

**第一回合。**

果然。张伟一上来就站在中距离，前手微微伸出，完全是等待的姿态。

林远也没有急着进攻。他也站在中距离。前手伸出。两个人的前手几乎碰在一起。

十秒过去了。没有人出拳。

观众开始不耐烦了——有人在喊"打啊"。

但林远很清楚自己在做什么。他在"读"张伟的身体语言。

格斗流的**战斗直觉**在运转。

{{T: 静止不等于不做事。在这十秒里，他的大脑在高速处理信息——张伟的站位、重心分布、呼吸频率、视线焦点、前手的微动。这些信息拼凑出了一个结论：张伟的重心偏右后方，这意味着他准备用后退步来应对进攻。如果直接冲上去，他会后退然后反击。}}

林远做了一个假动作——右手抬起，像是要出后手直拳。

张伟本能地微微后移了重心。

——就是这个。

林远不是出的后手直拳。而是一记**低鞭腿**。

张伟的注意力在上方，防守反应慢了零点二秒。

啪！

鞭腿扫中了张伟的前腿大腿外侧。

张伟的前腿颤了一下。不是被打倒——而是肌肉被瞬间震颤了。

有效得分。

张伟的表情没变。但他的站架微调了——前腿往回收了半寸，防守鞭腿的检查动作变得更有意识了。

一个好的选手——被同一种攻击打中两次的概率非常低。

接下来的一分半钟，两人在中距离反复试探。

林远的前手直拳打了五次，命中三次——但都不是清晰有效的击打，更多是干扰性的。

张伟的反击打了三次，命中两次——一记后手直拳打在林远的防守手上，一记摆拳擦过了面颊。

第一回合结束。

几乎平手。但林远觉得自己微弱领先——那记鞭腿是全场唯一一次清晰的有效击打。

===

**第二回合。**

张伟终于不等了。

他开始主动进攻——可能是因为觉得第一回合落后了一点。

连续的前手直拳。不是试探——是有力量的快拳。

一二一二。左右交替。

林远后退了两步。

张伟跟上来。后手摆拳。

林远侧闪。

但张伟的摆拳是假的——他收拳之后立刻出了一记**接腿摔**。

等等——他什么时候变成摔法型了？

张伟抓住了林远的前腿——那条用来踢鞭腿的腿。

在被抓住的一瞬间，**战斗直觉**生效了。

林远的反应不是挣脱——而是**跳**。

他用被抓住的那条腿作为支撑轴，另一条腿蹬地向上跳起，同时双手推张伟的肩膀——利用张伟的抓力作为支点，把自己的身体旋转了九十度。

他落地时面朝张伟的侧面——一个极其有利的位置。

而张伟还抓着他的腿——但此刻他的抓握已经变成了不利因素，因为双手被占用了，无法防守。

林远出了一记寸劲。

近距离。正好是寸劲的最佳距离。

砰！

打在了张伟的肋部。

张伟松开了手，退了两步。

裁判举手——清晰有效击打。

"好！"观众席上有人叫好。

张伟揉了揉肋部。他的表情从冷静变成了认真。

剩下的时间两人进入了高强度的对攻。张伟放弃了纯防守反击的风格——他开始全面进攻。

打得很激烈。

林远被打中了两记有力的直拳。张伟被打中了三记鞭腿和一记钩拳。

叮——第二回合结束。

这个回合林远明显领先。

唐峰说："第三回合控制就行。你领先了。"

===

**第三回合。**

张伟拼了。

他知道自己落后，最后一个回合必须拿大分才有可能翻盘。

他的进攻变得非常激进——连续重拳，几乎不留防守。

林远做了最理智的选择——**不对攻**。

后退。格挡。侧闪。偶尔出一记前手直拳打断对方的攻击节奏。

张伟越打越急。

急了就会犯错。

最后三十秒。张伟出了一记发力过猛的后手直拳——身体的惯性让他的重心前倾了太多。

林远看到了这个破绽。

他没有反击。

因为不需要了。

时间到了。

叮——

"蓝方林远获胜。30-27。"

三分优势。赢得不算轻松，但很稳。

省赛第一场——过了。

接下来是半决赛和决赛。一天之内打完。

下午的对手会更强。`
},
{
  title: "第六十一章 省赛（下）",
  content: `半决赛。下午两点。

对手：刘坤。二十七岁。前省队队员。退役两年。

唐峰的脸色变了。"这个人——你得认真对待。他在省队的时候是65公斤级主力。退役是因为受伤，不是因为实力不够。"

"他恢复了？"

"看起来是。他上午的比赛赢得很轻松——第二回合TKO（技术性击倒）。"

TKO意味着对手被打得无法继续比赛。这个人的攻击力很强。

"你的策略，"唐峰想了想，"别硬拼。用你的体能和节奏拖到第三回合。如果能拖到他体力下降——你有机会。"

"他的体能不好？"

"受过伤。右膝。长时间的高强度对抗会让他的膝盖不舒服。第三回合他会降速。"

"明白了。"

===

上台之后，林远第一次在对手身上感觉到了一种不同的气质。

是**从容**。

他的站架不高不低，不紧不松。每一个动作都带着一种"见过世面"的从容——就好像擂台对他来说不是一个紧张的地方，而是他的客厅。

**第一回合。**

裁判一喊开始，刘坤就出了一记前手直拳。

不是试探。是带着力量的。

速度——极快。比林远见过的所有对手都快。

啪。打在了林远的防守手上。

即使格挡了，他的手臂也被震得发麻。

这个人的力量和速度都在另一个层级。

{{T: 这就是专业和业余的差距。不是某一项技能的差距——而是所有技能的综合水平都比你高。他的直拳比你快、比你重。他的步伐比你稳。他的距离控制比你精确。你在他面前就像——一个六十分的全科生对上了一个每科九十分的优等生。}}

林远没有还手。他后退了两步。

不是因为害怕。而是在评估——他需要多少距离才能避开刘坤的攻击范围。

答案：比预想的多半步。

刘坤的有效攻击距离比他宽。

第一回合，林远基本在防守。他用后退和侧移来规避刘坤的进攻，偶尔出一记低鞭腿或者前手直拳来表明"我没有放弃进攻"。

但刘坤打中了他四次。都不是重击——刘坤在控制力度，他也在试探。

第一回合结束。林远判断自己明确落后。

唐峰说："不要急。计划不变——拖到第三回合。"

===

公司总部：步行22分钟，公交15分钟。
省城体育中心：步行10分钟。
唐峰推荐的武馆"弘武散打馆"：公交25分钟。
最近的超市：步行5分钟。
最近的菜市场：步行8分钟。

躺在陌生的床上。天花板是白色的。窗外隐约能听到江面上的船鸣声。

明天开始新生活。

===

报完名之后，他做了一个详细的备赛计划。

他不是那种"反正能跑就去跑"的人。数据思维的存在让他对任何目标都会先做一个量化分析。

{{PANEL
【全马备赛计划】

目标成绩：3小时20分以内（配速约4'44"/km）
理由：按目前的训练水平和半马1:40的成绩推算，全马在3:20-3:30之间是合理预期

备赛周期：4周

周训练量：
- 长跑（周六）：28km → 30km → 35km → 20km（赛前减量）
- 短跑（周二/四）：8-10km，配速训练（比目标配速快10%）
- 力量训练（融入武馆训练）

营养计划：
- 赛前一周碳水加载（增加30%碳水摄入）
- 赛前两天停酒精和咖啡因
- 比赛当天赛前三小时吃早饭（碳水为主）
- 赛中每5km补充能量胶+水

装备：
- 跑鞋：当前的已经跑了400km，需要换新的（碳板竞速鞋）
- 压缩袜
- 运动手表（目前用的手机计时不够准确）

风险评估：
- 35km后的"撞墙"风险——通过长跑训练降低
- 右膝偶尔的不适——赛前需要评估，必要时佩戴护膝
- 天气因素——一月份省城平均气温5-10℃，适合长跑
/PANEL}}

他在网上下单了一双碳板跑鞋（780元）和一块运动手表（1200元）。以前他会觉得这些东西太贵了。但现在月收入两万——这些都在合理的投资范围内。

碳板跑鞋到了之后，他试穿跑了三公里。

脚感——完全不同。

普通跑鞋就像穿着布鞋走路——你知道脚踩在地上，但没什么特别的感觉。碳板跑鞋像踩在弹簧上——每一步落地的时候鞋底的碳板会弯曲储能，然后在起脚的时候释放。

他的配速在没有刻意加速的情况下从5'15"降到了4'55"。

光靠换鞋就快了二十秒/公里。

{{T: 工具的升级对表现的影响不应该被低估。一个木匠用石斧和用铁斧的效率差距是量级级别的。跑步也一样——合适的装备不会让你"变强"，但它能减少不必要的能量损耗，让你已有的实力更充分地发挥出来。这就是为什么专业运动员对装备极其挑剔——每0.1%的效率提升在比赛中都可能是决定性的。}}

===

除了备赛，他还在做另一件事——思考跑步和格斗之间的深层联系。

刘洪说过："多下围棋。"

他确实在下——现在围棋已经升到了Lv.1 178/300，能赢APP的七级AI了。

但他最近在围棋中领悟到的一个概念让他开始重新审视自己的所有训练。

那个概念是——**效率**。

围棋中，一手棋的"效率"指的是这手棋对全局的贡献。有些棋看起来很大（抢了很多地），但实际上效率很低（因为那些地你不下也能拿到）。有些棋看起来很小，但效率极高（因为它在关键时刻堵住了对手的扩张）。

他把这个概念映射到了训练上。

他每天花在训练上的时间大约三到四个小时。这些时间的"效率"有多高？

他用Python分析了过去三周的训练数据——每项训练活动的时间投入、对应的技能熟练度增长。

结果让他有些意外：

{{PANEL
【训练效率分析】

最高效的训练（每小时熟练度增长）：
1. 与孟浩然陪练——每小时72点（格斗类技能总计）
2. 公司代码开发——每小时48点（编程类技能总计）
3. 长距离跑步——每小时35点
4. 兼职数据分析——每小时31点

最低效的训练：
1. 短距离慢跑（<5km）——每小时12点
2. 单独练沙袋——每小时15点
3. Python教程学习——每小时18点

发现：
- 对抗性训练（陪练）效率远高于独自练习
- 有实际产出的活动（工作、兼职）效率高于纯练习
- 短距离低强度训练效率最低

建议：减少低效训练时间，增加高效训练时间。具体——减少短距离慢跑（改为中距离配速跑），减少单独练沙袋（改为陪练），停止看基础Python教程（改为在项目中学习）
/PANEL}}

这个分析改变了他的时间分配。

他不再每天早上跑五公里的慢跑"热身"——改成了三公里的快速配速跑，用更短的时间获得相同甚至更高的训练效果。

他不再花时间看Python教程——因为在工作中写代码的效率是看教程的两到三倍。

他不再独自练沙袋——除非武馆没有陪练的人。

用围棋的话说——他在优化每一手棋的效率。

总时间没变。但产出提高了30%以上。

{{T: 大多数人的低效不是因为他们不够努力——而是因为他们把时间花在了低效率的活动上。一个人每天训练八小时但做的全是低效重复动作，不如另一个人每天训练三小时但每一分钟都花在了刀刃上。效率比时间更重要。这是围棋教给他的第一课——也可能是最重要的一课。}}`

{
  title: "第六十九章 Web开发Lv.2与鞭腿Lv.3",
  content: `{{TIME: 十二月第四周}}

两个技能几乎在同一周升级了。

先是Web开发。

周二。他在公司完成了一个前端组件——调度结果的地图可视化。这个组件用React写的，能在地图上动态显示每辆配送车的路线和当前位置。

小王（前端同事）看了他的代码之后说："你两个月前不是才开始学React吗？这个组件的代码质量已经比我们团队一些干了两年的人好了。"

"赵阳打我打的。"

"什么？"

"代码审查。每次提交都被打回来改。改多了就好了。"

提交代码。通过审查。

【Web开发 Lv.1 → Lv.2！】
【当前：Web开发 Lv.2 — 0/600】

{{LEVELUP: Web开发 Lv.2 解锁效果：
▸ 前端框架熟练运用（React组件化开发）
▸ 前后端联调能力——理解数据从后端到前端的完整流转
▸ 响应式设计意识——自动考虑不同设备的适配
▸ 新增被动：用户体验直觉——能在开发时预感用户可能的操作习惯和痛点}}

第三十九项技能中的又一个Lv.2。

"用户体验直觉"这个被动特别有实用价值——它意味着他在写前端代码时不只是在"实现功能"，还在"思考用户会怎么用"。

他立刻用这个能力审视了一下自己写的那个地图组件。

直觉告诉他——缩放按钮太小了。调度员大多数用的是公司配的笔记本电脑，屏幕不大。在小屏幕上，这个缩放按钮可能不容易点到。

他调大了按钮。又加了一个鼠标悬停提示。

这种微小的改进——以前他不会注意到。

===

然后是鞭腿。

周四晚上。弘武散打馆。

刘洪安排了一次密集的腿法训练——不是和人对打，而是对着沙袋踢。

"你的鞭腿有一个问题。"刘洪说。

"什么问题？"

"你的鞭腿太'标准'了。"

又是这个词——"太标准"。

"标准的鞭腿——转胯、甩腿、小腿加速——打出来的力量是够的。但你知道为什么顶级选手的鞭腿和普通选手的鞭腿差距那么大吗？"

"力量？速度？"

"不。是**穿透力**。"

刘洪让小孟拿了一个手靶。

"你踢一下。用你的标准鞭腿。"

林远踢了一腿。啪。手靶被打得晃了一下。

"再看我的。"

刘洪踢了一腿——他的身高比林远矮几厘米，体重也轻一些。

啪——！

声音完全不同。更沉。更闷。手靶不是晃了一下——而是小孟整个人都被震退了半步。

"区别在哪？"林远问。

"你的鞭腿力量停留在表面——打到目标的瞬间就结束了。我的鞭腿力量是**穿透的**——不只是打在表面，而是穿过表面、打进去。"

"怎么做到的？"

"秘诀在于——击打之后**不要立刻收腿**。大多数人踢完之后本能地要收腿。但如果你在击打的瞬间让腿**继续向前推送**零点一秒——这零点一秒会让力量从'撞击'变成'穿透'。就像子弹和拳头的区别——子弹的穿透力来自它在击中之后仍然保持速度。"

林远试了一下。

踢——击中手靶——**不收腿**——继续推。

第一次。推不动。因为习惯了击中后立刻收腿，强行改变这个习惯需要有意识地控制。

第二次。好一些了。他能感觉到腿在击中手靶后"多停了一下"。但力量不够——因为推送需要额外的肌肉力量。

第三次。

啪——

声音变了。更沉了。接近刘洪的那种声音。

小孟举着手靶说："这一下——有穿透感了。"

林远连续练了五十腿。

在第三十七腿左右——他突然理解了。

穿透力不是"多用力"——而是"多停留"。力量的大小没变，但作用时间延长了。根据物理学，冲量=力×时间。时间延长，冲量增大，传递给目标的动量更大。

这和寸劲的原理殊途同归——寸劲是在短距离内爆发力量（增加力），鞭腿的穿透力是在击中后延长力量的作用时间（增加时间）。两种方式都能增加冲量。

第五十腿。

【鞭腿 Lv.2 → Lv.3！】
【当前：鞭腿 Lv.3 — 0/800】

{{LEVELUP: 鞭腿 Lv.3 解锁效果：
▸ 踢击穿透力——力量不止停留在表面
▸ 踢击角度自由化——能从任意角度出腿
▸ 连踢速度大幅提升——双腿交替踢击几乎无间隔
▸ 新增被动：腿部打击选择——自动判断踢大腿、肋部还是头部的最优选择
▸ 新增主动：重击鞭腿——蓄力一秒，打出超大力度的单腿（需激活）}}

"重击鞭腿"——这是一个蓄力技能。需要一秒钟的蓄力时间。在快节奏的对抗中，一秒钟很长。但如果找到合适的时机——

刘洪看着林远练了几下蓄力鞭腿。

啪——！！

沙袋被踢得链条都在晃。

"好。"刘洪点头。"这是你省赛用鞭腿消耗马骏大腿的升级版。以前你需要踢十几腿才能让对手的腿不舒服。现在——可能三四腿就够了。"

===

鞭腿Lv.3的解锁还带来了一个意料之外的收获——

格斗流的组合技能强度提升了。

因为格斗流的组成技能是：直拳Lv.3 + 鞭腿Lv.3（原来Lv.2）+ 格斗站架Lv.2 + 跑步Lv.4。

现在四个组成技能中有三个达到了Lv.3以上。组合技能的基础更加牢固了。

他在训练结束后试了一下格斗流的流畅度——

直拳→鞭腿→步伐移动→直拳→鞭腿。

比以前更流畅了。而且——鞭腿的穿透力在格斗流的连续输出中效果更好。因为对手在被连续攻击时很难准确判断哪一下是"试探"哪一下是"真打"。当一记带穿透力的鞭腿夹在连续的试探攻击中打出来——

那就是一个陷阱。

{{T: 单个技能的升级会反哺所有与它相关的组合技能。这就是网络效应的力量——你不是在升级一个点，你是在升级一整条链。鞭腿Lv.3 → 格斗流更强 → 实战表现更好 → 比赛中获得更多经验 → 所有格斗技能增长加速。正向循环。}}`

  title: "第七十章 除夕",
  content: `{{TIME: 十二月第四周·周六——农历除夕前一天}}

省城没有雪。但很冷。气温2℃。

林远穿着羽绒服在滨江跑道上完成了三十公里的长跑——全马备赛的最后一次长距离训练。下周就要开始赛前减量了。

配速4'58"/km。比上次快了十七秒/公里。碳板跑鞋的贡献大概占一半，另一半是跑步Lv.4的运动经济性在持续进化。

跑完回家。洗澡。做饭。

今天是除夕前一天。

他看了一下手机——有几条消息。

唐峰："除夕快乐。今年过年你在省城？"
阿东："远哥！过年回来吗？我们馆里聚餐！"
妈妈（一个很少联系的号码）："远远，过年回不回来？你爸做了红烧肉。"

他一条一条回复。

唐峰："在省城。下个月有全马比赛。谢唐哥。新年快乐。"
阿东："回不来。你替我吃一份。新年快乐。"
妈妈的那条——他打了字，删了。又打了字，又删了。

最后发了："不回了。忙。新年快乐。"

===

林远和家里的关系很淡。

不是那种电视剧里的"原生家庭创伤"——没有家暴、没有抛弃、没有刻骨铭心的伤害。只是——淡。

他是独生子。父亲是工厂工人，母亲在超市做收银。两个人都是普通到不能再普通的人。他们不理解林远为什么要去省城——"在老家找个稳定的工作不好吗？"

他也不理解他们为什么要"稳定"——稳定的工作、稳定的生活、稳定的一切。三十年如一日。不好吗？好吧，也许对大多数人来说是好的。但对他来说——

"稳定"是另一种形式的"停滞"。

他从来没跟父母说过系统的事。一个字都没提过。因为他无法解释。而且——他不确定这件事适不适合让任何人知道。

九个月了。从系统出现到现在。他没有对任何一个人透露过半个字。

唐峰怀疑过。刘洪也隐约觉得他"不正常"。但他们把这归结为"天赋"或者"训练方法特别"——这是最合理的、不需要超自然解释的归因。

但林远自己知道——系统不是天赋。它是另一种东西。

{{T: 一个人拥有了某种无法解释的能力之后，他面临的最大挑战不是"怎么用它"，而是"怎么和这个秘密共处"。你不能告诉任何人。因为说了——要么被当成疯子，要么被当成怪物。所以你只能沉默。在沉默中变强。在强大中更加沉默。这是一种独特的孤独——不是没有朋友的孤独，而是"有一件最重要的事无法与任何人分享"的孤独。}}

===

除夕夜。

林远一个人在家。

他做了一桌子菜——红烧排骨、清蒸鲈鱼、蒜蓉西兰花、番茄蛋花汤、一碗白米饭。

烹饪Lv.2的调味直觉和火候感知让每道菜都做得恰到好处。排骨软烂入味，鱼肉鲜嫩。

他给自己倒了一杯可乐——赛前两天不喝酒。

一个人吃年夜饭。

电视开着，春晚的声音从手机里传出来。但他没怎么看。

他在想过去的九个月。

九个月前的除夕——他大概也是一个人过的。那时候他在仓库做理货员，月薪4500，住在一个800块的隔断间里。年夜饭是方便面加一个卤蛋。

现在——月薪两万，省城一室一厅，自己做的一桌子菜。

数字上的变化是最表面的。更深层的变化是——

九个月前他不知道自己"能做什么"。他对自己的认知是"普通人"。不擅长任何事。没有特长。没有方向。

现在他知道了——他可以做很多事。格斗、跑步、编程、数据分析、围棋。每一样都超过了大多数人。

不是因为他比别人聪明或者比别人有天赋。而是因为他有系统——而且他愿意**用**这个系统。

系统不会让你自动变强。它只是告诉你进度。真正让你变强的是——每天五点半起床跑步、每天在武馆挨打两个小时、每天写代码到深夜。

系统是地图。路还是要自己走。

===

吃完饭。洗碗。

他打开笔记本电脑。不是加班——而是做他每个月月末都会做的事：更新成长日志。

{{PANEL
【第39周·年终总结】

九个月成长记录：

基础数据：
- 技能总数：39项（年初0项）

- 最高等级：跑步 Lv.4
- Lv.3技能：5项（跑步Lv.4、数据录入Lv.3、直拳Lv.3、数据分析Lv.3、编程Lv.3）
- Lv.2技能：15项

格斗成就：

- 省级业余散打锦标赛亚军

跑步成就：
- 半程马拉松完赛（1:40:17）
- 全程马拉松备赛中

人生变化：
- 从仓库理货员 → 物流优化专员 → 总部数据组成员
- 从小城市 → 省城
- 从零社交 → 有教练、队友、同事组成的社交网络

最重要的发现：
1. 技能闭环理论——已验证三个闭环
2. 协同训练效应——30-40%效率提升
3. 组合技能可以叠加使用
4. 效率比时间更重要
/PANEL}}

他看着这份总结。

九个月。

如果按照这个速度继续——再过九个月，他会在哪里？

他无法预测。因为技能的增长不是线性的——它是指数的。组合技能的出现让增长曲线更加陡峭。而且他还没有探索到系统的边界——如果存在更高级的组合（组合技能的组合），增长速度可能会再次跃升。

但有一件事他可以确定——

他不会停下来。

窗外，零点的钟声响了。远处有零星的烟花在夜空中绽开。

新年快乐。

林远关掉电脑。去阳台看了一会儿烟花。

然后回来洗漱。设好五点半的闹钟。

明天——大年初一——他依然会五点半起床。

终点线在前方两百米。

  title: "第七十二章 赵阳",
  content: `{{TIME: 一月第四周}}

全马之后休整了三天。

周四恢复上班。赵阳看到他走路有些僵硬。

"怎么了？受伤了？"

火锅的热气腾腾中，气氛比办公室轻松了很多。

这是第三个问这个问题的人了。唐峰、刘洪，现在是赵阳。

"没有秘密。"林远说。"就是——我比较善于把不同领域的知识做关联。你教我的数据库设计原理，我会和我以前做的物流调度做类比。类比能加速理解。"

赵阳若有所思地点了点头。他没有追问。

  title: "第七十三章 围棋Lv.2",
  content: `{{TIME: 二月第一周}}

围棋的进步比林远预期的快。

原因是——他找到了对手。

不是APP里的AI。是一个真人。

事情的起因是赵阳。有一天中午吃饭的时候，赵阳提到自己小时候学过围棋。"学了两年。大概业余二段的水平。后来太忙就不下了。"

"和我下一盘？"林远立刻说。

赵阳笑了。"你也下围棋？"

第一盘。赵阳赢了。赢了大约二十目。

第二盘。赵阳赢了。但只赢了八目。

第三盘——第二天中午——赵阳赢了三目。

第四盘。林远赢了。赢了一目。

赵阳放下棋子，看了他很久。

"你学围棋学了多久？"

"三个多月。"

"三个多月就能赢业余二段？"

"你好久没下了。可能退步了。"

"我确实退步了。但你的进步速度——不对。不对劲。"

{{T: 围棋的进步速度之所以这么快，有两个原因。第一，数据思维的"模式迁移"被动让他能把格斗和数据分析中的战略思维直接应用到围棋上。第二，和真人下棋比和AI下棋效率高得多——因为真人的棋路不可预测，每一盘都是新的学习材料。就像格斗中和人陪练比打沙袋有用一样。}}

"你呢？注册一个试试。"赵阳把平台链接发给了他。

林远注册了。晚上在平台上下了五盘。三胜两负。

系统给他定的初始等级是——业余二段。

和学了两年的赵阳差不多。但他只学了三个多月。

周五晚上。他在平台上和一个标注为"业余三段"的人下了一盘。

这盘棋下了四十分钟——是他下过的最长的一盘。对方的棋风非常沉稳，中盘的战斗极其复杂。

最终林远赢了。赢了半目——最小的胜利差距。

但这半目之差的背后，是他对全局的判断比对手精准了那么一点点。

然后系统面板出现了——

【围棋 Lv.1 → Lv.2！】
【当前：围棋 Lv.2 — 0/600】

同一个底层能力。同一种战略思维。

不同的表现形式。

围棋教他的"全局判断"能力正在渗透到他的每一个领域——

格斗中：不再只关注眼前的得分，而是思考整场比赛的节奏和战略。
工作中：不再只关注手头的代码，而是思考整个产品的架构和方向。

  title: "第七十四章 孟浩然",
  content: `{{TIME: 二月第二周}}

{{T: 系统给了我加速成长的能力，但不代表我可以放松。越到后面，提升的难度只会越大。Lv.3到Lv.4的经验需求可能是Lv.2到Lv.3的三倍以上。而且——拳击只是一个领域。我现在有多少技能在Lv.3以上？编程、烹饪、格斗流、拳击……四个。一千章——不，一千个技能的上限在哪里？Lv.10？Lv.20？还是没有上限？}}

他闭上眼睛。

高铁窗外的风景飞速后退。

——

省城。

下午三点二十分，林远走出火车站。

四月的省城已经有了初夏的味道。空气比北京湿润，风里带着法国梧桐的气味。

他拖着行李箱走向公交站。

手机响了。

唐锋："哥！看新闻了！全国冠军！我跟你说，现在我们拳馆里所有人都知道你了——孟教练把你的决赛视频发到群里了，转发了八十多次！"

"别夸了。"

"不是夸，是事实！你知道孟教练说什么吗？他说你是他带过的进步最快的学员。注意——不是'之一'。"

林远上了公交车。

"回去先休息两天。后天去拳馆。"

"收到！对了，刘虹姐让我问你——你在北京是不是认识了个女孩？"

"……谁说的？"

"你庆功宴那天发的朋友圈——烤鸭的照片。刘虹姐说，一个人吃全聚德不会点那个双人套餐。"

林远沉默了两秒。

"那是——"

"哥，不用解释。刘虹姐说了，她支持你。她原话是：'小远终于开窍了。'"

"挂了。"

"别挂啊——"

他挂了。

{{T: ……朋友圈。我忘了。我发了一张烤鸭的照片。但我没发苏晚的照片。刘虹是怎么从一张烤鸭照片里推断出"有个女孩"的？女人的直觉——这大概是系统永远无法量化的技能。}}

——

回到出租屋。

一切如故。桌上的笔记本电脑、墙角的沙袋、冰箱里过期的牛奶、窗台上半死不活的绿萝。

他放下行李，先把过期牛奶倒掉，给绿萝浇了水。

然后坐到电脑前。

打开公司内部系统。

离开五天，积攒了一百多条未读消息。

他一条条看。

大部分是日常工作通知。有三条是王总发的——关于Phase 4产品部署的进度确认。有一条是新来的产品经理发的需求变更。还有一条——

"林远，恭喜你拿了全国冠军。公司的人都看到新闻了。你什么时候方便，来我办公室聊一下。——王志远"

林远看了看时间。下午四点。

他回了一条："王总，明天上午可以。"

回复很快："好。十点。"

他关掉消息窗口，打开代码编辑器。

Phase 4的部署还有三个城市没有完成。成都、武汉、长沙。预计两周内要全部上线。

他花了一个小时review了同事在他不在时提交的代码。

{{PANEL}}
代码审查结果：
- 张伟提交的支付模块：3个潜在bug，已标注
- 李明提交的数据看板：逻辑正确，但SQL查询效率可优化
- 新产品经理的需求变更：涉及用户权限模块重构，工作量预估40人时
{{/PANEL}}

他把review意见发到工作群里，然后关掉电脑。

站起来。

走到窗边。

夕阳把整个城市染成橙色。

手机亮了。

苏晚：到了吗？

他愣了一下。想起来——他忘了说"到了"。

林远：到了。四点到的。忘了说。

苏晚：我说了不用特意告诉我。

林远：但你问了。

对面沉默了很长时间。

苏晚：……你的逻辑很好。

然后：肩袖训练的视频看了吗？

林远：还没。

苏晚：今天做。不要拖。肩袖肌群的微损伤如果不及时处理，积累到一定程度会形成撞击综合征。

林远：好。

他放下手机。

走到那个挂在墙角的沙袋前面。

没有打它。

而是按照苏晚发的视频，做了三组肩袖离心训练。

用一条弹力带。

每组15次。

很轻的重量。很慢的速度。很无聊的动作。

但他做得很认真。

{{PANEL}}
{{LEVELUP: 运动康复·基础训练 Lv.0 → Lv.1}}
关节活动度评估准确率 +30%
康复训练动作标准度 +40%
伤病预防意识 +50%
新增能力：自我筋膜放松（基础手法）
{{/PANEL}}

{{T: 又一个新技能。运动康复。这是苏晚的专业领域。如果说我的系统是"万物皆可量化"——那苏晚就是"万物皆可分析"。她用她的方式理解人体，我用我的方式。也许……这就是我觉得和她聊天不累的原因。我们都是把世界拆解成可分析单元的人。只是工具不同。}}`
},
{
  title: "第九十二章 王总的提议",
  content: `第二天。上午十点。

王志远的办公室。

"坐。"王志远给他倒了一杯茶，"先恭喜你。全国冠军——说实话，我们公司成立三年，出了一个全国拳击冠军，这是我没想到的。"

"谢谢王总。"

"我让行政把你的比赛新闻发到了公司公众号上。阅读量比我们任何一篇产品推文都高。"王志远笑了一下，"市场部的人问我，能不能让你代言我们的产品。"

"我不适合——"

"我拒绝了。"王志远摆手，"你是技术负责人，不是吉祥物。找你来不是聊这个。"

他打开电脑，转过屏幕。

"Phase 4部署。成都、武汉、长沙。原计划两周。但客户那边提出了一个新需求——他们想要一个实时数据大屏。在三个城市的运营中心各放一块。"

林远看了看需求文档。

"这个大屏需要接入所有终端的实时数据？"

"对。交易量、用户活跃度、异常告警、服务器负载——全部实时更新。客户的原话是：'我要站在大屏前面就能看到整个系统的心跳。'"

林远快速扫了一遍技术要求。

{{T: WebSocket实时推送、数据聚合服务、前端可视化大屏……工作量不小，但技术上没有什么不可实现的。关键是时间——两周内要同时完成部署和大屏开发。}}

"王总，两周内同时完成部署和大屏，人手不够。"

"我知道。所以——"王志远看着他，"我准备给你扩团队。目前技术部算你在内六个人。我打算再招三个。你来面试，你来选。"

林远沉默了一下。

"王总，我只是技术负责人，不是——"

"从今天起，你的title是技术总监。"王志远说，"薪资涨30%。但同时——你的职责也变了。不只是写代码。你要管人、管项目、管进度。"

{{PANEL}}
系统提示：
职业技能树分支检测——
当前路径：技术专家（Individual Contributor）
新增路径：技术管理（Tech Lead → Engineering Manager）
是否接受分支？
注：两条路径可并行发展，但管理路径将消耗额外的时间和精力资源
{{/PANEL}}

林远看着只有自己能看到的面板。

{{T: 技术管理。这是一条我没有走过的路。写代码我有系统加持，但管人——管人是什么技能？团队管理？沟通协调？向上汇报？这些东西……系统能量化吗？}}

"我考虑一下。"

"不急。但大屏的事情——下周一之前给我一个技术方案。"

"好。"

——

从王总办公室出来，林远回到工位。

张伟凑过来："远哥，听说你升技术总监了？"

"消息传这么快？"

"王总的秘书五分钟前在行政群里发了通知。"张伟竖起大拇指，"远哥，我早就说你该升了。你的代码review比我见过的任何CTO都细致。"

"别拍马屁。说正事——Phase 4部署，成都站的环境配置做到哪了？"

"数据库迁移完了，正在做接口联调。预计后天能进UAT。"

"好。另外——新需求，实时数据大屏。我下午出方案，晚上开个技术会。"

"收到。"

张伟走了。

林远坐到工位上，打开白板软件，开始画架构图。

数据大屏的技术架构并不复杂，但要做好却需要精细的设计。

他花了三个小时，画出了一套完整的方案——

{{PANEL}}
实时数据大屏技术方案 v1.0：
1. 数据采集层：各终端通过MQTT协议上报数据，延迟 < 500ms
2. 数据聚合层：Kafka消息队列 + Flink实时计算引擎
3. 存储层：时序数据库InfluxDB（近期数据） + PostgreSQL（历史数据）
4. 展示层：WebSocket推送 + ECharts/D3.js可视化
5. 部署方案：Docker容器化，K8s编排，三城市独立部署+中央监控
预估工期：10个工作日（现有团队）→ 7个工作日（扩招后）
{{/PANEL}}

方案画完，他发到了技术群里。

然后打开招聘网站。

三个岗位：一个高级后端、一个前端（数据可视化方向）、一个运维。

他花了二十分钟写完三份岗位JD。

{{PANEL}}
{{LEVELUP: 技术管理 Lv.0 → Lv.1}}
团队任务分配效率 +35%
技术方案设计完整度 +25%
跨部门沟通能力 +20%
新增能力：简历筛选直觉（可快速识别候选人技术深度与项目匹配度）
{{/PANEL}}

{{T: 果然，管理也是一种技能。而且一上手就升级了——说明系统认为我之前在review代码、分配任务的过程中已经积累了大量的隐性经验。只是没有被"触发"。现在有了正式的管理职责，这些经验被正式归类了。}}

——

晚上。

技术会开完。方案通过。

他回到出租屋，洗了个澡，坐到床上。

打开微信。

苏晚的朋友圈更新了一条——一张膝关节MRI影像的截图，配文："今天的病例：前交叉韧带重建术后8个月，活动度恢复到95%。康复是一场漫长的战争。"

下面有三个点赞，都是看起来像医学生的头像。

林远犹豫了一下。

点了个赞。

然后退出朋友圈。

三十秒后。

苏晚的消息来了：你今天做肩袖训练了吗？

林远：做了。三组，每组15次。

苏晚：感觉怎么样？

林远：第二组的时候肩关节内侧有轻微酸胀感，第三组消失了。

苏晚：这是正常的。说明冈下肌有轻度疲劳，但没有损伤。继续保持，一周后酸胀感会完全消失。

林远：好。

沉默了一会儿。

他打了一行字：你今天的病例——前交叉韧带重建。你自己也是ACL受伤退役的？

发送。

已读。

很长时间没有回复。

他以为自己问了不该问的问题。

然后消息来了。

苏晚：对。大三那年。400米栏。跨最后一个栏的时候，左膝外翻，前交叉韧带断裂。

苏晚：手术很成功。康复也很顺利。但竞技状态回不去了。差0.3秒。

苏晚：0.3秒在400米栏里是一条河。

苏晚：所以我转了运动康复。

苏晚：把自己修不好的东西，用来修别人。

林远看着这五条消息。

{{T: 她用了五条消息。每一条都很短。每一条都很克制。但五条加在一起——是一个完整的故事。一个运动员的梦碎了。然后她把碎片捡起来，拼成了另一个形状。这需要多大的勇气？0.3秒。她说这个数字的时候，一定已经在心里重复了几千次。}}

林远：0.3秒是一条河。但你从河的这边走到了另一边。

苏晚：……你的文学水平比你的拳击水平高。

林远：我的文学水平大概Lv.1。

苏晚：？

林远：没什么。一个内部梗。

苏晚：你这个人说话经常让人听不懂。

林远：习惯就好。

苏晚：谁说我要习惯了？

林远盯着这句话看了很久。

"谁说我要习惯了？"

{{T: 这句话——它可以理解为"我才不要习惯你的说话方式"。也可以理解为"谁说我们会相处到需要习惯的程度"。但不管哪种理解——它都暗含了一个前提：她在想象一种持续相处的可能性。否则"习惯"这个词根本不会出现。语言学的精妙之处在于——人们否认的东西，往往就是他们心里在想的东西。}}

他没有回复这条消息。

因为他不知道该说什么。

他把手机放在枕头旁边。

关灯。

天花板上有一小片月光。

他闭上眼睛。

但过了很久才睡着。`

{
  title: "第九十三章 面试",
  content: `一周后。

林远面试了十二个人。

招聘市场上的技术人员良莠不齐，但系统给了他一个独特的优势——

{{PANEL}}
技能：简历筛选直觉（技术管理 Lv.1附属能力）
效果：在阅读简历时，可直觉性判断候选人的技术深度是否与简历描述匹配
准确率：约70%
{{/PANEL}}

第一天面了六个人。

两个高级后端。三个前端。一个运维。

高级后端第一个候选人叫赵磊，35岁，简历上写着"8年Java经验，精通微服务架构"。

面试开始五分钟，林远就知道了——这人的"精通"大概相当于系统里的Lv.2。

"赵磊，你简历上提到用Kafka做过消息中间件。说说你在Kafka里是怎么处理消费者端的消息幂等性问题的？"

"呃……一般用消息ID去重？"

"具体怎么去重？用Redis？数据库唯一索引？还是业务逻辑层面？"

"……都可以吧。看场景。"

"那在你做的那个订单系统里，你选了哪种方案？为什么？"

沉默。

"我记得当时是用Redis做的……"

"Redis的key过期策略是什么？如果消息延迟超过了key的TTL怎么办？"

"……"

面试结束。

{{T: 不行。技术深度不够。简历上的"精通"是面试市场的通胀词——就像Lv.5的人说自己是Lv.8。}}

第二个高级后端候选人。

周文博。28岁。简历简洁——没有写"精通"任何东西。项目经历只列了三个，但每个都写了具体的技术难点和解决方案。

林远看到简历的时候就有一种直觉——

{{T: 这个人有东西。}}

面试开始。

"周文博，你在上一家公司做的实时计算平台，日处理量多少？"

"峰值每秒12万条。日均8亿条左右。"

"用的Flink？"

"对。Flink SQL + 自定义UDF。但后来数据倾斜严重，我们改了分区策略——按业务ID的哈希值做二次分区，配合Flink的rescale算子，把热点key的处理延迟从2秒降到了200毫秒。"

林远眼睛亮了。

"数据倾斜的识别你是怎么做的？"

"先在Flink Web UI上看各subtask的数据量分布。如果某个subtask的处理量超过平均值3倍以上，就判定为倾斜。然后用日志采样分析具体是哪些key导致的。"

"如果倾斜的key是动态变化的呢？"

"我们后来做了一个自适应的分区器——每5分钟统计一次key的分布，动态调整分区策略。这个方案上线后，SLA达标率从92%提升到了99.5%。"

面试持续了四十分钟。

{{PANEL}}
面试评估——周文博：
技术深度：★★★★☆（约Lv.4水平）
系统设计能力：★★★★（约Lv.3-4水平）
问题解决思路：清晰、有条理、注重数据驱动
沟通表达：简洁准确
综合评价：强烈推荐录用
{{/PANEL}}

"周文博，你期望薪资多少？"

"年包45万。"

"我们最多给到40。但——我可以保证你在这里能接触到完整的实时数据链路，从采集到展示。而且你来了之后，实时计算这块你全权负责。"

周文博想了一下。

"行。"

——

前端面试。

三个候选人里，有一个叫陈薇的女生让林远印象深刻。

25岁，毕业两年。简历上最醒目的不是她的工作经历，而是她的GitHub——有一个开源的数据可视化组件库，star数1200+。

"陈薇，你这个组件库里的3D地图组件是基于Three.js还是自研的渲染引擎？"

"Three.js做底层渲染，但上面封装了一套声明式的API。用户不需要懂WebGL，只要传入GeoJSON数据和配色方案就能生成3D地图。"

她打开电脑，现场演示了一个案例——一个城市的实时交通流量热力图，数据点在三维空间中像呼吸一样起伏。

"这个动画的帧率是多少？"

"60fps。我用了instanced rendering做了批量渲染优化，10万个数据点的情况下也能保持流畅。"

{{T: 她的数据可视化能力大概在Lv.4。比大多数工作五六年的前端都强。而且——她有开源项目。这说明她有自驱力和技术热情。这种人不需要管，你只需要给她方向。}}

"陈薇，我们在做一个实时数据大屏。三个城市，同时展示交易量、用户活跃度、服务器负载、异常告警。你能做吗？"

"什么时间要？"

"两周。"

"可以。但我需要后端提供标准化的WebSocket数据推送接口，文档要清晰。"

"我来保证。"

"那没问题。"

录用。

——

运维岗位。

面了两个人。第一个中规中矩，第二个叫李伟杰，有点特别——

他不是科班出身。大专学历，自学Linux和Docker，在上一家公司从网管做到了运维工程师。

简历上最特别的一行："自建家用服务器集群（3台NUC + 1台NAS），运行K3s + Prometheus + Grafana，7×24小时监控。"

"你在家里搭了K3s集群？"林远问。

"对。三个节点，跑了十几个容器。我自己写了一套自动化部署的Ansible脚本。"李伟杰说起这个的时候眼睛发亮，"去年双十一的时候，我还模拟了一次流量高峰——用Locust做压测，把集群打到了CPU 95%，然后看K3s的自动扩缩容是怎么工作的。"

"结果呢？"

"HPA的响应时间大概是30秒。对于生产环境来说太慢了。所以我后来配置了基于自定义指标的预测性扩缩容——用前5分钟的请求速率趋势来提前扩容。"

林远看着他。

{{T: 这个人的学历不好看。但他在家里搭集群做压测——这种事情，是发自内心的热爱才会做的。技术可以学，学历可以补，但热爱没法伪装。}}

"对。还画了一张网络拓扑图。"他从包里掏出一张A4纸，上面密密麻麻画满了网络拓扑节点。

林远接过来看了三十秒。

"这张图有一个地方画错了——成都和武汉之间的专线带宽不是100M，是200M。"

"噢——我在官网上没找到这个数据，是估算的。"

"其他都对。"

录用。

当晚。

林远在微信上跟苏晚聊天。

林远：今天面试了十二个人。录了三个。

苏晚：你面试别人？你不是写代码的吗？

很长的沉默。

苏晚：你的观察力用在拳击上是天赋。用在聊天里是——

苏晚：算了。

苏晚：你这周的训练计划安排了吗？

林远笑了一下。

{{T: 她转移话题了。这是第二次——每次聊天触及到"感情"的边界，她就会用专业话题来转移方向。像一个训练有素的运动员遇到无法应对的战术时，退回到自己最熟悉的位置。这是一种防守。但防守——意味着她知道有东西需要防守。}}

林远：有。孟教练。但他主要负责技术训练。体能和康复这块我自己摸索。

苏晚：自己摸索是最容易受伤的方式。

苏晚：我给你出一个训练方案吧。周期化的。包括力量、耐力、柔韧性和康复。

林远：你不是说这不是关心吗？

苏晚：这是——

苏晚：学术合作。

苏晚：我正好在做运动员训练周期化的课题。你可以做我的案例。

林远：所以我是你的实验对象。

林远：好。谢谢。

林远放下手机。

{{T: 为了科学。}}`

  title: "第九十四章 新团队",
  content: `周一。

三个新人正式入职。

周文博、陈薇、李伟杰。加上原来的张伟、李明、王浩，技术团队扩展到了九个人。

林远把所有人叫到了会议室。

"简单介绍一下。周文博，负责实时计算和后端架构。陈薇，负责数据可视化和前端。李伟杰，负责运维和部署。"他看了一圈，"老员工就不介绍了，你们自己认识。"

"远哥，要不要搞个团建？"张伟提议。

"不搞。时间紧。"林远打开投影，"直接说事——Phase 4部署 + 实时数据大屏，两周完成。我把任务拆一下。"

他在白板上画了一个时间表。

"第一周：成都站部署 + 大屏后端开发。第二周：武汉长沙部署 + 大屏前端联调。具体分工——"

"周文博，你带张伟做后端。Kafka集群搭建、Flink实时计算、WebSocket推送接口。三天出第一版API。"

"明白。"周文博简洁地点头。

"陈薇，大屏UI设计和前端开发。我明天给你需求文档和数据接口规范。第四天开始联调。"

"没问题。有一个请求——我需要看一下各城市运营中心的大屏硬件参数。分辨率、尺寸、接口。"

"李伟杰，你去对接硬件信息。同时，成都站的K8s集群环境今天开始搭。"

"收到。我昨天已经预先看了一下成都那边的网络情况——有一个小问题，成都运营中心的出口带宽只有50M，可能不够。我建议升级到200M，或者在本地部署一个CDN节点。"

林远看了他一眼。

"你昨天看的？你今天才入职。"

李伟杰有点不好意思："我……提前准备了一下。"

"好习惯。方案通过。你今天就联系阿里云那边申请带宽升级。"

"是。"

会散了。

新老员工开始磨合。

林远回到工位。他没有立刻写代码。而是打开了一个表格——团队能力矩阵。

他把每个人的技术栈、强项、弱项都列了出来。

{{PANEL}}
团队能力矩阵：
┌──────────┬────────────┬──────────────┬──────────┐
│ 成员     │ 核心技能   │ 强项         │ 待提升   │

{{T: 管理的本质——不是自己做所有事情，而是把合适的人放在合适的位置上。这和下棋有点像。每个人都是一枚棋子，有自己的走法和能力范围。管理者的工作是让每枚棋子发挥最大的效能。}}

——

接下来的日子，整个团队进入了高强度的冲刺状态。

周文博果然是那种不需要管的人。他接手后端之后，第一天就把整个数据流的架构图画清楚了，第二天Kafka集群就搭好了，第三天Flink的实时计算任务已经跑起来了。

"林总，WebSocket推送接口的文档写好了。"他走到林远工位旁边，把一份规范文档递过来。

林远翻了一遍。

"为什么用protobuf做序列化而不是JSON？"

"数据量大。实时推送每秒上千条消息，protobuf比JSON体积小60%，解析速度快10倍。大屏渲染对延迟敏感，这个优化有必要。"

"考虑得周全。通过。"

周文博走了。

林远看着他的背影。

{{T: 这个人的技术能力确实在Lv.4。而且他有一个我很欣赏的特质——每个技术决策都有明确的理由。不是"我觉得"，而是"数据表明"。这种人在团队里是锚点——他能把整个后端的技术标准提升一个量级。}}

陈薇那边也在飞速推进。

她在第二天就交出了大屏的设计稿——三块大屏，分别展示交易数据、用户数据和系统运行状态。每一块都有动态的数据流动效果，像血管里的血液一样在节点之间流转。

"很好。"林远说。他很少在技术讨论中用"很好"这个词。

——

与此同时。

每天晚上，他和苏晚的聊天变成了固定节目。

不是约好的——是自然形成的。

每天晚上十点左右。他做完当天的工作。她结束实验室的课题。两个人打开微信。

林远：7-8。最后一组接近力竭。

苏晚：那下周可以加到85kg。但如果RPE超过9，立刻停。

有时候聊的不是训练。

苏晚：你为什么开始练拳击？

林远：偶然。去年路过一个拳馆，进去看了一下，就开始了。

苏晚：没有什么特别的原因？不是为了防身？不是为了减肥？不是为了……耍帅？

林远：如果非要说一个原因——大概是因为我想知道自己能做到什么程度。

苏晚：什么意思？

林远想了想该怎么表达，而不暴露系统的存在。

林远：你有没有那种感觉——世界上有很多技能，每个技能都有一个"天花板"。大多数人很快就会碰到天花板，然后停下来。但如果……天花板不存在呢？如果你在任何领域都能一直进步，永远不到极限——你会怎么选？

苏晚：你在说你自己。

林远：也许吧。

苏晚：我理解这种感觉。我以前跑400米栏的时候也有过——每次突破一个成绩，就觉得还能更快。没有尽头。直到——

苏晚：直到身体告诉我尽头在哪里。

苏晚：而且你的比喻让我想到一个东西。

苏晚：如果天花板真的不存在——那最危险的事情不是"碰到极限"。是"迷失在无限里"。

苏晚：没有边界的世界——其实比有边界的更可怕。因为你不知道该在哪里停下来。

{
  title: "第九十五章 成都站",
  content: `第一周结束。

成都站部署完成。

林远带着李伟杰飞到成都做最后的现场验收。

成都运营中心在天府软件园的一栋写字楼里，23层。落地窗外是成都的天际线——远处的雪山在四月的薄雾里若隐若现。

"林总，所有容器都已经部署完成。"李伟杰在机房里指着监控面板，"Kubernetes集群三个master节点、五个worker节点，全部绿灯。带宽升级也到位了——200M对等。"

"压测数据呢？"

"昨晚跑了8小时的全链路压测。QPS峰值打到了预估的1.5倍，P99延迟在120毫秒以内。数据库连接池在高峰期使用率82%，还有余量。"

"告警系统呢？"

"Prometheus + Grafana + 企业微信webhook。CPU超过80%、内存超过75%、磁盘超过85%——自动告警到运维群。我还加了一个自定义指标——业务异常率。如果每分钟的异常请求占比超过1%，直接打电话给我。"

"打电话？"

"对。用的阿里云的语音通知服务。每个月30块钱。比漏掉一个线上事故便宜。"

林远点了点头。

{{T: 李伟杰这个人——把运维当成自己的孩子在养。每一个告警阈值、每一个监控面板、每一条自动化脚本——都打磨得一丝不苟。这种人不是在"工作"，是在"经营"。}}

现场验收通过。

客户方的负责人赵总参观了机房和大屏。

大屏还没有正式上线——陈薇的前端还在联调中——但李伟杰临时用Grafana搭了一个过渡版本的监控面板。虽然没有陈薇设计的那种"呼吸动画"，但数据是实时的、准确的。

"数据刷新速度不错。"赵总指着屏幕上跳动的数字，"这个交易曲线是实时的？"

"是。延迟在500毫秒以内。"林远说。

"行。成都站我满意。武汉和长沙什么时候？"

"下周。同步部署。"

"好。另外——"赵总把林远拉到一边，"你们的大屏最终版什么时候能看到效果？"

"本周五前端联调完成，下周一可以演示。"

"我等着。"

——

从成都回来的飞机上。

林远靠在座椅上，闭着眼睛。

手机上有苏晚发来的消息。

苏晚：你的训练方案我做了一版更新。加了一个心率区间的要求——你的有氧训练要控制在最大心率的65%-75%之间。太高了容易疲劳积累，太低了没有训练效果。

苏晚：你有心率手环吗？

林远：没有。

苏晚：买一个。华为或者Garmin都行。数据要能导出的那种。

林远：好。

苏晚：还有。你上次说你深蹲80kg。你的体重多少？

林远：74kg。

苏晚：负重比1.08。不错，但不够。你的拳击体重级别是次中量级？

林远：对。69-75kg。

苏晚：那你的深蹲目标应该是体重的1.5倍，也就是111kg左右。这个数字到了之后，你的出拳力量会有质的提升。

林远：你怎么知道拳击的力量标准？

苏晚：我查的。

苏晚：为了给你做训练方案，我这周读了六篇拳击运动员体能训练的文献。英文的。

林远看着手机屏幕。

{{T: 她为了给我做训练方案，读了六篇英文文献。这不是"职业习惯"。这不是"学术合作"。这是——一个人愿意为另一个人花时间。时间是世界上最诚实的度量衡。你可以用语言否认关心，但你没办法用语言解释为什么你愿意在深夜读六篇英文论文。}}

林远：谢谢。

苏晚：不用。这是为了——

林远：科学。我知道。

苏晚：……

苏晚：你学会抢我台词了。

林远笑了。旁边座位的商务人士看了他一眼。

他收敛了表情，把手机放下。

窗外是云层之上的世界。

夕阳把云海染成金色和紫色。

他想起苏晚说的那句话——"没有边界的世界比有边界的更可怕"。

{{T: 可是苏晚。你就是我的边界。你让我的"无限"有了一个方向。你让我在所有可能的技能里，选择了一个不属于任何技能树的东西——想见你。这不是一个技能。系统无法量化它。但它比所有Lv.5的技能加起来都强大。因为它让我有了一个理由——不是"我能做到什么程度"，而是"我想成为什么样的人"。}}`

{
  title: "第九十六章 大屏上线",
  content: `周五。

大屏联调完成。

陈薇做出来的效果远超林远的预期。

三块86寸的大屏并排放在会议室里。灯光调暗之后——整面墙变成了一个数据的星空。

左侧屏幕：交易数据流。

数据以粒子流的形式在城市节点之间流动。每一笔交易都是一个光点，从起始节点出发，沿着弧线飞向目标节点。颜色代表交易类型——蓝色是支付、绿色是转账、橙色是退款。光点密集的时候像一条银河。

中间屏幕：用户活跃度热力图。

三个城市的地图用3D的方式呈现，建筑群像积木一样矗立在地图上。每个建筑的高度代表该区域的用户密度，颜色代表活跃度——从冷蓝到暖红。数据每五秒刷新一次，建筑群的高度像呼吸一样起伏。

右侧屏幕：系统运行状态。

服务器节点以星座的形式排列。每个节点是一颗星星，亮度代表CPU负载，大小代表内存使用率。节点之间的连线表示网络通信，线条的粗细代表流量大小。当某个节点出现异常，那颗星星会变成红色，周围产生波纹——像水面上落入了一颗石子。

三块屏幕共享同一个"呼吸"节奏。

明暗交替。

像一个生命体的心跳。

周文博从后端的视角补充："数据管道也做了优化。Flink端做了预聚合，推送到前端的数据量减少了80%。前端不需要做实时计算，只负责渲染。"

李伟杰在角落里看着监控面板："服务器资源占用率正常。WebSocket连接数稳定。没有异常。"

林远站在大屏前面，看了整整一分钟。

  title: "第九十九章 备战开始",
  content: `五月中旬。

林远正式向孟教练确认——参加亚锦赛选拔赛。

孟教练当天就给他制定了一份备战计划。

"八月选拔赛，我们有三个月的窗口。"孟教练把训练计划打印出来，摊在拳台边上。"第一阶段：五月到六月中旬，基础体能强化。第二阶段：六月中旬到七月底，技术打磨和实战模拟。第三阶段：八月前两周，赛前调整。"

林远扫了一眼计划表。

"训练频率——"

"每天两练。上午体能，下午技术。周日休息。"孟教练看着他，"你还要上班。所以时间安排需要调整。你能协调吗？"

"没问题。"

训练从第二天开始。

早上七点。拳馆。

五月的阳光从窗户照进来，拳台上的帆布被照得发白。

林远换好训练服，站在孟教练面前。

"第一阶段的重点是什么？"

"两个字——基础。"孟教练说，"你的拳击技术已经很好了。但全国赛暴露了一个问题——你的体能储备不够。决赛打到第三回合，你的出拳频率下降了18%。这在国内赛场勉强够用，在国际赛场——会被抓住。"

"所以？"

"跑。"

孟教练指了指门外。

"每天早上——先跑十公里。不是慢跑。间歇跑。一公里快跑，一公里慢跑，交替五次。心率——"

"控制在最大心率的80%-90%。"林远说。

孟教练挑了挑眉。

"你知道？"

"有人教过我。"

"谁？"

"一个……朋友。"

孟教练看了他一眼，没有追问。

跑完十公里。

然后是力量训练。

深蹲。硬拉。卧推。引体向上。

苏晚给他的训练方案在这里发挥了作用——她制定的渐进式超负荷计划精确到了每周的增重幅度。

深蹲：80kg → 第一周82.5kg → 第二周85kg → 逐周递增。

目标：三个月内达到110kg。

{{T: 苏晚的方案比任何网上找到的训练计划都专业。她不只是给了一组数据——她解释了每个数据背后的生理学原理。为什么深蹲要做5组×5次而不是3组×10次？因为低次数高重量发展的是最大力量和神经适应，而不是肌肥大。拳击手不需要更大的肌肉，需要的是更高效的力量输出。}}

力量训练结束后是核心训练。

平板支撑。俄罗斯转体。悬垂举腿。药球旋转抛。

"核心是拳击的发动机。"孟教练在旁边监督，"所有的力量传导都经过核心。核心弱——再大的力量也是散的。"

一个上午下来。

林远的训练服湿透了三遍。

{{PANEL}}
当日训练数据：
间歇跑10km - 用时52分钟
深蹲 5×5@82.5kg - RPE 7
硬拉 4×5@90kg - RPE 7.5
卧推 4×6@60kg - RPE 6
引体向上 4×8 - RPE 7
核心训练 30分钟
总训练时间：3小时45分钟
总消耗热量：约1800kcal
{{/PANEL}}

他把数据拍照发给苏晚。

苏晚的回复在五分钟后。

苏晚：数据看了。几个问题。

苏晚：1. 硬拉的RPE偏高。你的髋关节铰链模式可能有代偿。下次做的时候录一个侧面视频发我。

苏晚：2. 引体向上的次数可以。但你有没有注意肩胛骨的下沉和后收？如果肩胛骨不稳定，上斜方肌会代偿，长期下来颈椎会出问题。

苏晚：3. 核心训练加一个抗旋转练习。Pallof Press。这个对拳击的转体出拳至关重要。

林远：好。明天调整。

苏晚：还有——你今天的训练量已经很大了。晚上不要再打沙袋。

林远：我本来打算打两组的。

苏晚：不行。今天的总训练量已经接近你的恢复阈值。再加负荷会导致恢复不足，明天的训练质量会下降。

苏晚：你要学会一件事。

林远：什么？

苏晚：休息也是训练的一部分。

{{T: 她说得对。我以前的训练方式是"能多练就多练"。系统给了我超越常人的恢复能力，但这不代表我可以无限制地透支。身体是有极限的——即使系统可以加速技能成长，也无法加速肌肉纤维的修复和神经系统的恢复。苏晚在帮我建立一个新的认知——不是"练得越多越好"，而是"练得越聪明越好"。}}

晚上。

他没有打沙袋。

而是泡了一个热水澡。做了半小时的泡沫轴放松。然后躺在床上。

手机亮了。

苏晚发了一个文件——一份Excel表格。

打开一看——是一个详细的营养计划。

每天的蛋白质、碳水化合物、脂肪摄入量都精确到了克。

早餐：全麦面包2片 + 鸡蛋3个（2全蛋+1蛋白）+ 牛奶300ml + 香蕉1根
加餐：坚果30g + 蛋白棒1根

每日总量：蛋白质180g / 碳水350g / 脂肪70g / 热量2750kcal

苏晚：按这个吃。不要多不要少。

林远：你什么时候变成我的营养师了？

苏晚：康复师的职责范围包括营养指导。

林远：你之前说只是"康复师"。现在又加了体能方案、训练监控、营养计划。

苏晚：……你想说什么？

林远：我想说你可以直接说"我关心你"。比发一份Excel表格省事。

很长的沉默。

苏晚：Excel表格比"我关心你"这四个字更有用。感情不能帮你赢比赛。蛋白质可以。

苏晚：晚安。

林远笑了。

{{T: 蛋白质可以。感情不能。这就是苏晚的逻辑。她用数据和方案来表达她的——用她的话说——"职业责任"。但世界上没有哪个"只是职业关系"的康复师会在晚上十一点发一份精确到克的营养方案。没有哪个"只是为了科学"的研究者会要求看你每一次硬拉的侧面视频。苏晚。你的每一份Excel表格、每一条训练建议、每一个"RPE别超过9"——都是一句你说不出口的"我在意你"。我知道。}}`

  title: "第一百章 跑步",
  content: `六月。

梅雨季。

省城的天空像一块拧不干的毛巾——不是在下雨，就是在准备下雨。

林远的训练没有因为天气中断。

每天早上七点，不管下不下雨，他都会出现在体育场的跑道上。

今天是第21天。

雨不大。细细的，像雾。

他穿着运动背心和短裤，脚上是一双跑了500公里的训练鞋。跑道被雨水浸湿，每一步都有轻微的水花溅起。

第一公里：快跑。4分10秒。心率165。

第二公里：慢跑。5分40秒。心率130。

第三公里：快跑。4分05秒。心率170。

第四公里：慢跑。5分35秒。心率128。

第五公里：快跑。4分00秒。心率175。

……

到第九公里的时候，他的腿开始沉了。

不是那种"跑不动"的沉。是乳酸堆积到了临界点——大腿前侧像被灌了铅，每一步抬腿都需要额外的意志力。

{{T: 九公里。心率181。接近最大心率。腿部肌肉的糖原储备大概还剩20%。最后一公里——快跑。这是整个间歇跑里最难的一公里。因为身体的每一个信号都在告诉你"停下来"。但你不能停。不是因为不停就会怎样——而是因为这一公里练的不是体能。是意志。}}

最后一公里。

他加速了。

3分55秒。

心率188。

跑完的瞬间，他弯下腰，双手撑在膝盖上。大口喘气。雨水从头发上滴下来，和汗水混在一起。

{{PANEL}}
{{LEVELUP: 跑步·间歇跑 Lv.2 → Lv.3}}
无氧耐力阈值 +15%
乳酸代谢效率 +20%
配速感知精度 ±3秒/公里
新增能力：痛苦管理（在高强度运动中可有意识地降低疲劳感知强度）
{{/PANEL}}

"痛苦管理"。

{{T: 这个技能名字很直白。但它说的是一个深刻的道理——痛苦是主观的。你的肌肉在叫喊，你的心脏在超负荷运转，你的大脑在释放"停下来"的信号。但这些信号的强度——是可以调节的。不是不痛了。而是你和痛苦之间建立了一种新的关系——你承认它的存在，但你不服从它的命令。}}

他直起身子。

雨停了。

云层裂开了一道缝。阳光从缝隙里射下来，打在湿漉漉的跑道上，折射出一层淡淡的金色。

手机在运动腰包里震动。

他掏出来看。

苏晚：今天的间歇跑数据发我。

他把手表的数据截图发过去。

苏晚看了两分钟。

苏晚：最后一公里3分55。很好。比上周快了8秒。

苏晚：但你的心率恢复时间还是偏长。第8公里到第9公里之间的慢跑段，心率从178只降到了155。理想情况应该降到140以下。

林远：怎么改善？

苏晚：两个方面。第一，增加有氧基础——每周加一次长距离慢跑，60-70%最大心率，12-15公里。第二，呼吸模式——你的间歇跑用的是什么呼吸节奏？

林远：两步一吸，两步一呼。

苏晚：快跑段改成三步一吸两步一呼。呼气时间延长可以激活副交感神经，加速心率恢复。

林远：你是不是什么都知道？

苏晚：我只是在这个领域读了足够多的文献。而且——

苏晚：你的身体是我目前最有价值的研究样本。如果你受伤了或者过度训练了，我的课题数据就废了。

林远：所以你关心我的训练是为了你的课题。

苏晚：对。

林远：好。

苏晚：……

苏晚：你说"好"的时候我总觉得你在嘲笑我。

林远：没有。我在笑。但不是嘲笑。

苏晚：有什么区别？

林远：嘲笑是觉得你可笑。笑是觉得你可爱。

发送。

他看着屏幕。

{{T: 又说了一句越界的话。但这次我不后悔。因为——有些话如果一直不说，它不会消失。它只会在心里越积越重，直到有一天，它不是被说出来——而是被压碎了。我不想让它被压碎。}}

苏晚的回复来得很慢。

将近五分钟。

苏晚：你的社交技能从Lv.1升到Lv.2了。

苏晚：进步很快。

苏晚：和你的间歇跑一样。

苏晚：明天记得加长距离慢跑。

她没有回应"可爱"那个词。

但她也没有否认。

她选择的方式是——把话题拉回训练。

但这一次，拉回去的速度比以前慢了。

以前是秒回。

这次是五分钟。

{{T: 五分钟。在这五分钟里，她犹豫了。她在想怎么回复。她可能打了很多字，又删掉了。最后选了一个最安全的回复——把我的话归类为"社交技能升级"，用系统化的方式消解掉了它的情感浓度。但五分钟的犹豫本身就是答案。如果你不在意一个人的话，你不需要犹豫。你只有在在意的时候，才会不知道怎么回应。}}

——

下午。

公司。

林远到工位的时候，张伟递过来一个快递。

"远哥，你的。"

他拆开。

一个运动手表。

Garmin Forerunner 265。

包装盒里有一张小纸条。

"你的训练数据需要更精确的采集。这块表支持心率变异性（HRV）监测、血氧饱和度、训练负荷评估。把每天的数据同步到Garmin Connect，然后给我开一个共享权限。——苏晚"

纸条的最后一行，用很小的字写着：

"这不是礼物。这是研究设备。发票我报课题经费了。"

林远看着这张纸条。

看了很久。

{{T: Garmin 265。市场价2980块。她说"报了课题经费"。但——有哪个课题经费能报一块私人运动手表？她的导师会批这个费用？不可能。这是她自己买的。然后用"课题经费"来合理化这个行为。就像她用"职业习惯"来合理化她的关心，用"学术合作"来合理化她给我做训练方案，用"研究样本"来合理化她对我的每一次注视。苏晚。你什么时候才能放下你的盔甲？你什么时候才能——不用任何理由——对一个人好？}}

他戴上手表。

表盘亮了。

心率：72bpm。

一个安静的数字。

但他知道——在他读那张纸条的时候，这个数字一度升到了95。

他拍了一张手腕上手表的照片，发给苏晚。

林远：收到了。研究设备已就位。

苏晚：好。记得开共享。

林远：已经开了。

苏晚：……你动作挺快。

林远：因为你说的话我都记着。

又一次沉默。

苏晚：好了。我去实验室了。

她下线了。

林远看着对话框。

然后打开Garmin Connect的app。

共享设置里，他加了苏晚的账号。

从今以后——她可以看到他的每一次心跳。

每一次。

包括那些因为她而加速的。`

  title: "第一百零一章 深蹲100kg",
  content: `六月下旬。

训练进入第六周。

林远的身体发生了显著的变化。

不是外观上的——他的体重从74kg微升到75.5kg，体脂率从13%降到了11.2%。肌肉线条更清晰了，但幅度不大。

真正的变化是内在的。

深蹲从82.5kg涨到了100kg。

硬拉从90kg涨到了115kg。

间歇跑10公里的总时间从52分钟缩短到了47分钟。

最大摄氧量从48ml/kg/min提升到了53ml/kg/min。

这些数据林远每天都会同步给苏晚。而苏晚每天都会在数据旁边标注评语和调整建议——像一个严格的导师批改作业。

"深蹲100kg达标。"苏晚今天的评语。"但你的动作质量在95kg以上有下降。我看了你发的视频——最后两组的下蹲深度不够，髋关节低于膝关节的角度差减小了约5度。这意味着你在重量增加时开始用腰椎代偿。"

"怎么调整？"

"两个方法。第一，在95kg以上的组次用箱式深蹲——蹲到箱子上停顿一秒再起来，强制全程深度。第二，增加踝关节灵活性训练——你的踝背屈角度不够，限制了深蹲深度。我发你一组踝关节的拉伸动作。"

"好。"

"还有——你最近的HRV数据有一个趋势我不太喜欢。"

"什么趋势？"

"你的晨起HRV从65ms降到了58ms。七天的下降趋势。这意味着你的自主神经系统恢复不足。简单说——你的身体正在积累疲劳。"

"我感觉还好。"

"感觉不是数据。数据告诉我你需要一个减载周。下周所有训练量降低40%。"

"但下周孟教练安排了实战模拟——"

"跟孟教练说。减载周。不可谈判。"

她的语气不容置疑。

林远跟孟教练说了。

孟教练看了苏晚发来的数据分析。

"你这个康复师——挺专业。"孟教练说。

"她是北体大运动康复的研究生。"

"北体大？"孟教练挑眉，"那确实是国内最好的了。行，听她的。下周减载。但——你说这个人七月会来？"

"对。"

"来了直接到拳馆。我想当面聊聊。一个好的康复师对拳击手的价值——不比教练低。"

——

减载周。

训练量降低40%。

林远突然多了很多空闲时间。

他把这些时间用在了两个地方。

第一个——工作。

"Phase 5的方向——我们要做AI。"王志远说。"把AI接入我们的数据平台。智能预警、智能调度、智能报表生成。"

林远沉默了一下。

"王总，AI的研发成本很高。我们需要——"

"我知道。我已经在谈A轮融资了。如果顺利的话，八月份钱到位。你先做技术预研。"

"好。"

他以前对ML有基础的了解，但没有深入过。现在，他开始系统性地学习。

从Andrew Ng的课程开始。然后是Stanford CS229的讲义。然后是PyTorch的官方教程。

{{PANEL}}
{{LEVELUP: 编程·机器学习 Lv.0 → Lv.1}}
模型训练基础流程掌握度 +60%
数据预处理能力 +40%
Python科学计算生态熟悉度 +50%
新增能力：模型直觉（可快速判断一个问题适合用什么类型的模型解决）
{{/PANEL}}

三天之内，他把机器学习的基础走了一遍——线性回归、逻辑回归、决策树、随机森林、SVM、神经网络。

不是理论上的"了解"。是写了代码、跑了数据、调了参数的"实践"。

{{T: 机器学习和拳击有一个共同点——都是"从数据中学习模式"。拳击手通过成千上万次的训练，让肌肉记住最优的发力模式。神经网络通过成千上万次的迭代，让参数收敛到最优的权重分布。本质上——都是用重复来逼近真理。}}

第二个他花时间的地方——

围棋。

减载周不打沙袋，不做大重量训练。但他需要保持"竞技思维"的活跃度。

他在围棋App上找到了一个业余五段的对手。

下了一盘。

赢了。

又下了一盘。

又赢了。

{{PANEL}}
{{LEVELUP: 围棋 Lv.2 → Lv.3}}
布局理论深度 +45%
中盘计算力 +40%
收官精确度 +35%
新增能力：大局观（可在开局阶段预判全局走向，准确率约60%）
{{/PANEL}}

{{T: 围棋Lv.3。这意味着我的棋力大概相当于业余五段到六段之间。在这个水平——我开始能"看到"棋盘上没有落子的地方的价值。空是满的。未来是当下的一部分。这种感觉……和拳击里"预判对手出拳"的感觉很像。两种运动，一种底层逻辑——在混沌中寻找秩序。}}

——

减载周的第五天。

晚上。

他和苏晚视频通话。

这已经变成了每周一到两次的固定频率。

"你的HRV回升到62了。"苏晚看着数据说，"减载有效。下周可以恢复正常训练量。"

"好。"

"还有——我的中期答辩通过了。"

"恭喜。"

"导师评价说我的课题'数据采集部分做得特别扎实'。"她停了一下，"就是你的数据。"

"所以你的中期答辩是靠我通过的。"

"不是靠你。是靠数据。你只是数据的来源。"

"好吧。那数据来源祝你答辩快乐。"

苏晚笑了。

这是他第一次在视频通话里看到她笑。

不是那种礼貌的微笑。是那种——嘴角控制不住地上扬、眼睛弯成月牙的笑。

很快就收住了。

但林远看到了。

"你笑起来——"

"别说了。"

"——很好看。"

"我说别说了。"

"好。"

沉默。

苏晚低下头，翻了一下手边的论文。

"我七月十五号到。"她突然说。

"什么？"

"我来你那个城市。七月十五号。下午两点的高铁。三个小时。五点到。"

"你已经买票了？"

"我买的是可退改签的。"

"这不叫退路。叫理性决策。"

"好。五点我去接你。"

"不用接。我认识路。"

"你没来过这个城市。"

"我有导航。"

"我去接你。"

苏晚看着屏幕。

"……好。"

林远心里的某个地方——非常安静地——亮了一下。

像一颗星星从云层后面露出来。

{{T: 七月十五号。还有三周。她买了票。虽然是"可退改签的"。但她买了。这意味着——她不再只是"考虑"。她已经做了决定。她来了。她要来了。三周后。1800公里之外的那个人——会站在我面前。不是通过屏幕。不是通过微信。是——面对面。我会看到她的眼睛。她的头发。她笑起来的样子。近在咫尺。}}`

  title: "第一百零二章 夜跑",
  content: `七月初。

省城进入了盛夏。

白天的温度超过35度，柏油路面上的热气能把空气扭曲成波浪。

林远把跑步训练移到了晚上。

晚上九点。体育场。

跑道上只有他一个人。灯光从高处的照明塔洒下来，把跑道照成淡黄色。远处城市的灯火像另一种星空。

今天不是间歇跑。是苏晚要求的长距离慢跑——15公里，心率控制在130-140之间。

他戴着Garmin手表，手表上苏晚的实时共享界面开着。

她在1800公里之外。

但她能看到他的每一步。

第一公里。心率125。太低了。他微微加速。

第三公里。心率135。完美区间。配速5分40秒。

脚步声在空旷的体育场里有轻微的回响。风从东边吹来，带着夏夜特有的温热和草地的气味。

{{T: 长距离慢跑和间歇跑完全不同。间歇跑是战争——每一步都在和身体极限搏斗。长距离慢跑是冥想——你不需要和任何东西搏斗。你只需要跑。一步接一步。心率像一条平缓的河流。思维像水面上的落叶——漂浮着，不需要方向。}}

第五公里。

他的思维开始游走。

想到了这半年发生的一切。

去年十月，他走进拳馆。一个什么都不会的普通人。

现在——全国冠军。技术总监。正在备战亚锦赛选拔赛。有了一个九人的技术团队。有了一个——

一个让他每天晚上都想打开微信的人。

半年。

181天。

从Lv.0到现在——他有多少技能超过了Lv.3？

他在脑子里数了一下。

{{PANEL}}
当前技能总览（Lv.3及以上）：
拳击 Lv.4
格斗流 Lv.3
烹饪 Lv.4
编程·全栈 Lv.4
编程·网络编程 Lv.3
跑步·间歇跑 Lv.3
围棋 Lv.3
赛事分析 Lv.2（接近Lv.3）
技术管理 Lv.3
时间管理 Lv.3
{{/PANEL}}

十个技能。大部分在Lv.3-4之间。

{{T: 十个技能树。半年时间。从一个角度看——这是不可能的成长速度。从另一个角度看——这只是一千棵树的十棵。十分之一。如果按照这个速度发展下去……一百年？一千年？不对。系统的成长速度也在加速——随着我掌握的技能越多，跨领域的"经验迁移"效应就越强。围棋的大局观帮助了拳击的战术预判。编程的逻辑思维帮助了技术管理。管理的人际沟通帮助了——和苏晚的聊天。每一个技能都不是孤立的。它们像一张网——节点越多，网越密，新的连接产生得越快。}}

第八公里。

心率138。还在区间内。

他调整了呼吸节奏——三步一吸，两步一呼。苏晚教的。

空气从鼻腔进入肺部。氧气通过血液输送到每一块肌肉。

他感到一种深沉的平静。

不是"什么都不想"的平静。是"什么都清楚"的平静。

{{T: 我知道自己在做什么。我知道自己想要什么。半年前我不知道——系统突然出现，我一头扎进了"升级"的快感里，什么都想学、什么都想提升。但现在——我开始理解了。系统不是目的。它是工具。一把无限锋利的刀。但刀不能自己决定切什么——只有拿刀的人可以。我是拿刀的人。我选择——}}

第十公里。

他的手机响了一声。

不是电话。是微信。

他没有停下来。继续跑。

第十二公里。

手机又响了一声。

他还是没有停。

第十五公里。

跑完了。

他弯下腰，缓了三十秒。然后走到跑道边，拿起水壶喝了一大口水。

打开手机。

两条消息。都是苏晚的。

第一条（十公里时）：你的心率很稳。继续。

第二条（十二公里时）：我在看你的实时轨迹。跑道上只有你一个人。

他看着第二条消息。

她在看他的实时轨迹。

晚上九点多。她应该在宿舍里。在做论文或者看文献。但她打开了Garmin Connect的共享界面。看着一个人在1800公里外的跑道上，一圈一圈地跑。

他回复：你一直在看？

苏晚：不是一直。偶尔。

林远：偶尔是多久？

苏晚：……不要审问你的康复师。

林远：好。

他把手机放下。

抬头看天。

夏天的夜空不太看得到星星——城市的光污染把它们藏起来了。但月亮很亮。几乎是满月。

他想起苏晚说的——"你的实时轨迹"。

在Garmin Connect的共享界面上，他的跑步轨迹是一条蓝色的线。一圈一圈。在体育场的400米跑道上画出一个又一个的圆环。

她看到的就是这样一个画面——一个人，在深夜的跑道上，安静地跑着。不快不慢。心率稳定。步频稳定。像一台精密的机器。又像一个有自己节奏的生命。

{{T: 她在看。在1800公里之外。透过一块电子屏幕。透过卫星信号和数据接口。她在看着我跑步。这是世界上最远的陪伴。也是最近的。因为数据不撒谎。心率不撒谎。每一步的落点坐标不撒谎。她看到的——是最真实的我。没有对话框里的斟酌和修饰。没有视频通话里的表情管理。只有一个人在跑步时的全部——呼吸、心率、步频、速度。也许这就是为什么她选择这种方式——不是打电话，不是发消息，而是看数据。因为数据是她最信任的语言。而我——正在用她的语言，对她说话。}}

他拿起手机。

打了一行字。

林远：七月十五号。我在出站口等你。

苏晚的回复很快。

苏晚：我知道。你说过了。

林远：我再说一次。

苏晚：……

苏晚：好。

他把手机放进口袋。

绕着跑道又走了一圈。

不是跑。是走。

缓步。

月光下的体育场很安静。只有他的脚步声。和远处城市隐约的车流声。

他在走第三圈的时候——微笑了。

不是因为什么特别的原因。

只是因为——

还有十四天。

{{T: 十四天。336个小时。20160分钟。1209600秒。每一秒都在倒计时。每一秒都在靠近。不是因为时间在走。而是因为两个人在靠近。一个在这里。一个在1800公里外。但距离正在缩短。以每秒不到0.15毫米的速度——如果按照地球自转来算的话。当然，这个计算没有任何意义。但我还是算了。因为想一个人的时候，大脑会做很多没有意义的事情。比如计算地球自转速度。比如把"十四天"换算成秒。比如在夜跑结束后，站在月光下，对着空无一人的跑道微笑。这些都不是任何技能的经验值。这些都不在任何面板上。但这些——也许比所有的Lv.5加起来——都更重要。}}`

  title: "第一百零三章 陈薇的夜宵",
  content: `七月初。

大屏上线后的第二周。

公司内部弥漫着一种"大战之后"的松弛。Phase 4完美收官，团队奖金到账，所有人的心情都不错。

但林远没有松懈。

白天在公司做Phase 5的AI技术预研，晚上在拳馆训练备战亚锦赛。两条线同时推进。

周三晚上。加班到九点半。

整个办公区只剩他和陈薇。

陈薇坐在角落的工位上，戴着降噪耳机，面前三块屏幕上全是代码。她在优化数据大屏的性能——客户反馈说武汉站的大屏在数据高峰期偶尔会出现0.5秒的卡顿。

"陈薇。"林远走过去。

她摘下耳机。"嗯？"

"九点半了。先回去吧，明天再弄。"

"快好了。我找到卡顿的原因了——是WebGL的纹理缓存没有做LRU淘汰，数据量大的时候GPU显存溢出。改一下缓存策略就行。"

"明天改。"

"再给我十分钟。"

林远看着她。

陈薇的桌上放着一杯已经凉透的咖啡和一包撕开了一半的饼干。她今天穿着一件宽大的卫衣，袖子挽到了肘部，露出纤细的手腕。屏幕的蓝光映在她的镜片上，她的眼睛在镜片后面专注而明亮。

"十分钟。"他说。

十二分钟后。

"搞定了。"陈薇伸了个懒腰，手臂举过头顶，背部发出轻微的咔嗒声。"GPU显存占用从1.8G降到了600M。帧率稳定60fps。"

"不错。"

"林总，你也还没走？"

"我在等你。一个人加班到这么晚不安全。"

陈薇愣了一下。

"啊……其实我经常一个人加班到很晚的。以前在上家公司——"

"以前是以前。在我的团队里，我不允许任何人独自加班到深夜。要么一起走，要么提前说。"

陈薇看着他。

然后她笑了。一种很明亮的笑。

"林总——你知道吗？你是我遇到的第一个会说'我在等你走'的领导。其他领导只会说'辛苦了'然后自己先走。"

"走吧。"

两个人一前一后出了办公楼。

七月的夜风还是热的，但比白天好多了。路边的法国梧桐在路灯下投出大片的阴影。

"林总，你回哪个方向？"

"东边。你呢？"

"南边。地铁口在那边。"

"我送你到地铁站。"

"不用——"

"顺路。"

不顺路。但她没有再拒绝。

走了大概五分钟。

陈薇突然说："林总，你饿不饿？"

"有点。"

"那边有一家串串香。开到凌晨的。我经常加班完去吃。"

林远犹豫了一下。

"走。"

——

串串香店。

不大。十几张桌子。空调开到最大但还是有点热。玻璃门上贴满了促销海报。空气里全是麻辣味和孜然味。

陈薇很熟练地拿了两个钢盆，递给林远一个。

"随便拿。按签子结账。红色签子一块，绿色签子五毛。"

她自己拿了一把——牛肉、毛肚、黄喉、藕片、土豆片、海带结。

林远也拿了一些。

"不辣的锅底还是红汤？"

"红汤。"

两个人面对面坐下来。锅底煮开，红油翻滚，花椒和干辣椒在汤面上浮浮沉沉。

"林总——"

"别叫林总了。下了班叫名字就行。"

"……林远？"

"嗯。"

"林远，你为什么每天加班完还要去拳馆练两个小时？你不累吗？"

"累。但——"他想了想，"有些事情，累不是放弃的理由。"

陈薇把一片毛肚放进锅里，用筷子夹着涮了七秒——不多不少。

"我以前也是。"她说。

"什么？"

"做开源项目的时候。白天上班写代码，晚上回家还是写代码。我的那个可视化组件库——1200多个star——全是下班之后写的。有时候写到凌晨三点。室友说我疯了。"

"为什么坚持？"

"因为……你知道那种感觉吗？"她抬起头，眼镜上蒙了一层锅底的热气，"你在做一个东西，它从零开始，一点一点变成你想象中的样子。每解决一个bug、每加一个feature、每一次有人在GitHub上给你提issue说'这个库太棒了'——那种感觉——"

她摘下眼镜擦了擦。

没有眼镜的陈薇看起来不太一样。

她的眼睛比戴眼镜时大，瞳仁是深棕色的，睫毛很长。圆脸。嘴唇上因为吃辣沾了一点红油。

"——那种感觉，比任何KPI都值得。"

林远看着她。

{{T: 陈薇。25岁。前端天才。开源爱好者。加班到深夜还能兴致勃勃地吃串串香。眼镜后面藏着一双比代码更有表现力的眼睛。她说的"那种感觉"——我懂。我太懂了。系统面板上每一次LEVELUP弹出的瞬间，就是那种感觉。但我不能告诉她。}}

"我懂。"他说。

"真的？"陈薇有点惊讶，"很少有人说'懂'。大部分人说'你真卷'。"

"那是因为他们没有体验过——从零到一的快感。"

陈薇看着他。

锅底的蒸汽在两个人之间升起来，模糊了空气。

"林远。"她说。

"嗯。"

"你……不只是一个好领导。你是一个——"她想了一下，"有意思的人。"

她把毛肚从锅里捞出来，蘸了一下油碟，送进嘴里。

"走了。太辣了。"她站起来，"我去结账。"

"我来。"

"不用。AA。"她坚持。

最后还是林远付的钱。28块。

地铁站口。

"到了。"陈薇站在扶梯前面。"谢谢你等我下班。谢谢请我吃串串。"

"下次别一个人加班到那么晚。"

"知道了。"她笑了一下，转身走上扶梯。

走了两阶，她回头。

"林远——如果你的训练需要什么数据可视化的支持，比如训练数据的dashboard——我可以帮你做一个。免费的。算是……回请串串。"

她挥了挥手。

消失在地铁站里。

林远站在地铁站口。

手机亮了。

苏晚：今天的HRV数据怎么还没同步？你没戴手表？

  title: "第一百零四章 跑道上的女孩",
  content: `七月八号。

晚上九点。体育场。

林远的例行夜跑。

今天是15公里慢跑日。心率130-140。配速5分40秒。

他绕着跑道跑了三圈之后——注意到跑道的另一端有一个人。

一个女孩。

长发扎成高马尾，穿着荧光绿的运动背心和黑色短裤，脚上是一双Nike Vaporfly。

她在跑400米间歇。

第一个400米：58秒。

林远在跑慢跑圈的时候和她擦肩而过。

她的速度很快——对于女性来说，400米58秒已经接近省级运动员的水平。

第二个400米：59秒。

第三个400米：61秒。开始掉速了。

第四个400米——

她在弯道处突然减速。然后停下来。单脚站立。左手捂住右膝。

林远放慢了脚步。

她蹲下来，双手抱住右膝，脸上的表情在路灯下看不太清楚，但身体的语言很明显——疼。

他跑过去。

"你没事吧？"

她抬起头。

灯光下——一张汗湿的脸。五官很立体。浓眉，高鼻梁，嘴唇薄而有形。皮肤被太阳晒成了小麦色。眼睛里有一种……倔强。

"没事。老毛病了。"她的声音有点沙，但很干脆。

"哪里疼？"

"髌骨下面。跑多了就会。"她试着站起来，膝盖一弯，又蹲了回去。"操。"

"别动。"林远蹲下来。"你这个症状——像髌腱炎。"

"你怎么知道？"

"……有人教过我一些运动康复的知识。"

他伸出手。

"可以检查一下吗？"

她犹豫了一下。然后点头。

林远用拇指按压了她的髌腱——从髌骨下缘到胫骨结节的那一段。

"这里疼？"

"嘶——疼。"

"这里呢？"

"不太疼。"

"髌腱中段。典型的跑步膝。"林远松开手。"你平时跑量多大？"

"每天10到15公里。一周六天。"

"你的跑量太大了。以你目前的膝盖状态——周跑量不应该超过50公里。而且——你热身了吗？"

"……没有。直接跑的。"

"不热身跑400米间歇——你是在找伤。"

她的脸上闪过一丝恼怒。但很快被另一种表情取代——承认。

"我知道。但——"

"但什么？"

"但我没时间热身。"她说。"白天有课，晚上训练。每天能跑步的时间只有一个半小时。热身十五分钟——就少跑了十五分钟。"

"你是体育生？"

"省体大。田径。400米和800米。"

"什么水平？"

"400米——56秒8。"

林远挑眉。

56秒8。这个成绩放在全国大学生锦标赛上可以进前八。

"你是想冲全国大学生锦标赛？"

她抬头看他。眼神锐利。

"你怎么知道？"

"你的训练强度说明了一切。这不是'维持体能'的训练量。这是'冲成绩'的训练量。"

沉默了两秒。

"我叫顾念。"她说。

"林远。"

"你也是运动员？"她上下打量他，"你的身材——像是搏击类的。"

"拳击。"

"什么水平？"

"今年全国锦标赛冠军。"

顾念的眼睛一下子亮了。

"全国冠军？"

"嗯。"

"那你——很厉害。"她的语气变了——从防备变成了一种同行之间的尊重。

"你的膝盖——先做冰敷。回去之后用冰袋敷15分钟。明天——不要跑步。做一些低冲击的有氧，游泳或者骑自行车。如果后天还疼——去看运动医学科。"

"……你真的很懂。"

"不算懂。Lv.1的水平。"

"什么？"

"没什么。内部梗。"

他从运动腰包里掏出一瓶运动饮料——他每次跑步都带两瓶。递给她一瓶。

"喝。电解质。你出了那么多汗不补充会抽筋。"

顾念接过饮料。犹豫了一下。拧开喝了两口。

"谢谢。"

"你有手机吗？"

"嗯？"

"加个微信。我可以把一些跑步膝的康复训练动作发给你。"

顾念看了他一眼。

然后掏出手机，打开了微信。

"扫我。"

林远扫了她的二维码。

顾念的微信名：400m56.8。

头像是一张起跑器的照片——从起跑器的角度拍的赛道，两条白线延伸向远方。

"谢谢。"她说。"我先走了。膝盖能走路，不严重。"

"别硬撑。如果走路疼就打车。"

"我走路不疼。跑步才疼。"她站起来，试了两步。"没事。"

她拿起放在跑道边的背包，往体育场出口走。

走了几步，回头。

"林远。"

"嗯？"

"你明天也在这个时间跑吗？"

"每天都在。"

"那——我明天来的话，你能教我正确的热身方式吗？你刚才说的那些——我想学。"

"可以。但你明天不应该跑步。"

"我知道。我来学热身。不跑。"

"那行。"

她走了。

马尾在背后一甩一甩的。步伐有力。即使膝盖有伤，她的步态依然有运动员特有的节奏感——重心低，脚掌内翻，推蹬有力。

林远看了两秒。然后继续跑。

第十公里的时候——

手机震了。

苏晚：你今天的配速比昨天慢了10秒/公里。原因？

林远看了一眼Garmin的数据。确实——第五到第七公里之间，他的配速从5分40秒掉到了5分50秒。

因为他停下来帮顾念检查了膝盖。

林远：中间停了一会儿。跑道上有个田径生膝盖受伤了，帮忙看了一下。

苏晚：你帮人看膝盖？

林远：你教过我。髌腱炎的判断方法。

苏晚：……

苏晚：你学得很快。

苏晚：男的女的？

又来了。

林远：女的。省体大的400米选手。

苏晚：成绩多少？

林远：56秒8。

苏晚：不错。接近一级运动员标准了。

苏晚的语气突然变得……专业。像是在讨论一个运动数据点，而不是一个人。

苏晚：髌腱炎的话，除了冰敷和减量之外，建议她做一些离心训练——单腿下蹲（decline squat），每天3组×15次。这个是目前循证医学最推荐的髌腱炎保守治疗方案。

林远：好。我发给她。

苏晚：你加了她微信？

三个问号在林远脑海里排成一行。

林远：对。为了发康复动作给她。

苏晚：嗯。

又是一个字。

然后：我去看文献了。晚安。

比昨天又早了十分钟。

{{T: 两天内——苏晚问了我两次"和谁"，两次"男的女的"，两次提前说晚安。模式已经很清楚了。苏晚在吃醋。这个用"职业习惯"来解释一切的运动康复研究生——在吃醋。她可能自己都没意识到。或者她意识到了，但不愿意承认。因为承认"吃醋"就等于承认"在意"。承认"在意"就等于——越过她给自己划的那条线。但醋——已经打翻了。}}`

  title: "第一百零五章 热身课",
  content: `第二天晚上。

体育场。

林远到的时候——顾念已经在了。

她坐在看台的第一排，穿着运动服，但没有跑。旁边放着一个保温杯和一个小冰袋。

"你的膝盖怎么样？"

"好多了。早上敷了冰。下午做了你说的——低冲击有氧。骑了四十分钟自行车。"

"疼吗？"

"不疼了。但弯曲的时候还有点僵。"

"正常。炎症消退需要三到五天。这几天不要做任何弹跳和冲刺训练。"

"知道了。"

她站起来。

"教我热身吧。"

林远点头。

他把苏晚教给他的动态热身流程完整地教给了顾念——

髋关节环绕、腿部摆动、弓步行走、臀桥激活、踝关节旋转、小步快跑、高抬腿、侧向移动。

十二个动作。每个动作的目的、要领、常见错误，他都一一讲解。

顾念学得很快。

运动员的身体控制能力远超普通人——她做一遍就能掌握动作模式，第二遍就能做到标准。

"你的臀桥——左侧臀大肌激活不够。"林远观察到了细节。

"怎么看出来的？"

"你左侧骨盆有一个微小的旋转。说明左臀在偷懒，让腘绳肌代偿了。试着先做一个——"他示范了一个单腿臀桥，"——左腿单独做五次，把注意力集中在左臀。"

顾念照做了。

第三次的时候，她感觉到了。

"哦——这个感觉不一样。左边屁股终于动了。"

"对。你平时跑步的时候左腿的力量应该比右腿弱一些？"

"……对。教练也说过。但他只说了'加强左腿'，没说具体怎么加强。"

"因为根源不在腿。在臀。臀大肌不激活——腘绳肌代偿——膝关节受力异常——髌腱压力增大——炎症。这是一条完整的动力链。你的膝盖疼不是膝盖的问题。是屁股的问题。"

顾念瞪大了眼睛。

"……你确定你是打拳击的？"

"打拳击的。也学了一点运动康复。"

"一点？你这叫一点？我的体能课老师讲的都没你清楚。"

{{PANEL}}
{{LEVELUP: 运动康复·基础训练 Lv.1 → Lv.2}}
动力链分析能力 +45%
代偿模式识别准确率 +40%
康复训练指导能力 +35%
新增能力：触诊评估（可通过触摸肌肉判断其紧张度和激活状态）
{{/PANEL}}

{{T: 运动康复Lv.2。通过教别人——我自己也在提升。教学是最好的学习方式。因为当你需要把知识讲清楚的时候，你必须比"知道"更深一层——你必须"理解"。我把苏晚教给我的东西，通过自己的消化，再教给顾念。这个过程中——知识被加工了、强化了、内化了。}}

热身结束后，顾念没有离开。

她坐在看台上，看林远跑步。

他今天是间歇跑日——10公里。快跑慢跑交替。

跑到第六公里的时候——他注意到顾念在看台上用手机录像。

跑完。

他走过去。

"你在录什么？"

"你的跑步姿态。"她把手机递过来。

视频里——林远的跑姿确实很标准。高频步幅，前脚掌着地，躯干微前倾，手臂摆动幅度恰到好处。

"你的步频大约是每分钟185步。"顾念说。"对于长距离间歇来说——这个步频很理想。你的脚掌着地方式也很好——前脚掌外侧先着地，然后过渡到全脚掌。这是最高效的缓冲模式。"

"你分析得很专业。"

"我是田径生。看跑姿是基本功。"她停了一下，"但——你的跑姿不像是自学的。太标准了。有人教过你？"

"自己练出来的。"

"不可能。"顾念摇头。"90%的业余跑者不知道'前脚掌着地'是什么概念。你不仅知道，而且每一步都做到了。这需要至少两三年的有意识训练。"

"也许我学东西比较快。"

"有多快？"

"……很快。"

顾念看着他。

那种眼神——不是暧昧。是一种竞技者对另一个竞技者的审视。

"林远。"

"嗯？"

"你……是什么人？"

{{T: 她的直觉很敏锐。运动员的直觉——比普通人的要强得多。她感觉到了"不正常"。一个拳击手，懂运动康复，懂跑步生物力学，跑姿像受过专业训练——而他说自己是"自学的"。这个信息不匹配。她在试图解释这种不匹配。}}

"一个普通人。"他说。"学东西比较快的普通人。"

顾念看了他几秒。

然后笑了。

"你不普通。"她说。"我一年见几百个运动员——省队的、国家队的、业余的。你身上有一种——我不知道怎么形容——一种'什么都能做'的感觉。像你的身体没有设限。"

"你想多了。"

"也许吧。"她站起来。"我该走了。明天——你还在这个时间？"

"在。"

"那我明天来做热身。然后——如果膝盖不疼的话——可以跑几圈慢的。"

"五圈。最多。配速不低于7分钟/公里。心率不超过145。"

"你怎么知道我的最大心率——"

"你昨天跑400米间歇的时候，最后一个减速时的表情——基于你的年龄和体能水平，我估算你的最大心率在195左右。145是75%。"

顾念呆呆地看着他。

"……你通过表情估算心率？"

"不准确。但大概是那个范围。"

她摇了摇头。

"林远。你绝对不是普通人。"

她拿起保温杯，转身走了。

马尾甩了一下。

——

回家的路上。

林远收到了两条微信。

第一条，顾念：谢谢今天的热身课。我的左臀今天第一次有了"存在感"。

第二条，苏晚：你今天的间歇跑数据我看了。第6-7公里之间有一段心率波动——从170突然降到155然后又升到172。这不是正常的间歇模式。你中间停了？

林远看着苏晚的消息。

她在1800公里之外。

但她能从一条心率曲线里——读出他在跑道上做了什么。

林远：中间和人说了几句话。跑道上那个田径生。

苏晚：又是她？

"又"。

这个字——比昨天的"和谁"更有分量。

林远：对。她来学热身。我教了她一些你教我的东西。

苏晚：你教她运动康复？

林远：基础的。动态热身和臀肌激活。

苏晚沉默了很长时间。

苏晚：你教得对。但有一个地方需要补充——臀桥做完之后应该接一组侧卧蛤蜊式，激活臀中肌。臀大肌和臀中肌要同时激活才能保证髋关节的稳定性。

苏晚：发给她。

林远：好。

苏晚：还有。

林远：嗯？

苏晚：你把我教你的东西教给别人——至少要标注出处。

林远：什么意思？

苏晚：意思是——如果她问你"这些是谁教你的"——你应该说"我的康复师"。

林远看着这条消息。

{{T: "我的康复师"。她要我说"我的康复师"。不是"一个朋友"。不是"网上看的"。是"我的康复师"——一个带有所属关系的称谓。她在标记自己的位置。苏晚。你以为你在说"专业出处"。但你说的其实是——"他是我的"。}}

林远：好。下次她问我就说。

苏晚：嗯。

苏晚：晚安。

今天的晚安——回到了正常时间。

甚至比正常晚了五分钟。

{{T: 她多聊了五分钟。为了确保我会说"我的康复师"。这五分钟——是她的领地意识。她可能不愿意承认。但她的行为已经在说了——别人可以进入我的跑道。但不能进入她的领域。她的领域是：运动康复。是数据。是训练方案。是——我。}}`

  title: "第一百零六章 咖啡与代码",
  content: `七月十号。

周五。

公司的空气有点微妙。

原因是——陈薇今天换了一种风格。

她平时穿宽大的卫衣或T恤，不化妆，头发随便扎一下。但今天——她穿了一件白色衬衫，下摆扎进了浅色牛仔裤里，头发散着，微微卷。

不是什么大变化。但在一个习惯了"工程师穿搭"的办公室里，这种变化非常显眼。

张伟路过她工位的时候，碰了一下周文博的胳膊。

"嘿——陈薇今天怎么回事？"

周文博头都没抬："不知道。不关我事。"

"你就不好奇？"

"不好奇。我只关心她的代码有没有写完。"

张伟："……你这人真没意思。"

——

上午十一点。

林远在做Phase 5的AI预研。他正在用PyTorch搭一个时序预测模型——用历史的交易数据来预测未来24小时的交易趋势。

模型结构是一个LSTM网络。128个隐藏单元，两层堆叠，加一个全连接输出层。

数据集：过去六个月的交易记录。按5分钟粒度聚合。每个数据点包含交易量、金额、活跃用户数、错误率。

他训练了100个epoch。loss从0.15降到了0.023。

在验证集上的MAPE（平均绝对百分比误差）——7.2%。

{{T: 7.2%。对于时序预测来说还不够好。目标是5%以内。可能需要——增加特征维度、试一下Transformer架构、或者做更细粒度的数据清洗。但作为第一版——可以给王总看了。}}

"林总。"

陈薇走过来。手里端着两杯咖啡。

"你的美式。"她把其中一杯放在他桌上。

"谢谢。你怎么知道我喝美式？"

"你每天下午点外卖咖啡的时候都点美式。我观察了两个月。"她说这话的时候语气很自然——就像在陈述一个事实。

"两个月……"

  content: `七月十七号。

晚上六点到八点：体能训练。苏晚现场监控心率和负荷。
八点以后：自由时间。

这个安排——精密得像一个齿轮组。每一分钟都有它的用途。

林远在做间歇跑。苏晚坐在看台上，笔记本电脑打开着，实时监控他的心率和配速。

"林远！"

一个声音从跑道另一端传来。

顾念。

苏晚看着他。

"好什么？"

"好。你说的都对。训练第一。但——"

"但什么？"

"但训练结束之后的时间——是我的。"

苏晚看着他。

"你想怎么用？"

"和你待在一起。"

她低下头。

看着自己的鞋尖。

很久。

"……好。"

一个字。

轻得像一片羽毛落在水面上。

但林远听到了。

他的心率——在Garmin手表上——从86bpm跳到了112bpm。

苏晚一定看到了这个数据。

因为她是他的康复师。

  content: `七月十九号。

林远下午五点下班。

三条消息。

他想了想。

苏晚的回复最快：什么朋友？

苏晚：都是女的。

林远：对。

苏晚：你在约我吃饭的同时——还约了另外两个女生？

林远：不是约。是她们分别约了我。我把三个人并到了一起。

一家湘菜馆。

"这个辣椒炒肉不错。"顾念说。她的吃辣能力很强——直接用筷子夹了一整根辣椒吃了。

陈薇在一旁观察着这一切。

"你算过？"

"昨晚算的。"她推了推眼镜。"具体的benchmark我放在demo里了。"

而她——苏晚——是用Excel表格和心率曲线来说"我在意你"的人。

  content: `七月二十一号。

苏晚的第六天。

上午的训练结束后，苏晚在做康复记录。

林远坐在旁边喝水。

"苏晚。"

"嗯。"

"今天晚上——你有空吗？"

"你每次这么问都有事。"

"我想带你去一个地方。"

"什么地方？"

"一个——和训练无关的地方。"

苏晚看着他。

"和训练无关？"

"对。纯粹的——私人时间。"

她的笔在纸上停了。

"你说的'训练结束之后的时间是你的'——你要兑现了？"

"对。"

她想了想。

"好。几点？"

林远开车到酒店门口。

苏晚已经在等了。

"去哪？"

"你上车就知道了。"

她上了车。

车开了大约二十分钟。穿过城市的主干道，拐进了一条安静的小路。然后停在了一栋老旧的居民楼前面。

"这里是——？"

"我以前住的地方。"林远说。"我来这个城市的第一个家。和刘虹合租的那间。"

"你带我来看你的旧公寓？"

"不是看公寓。是去天台。"

他带她走上了楼梯。

老旧的楼梯间。水泥墙面。声控灯泡一闪一闪的。每上一层，空气都变得热一些——七月的楼梯间没有空调，热气往上升。

六楼。

然后是通往天台的铁门。

门没锁。和他之前住在这里时一样。

推开门。

天台。

不大。大概五十平米。地面是粗糙的水泥。角落里有几根废弃的晾衣架。边缘有一圈矮矮的围墙。

视野。

整个城市在他们脚下展开。

没有高楼遮挡——这栋楼虽然老旧，但在这个片区是最高的。从天台上可以看到360度的城市全景。

远处的商业区灯火通明。近处的老城区光线柔和。更远处的山脉在夜色里只剩下一条黑色的轮廓线。

天空——

今晚没有云。

星星很多。不像城市中心那样被光污染遮蔽——这个位置刚好在老城区和新城区的交界处，光污染不算严重。

银河——隐约可见。一条模糊的光带横跨天空。

"哇。"苏晚轻轻地说了一声。

和她并肩站着。

风吹过天台。

远处有火车的汽笛声——很远。像另一个世界的回声。

苏晚看着他。

两只手扣在一起。

天台上。

她的手握紧了一点。

林远笑了。

苏晚看着他的笑容。

这次——没有收住。

她笑了很久。

像是某个紧绷了很久很久的弹簧——终于松开了。

风继续吹。

星星继续亮。

城市继续发光。

而在这栋老旧居民楼的天台上——两个人手牵着手。站在边界和无限之间。

什么都没有说。

因为不需要说了。
