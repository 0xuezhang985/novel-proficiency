<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>万物熟练度</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f0e8;
  --text: #333;
  --text-secondary: #888;
  --accent: #b8860b;
  --card-bg: #fff;
  --border: #e0d8c8;
  --shadow: rgba(0,0,0,0.06);
}

.dark {
  --bg: #1a1a1a;
  --text: #ccc;
  --text-secondary: #666;
  --accent: #d4a24e;
  --card-bg: #242424;
  --border: #333;
  --shadow: rgba(0,0,0,0.3);
}

body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
  -webkit-tap-highlight-color: transparent;
}

/* ===== 书架页 ===== */
.bookshelf {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px 16px;
  min-height: 100vh;
}

.bookshelf-header {
  text-align: center;
  padding: 40px 0 30px;
  position: relative;
}

/* ===== 夜间模式开关 ===== */
.night-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 300;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px var(--shadow);
  transition: background 0.3s, border-color 0.3s;
  line-height: 1;
}

.night-toggle:active { opacity: 0.7; }

.bookshelf-header h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 4px;
}

.bookshelf-header .subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
}

.book-info {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 2px 12px var(--shadow);
  margin-bottom: 20px;
}

.book-info .tag {
  display: inline-block;
  font-size: 12px;
  background: var(--accent);
  color: #fff;
  padding: 2px 10px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.book-info .desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.8;
}

.book-info .continue-btn {
  display: block;
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.book-info .continue-btn:active { opacity: 0.8; }

.chapter-list {
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 2px 12px var(--shadow);
  overflow: hidden;
}

.chapter-list-title {
  font-size: 16px;
  font-weight: 600;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}

.chapter-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}

.chapter-item:last-child { border-bottom: none; }
.chapter-item:active { background: var(--border); }

.chapter-item .ch-title {
  font-size: 15px;
  flex: 1;
}

.chapter-item .ch-read {
  font-size: 12px;
  color: var(--accent);
  margin-left: 8px;
  white-space: nowrap;
}

/* ===== 阅读页 ===== */
.reader {
  display: none;
  max-width: 600px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

.reader-topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: transform 0.3s;
}

.reader-topbar.hidden { transform: translateY(-100%); }

.back-btn {
  background: none;
  border: none;
  font-size: 15px;
  color: var(--accent);
  cursor: pointer;
  padding: 4px 8px;
}

.reader-topbar .ch-name {
  font-size: 14px;
  color: var(--text-secondary);
  flex: 1;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin: 0 12px;
}

.reader-content {
  padding: 20px 18px 100px;
}

.reader-content h2 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 28px;
  color: var(--accent);
}

.reader-content p {
  font-size: 17px;
  line-height: 1.9;
  text-indent: 2em;
  margin-bottom: 12px;
}

.reader-content p.system-text {
  text-indent: 0;
  font-weight: 600;
  color: var(--accent);
}

/* 系统面板框 */
.reader-content .system-panel {
  background: linear-gradient(135deg, rgba(184,134,11,0.08), rgba(184,134,11,0.03));
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 14px 16px;
  margin: 16px 0;
  font-family: "Courier New", "Source Code Pro", monospace;
  font-size: 14px;
  line-height: 1.8;
  color: var(--accent);
}
.dark .system-panel { background: linear-gradient(135deg, rgba(212,162,78,0.12), rgba(212,162,78,0.04)); }

.system-panel .panel-title {
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 2px;
  margin-bottom: 8px;
  opacity: 0.7;
}

.system-panel .panel-line {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
}

/* 升级特效文字 */
.reader-content .levelup {
  text-align: center;
  font-weight: 700;
  font-size: 18px;
  color: var(--accent);
  margin: 20px 0;
  padding: 12px;
  background: linear-gradient(90deg, transparent, rgba(184,134,11,0.1), transparent);
  letter-spacing: 2px;
  text-shadow: 0 0 12px rgba(184,134,11,0.3);
}

/* 内心独白 */
.reader-content p.thought {
  text-indent: 0;
  font-style: italic;
  color: var(--text-secondary);
  border-left: 2px solid var(--text-secondary);
  padding-left: 14px;
  margin: 14px 0;
  line-height: 1.8;
}

/* 笔记/备忘录样式 */
.reader-content .notebook {
  background: var(--card-bg);
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 16px 0;
  font-family: "Courier New", "Source Code Pro", monospace;
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
}

.notebook .nb-title {
  font-weight: 700;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

/* 强调段落 */
.reader-content p.emphasis {
  text-indent: 0;
  text-align: center;
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  margin: 24px 0;
  letter-spacing: 1px;
}

/* 时间标记 */
.reader-content .time-stamp {
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin: 24px 0 16px;
  font-family: "Courier New", monospace;
}

/* 数据对比条 */
.reader-content .stat-bar {
  display: flex;
  align-items: center;
  margin: 4px 0;
  font-family: "Courier New", monospace;
  font-size: 13px;
}

.stat-bar .stat-name {
  width: 120px;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.stat-bar .stat-track {
  flex: 1;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  margin: 0 8px;
  overflow: hidden;
}

.stat-bar .stat-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.3s;
}

.stat-bar .stat-val {
  width: 60px;
  text-align: right;
  color: var(--accent);
  font-weight: 600;
}

.reader-content .separator {
  text-align: center;
  font-size: 14px;
  color: var(--text-secondary);
  margin: 28px 0;
  letter-spacing: 8px;
}

.reader-content .end-mark {
  text-align: center;
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

/* ===== 底部导航 ===== */
.reader-bottombar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 600px;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 10px 0;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  z-index: 100;
  transition: transform 0.3s;
}

.reader-bottombar.hidden { transform: translate(-50%, 100%); }

.nav-btn {
  background: none;
  border: none;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 6px;
  transition: background 0.15s;
}

.nav-btn:active { background: var(--border); }
.nav-btn:disabled { color: var(--text-secondary); opacity: 0.4; }

/* ===== 设置面板 ===== */
.settings-panel {
  display: none;
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 568px;
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 -4px 20px var(--shadow);
  padding: 20px;
  z-index: 200;
}

.settings-panel.show { display: block; }

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.setting-row:last-child { margin-bottom: 0; }

.setting-label {
  font-size: 14px;
  color: var(--text-secondary);
}

.setting-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.size-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.size-btn:active { background: var(--border); }

.size-value {
  font-size: 14px;
  min-width: 30px;
  text-align: center;
}

.theme-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
}

.theme-btn.active { border-color: var(--accent); }
.theme-btn[data-theme="light"] { background: #f5f0e8; }
.theme-btn[data-theme="dark"] { background: #1a1a1a; }
.theme-btn[data-theme="green"] { background: #c7edcc; }
.theme-btn[data-theme="blue"] { background: #d4e4f7; }

/* ===== 主题色 ===== */
.green {
  --bg: #c7edcc;
  --text: #2d3a2e;
  --text-secondary: #6a7d6b;
  --card-bg: #d8f2db;
  --border: #b3d9b7;
  --shadow: rgba(0,0,0,0.06);
}

.blue {
  --bg: #d4e4f7;
  --text: #2a3545;
  --text-secondary: #6a7d94;
  --card-bg: #e0ecf8;
  --border: #bdd0e8;
  --shadow: rgba(0,0,0,0.06);
}

/* ===== 进度条 ===== */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: var(--accent);
  z-index: 999;
  transition: width 0.1s;
}

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 0; }

@media (min-width: 601px) {
  .bookshelf, .reader { max-width: 600px; }
}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<!-- ===== 夜间模式按钮 ===== -->
<button class="night-toggle" id="nightToggle" onclick="toggleNight()" aria-label="切换夜间模式">
  <span id="nightIcon">🌙</span>
</button>

<!-- ===== 书架页 ===== -->
<div class="bookshelf" id="bookshelf">
  <div class="bookshelf-header">
    <h1>万物熟练度</h1>
    <div class="subtitle">都市 / 系统 / 逆袭</div>
  </div>

  <div class="book-info">
    <span class="tag">连载中</span>
    <div class="desc">
      林远，24岁，快递分拣员，月薪四千。某天深夜，一个名为"万物熟练度"的系统悄然觉醒——他的每一个行为都被量化为可见的熟练度数值，反复练习即可提升，没有上限。从此，削苹果、搬包裹、做俯卧撑……每一次不起眼的重复，都成了通往蜕变的阶梯。
    </div>
    <button class="continue-btn" id="continueBtn" onclick="continueReading()">继续阅读</button>
  </div>

  <div class="chapter-list">
    <div class="chapter-list-title">目录</div>
    <div id="chapterListContainer"></div>
  </div>
</div>

<!-- ===== 阅读页 ===== -->
<div class="reader" id="reader">
  <div class="reader-topbar" id="topbar">
    <button class="back-btn" onclick="goBack()">← 返回</button>
    <span class="ch-name" id="readerChName"></span>
    <span style="width:50px"></span>
  </div>

  <div class="reader-content" id="readerContent"></div>

  <div class="reader-bottombar" id="bottombar">
    <button class="nav-btn" id="prevBtn" onclick="prevChapter()">上一章</button>
    <button class="nav-btn" onclick="toggleSettings()">设置</button>
    <button class="nav-btn" id="nextBtn" onclick="nextChapter()">下一章</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="setting-row">
      <span class="setting-label">字号</span>
      <div class="setting-controls">
        <button class="size-btn" onclick="changeFontSize(-1)">−</button>
        <span class="size-value" id="fontSizeVal">17</span>
        <button class="size-btn" onclick="changeFontSize(1)">+</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">背景</span>
      <div class="setting-controls">
        <button class="theme-btn active" data-theme="light" onclick="setTheme('light')"></button>
        <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')"></button>
        <button class="theme-btn" data-theme="green" onclick="setTheme('green')"></button>
        <button class="theme-btn" data-theme="blue" onclick="setTheme('blue')"></button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== 章节数据 =====
const chapters = [
{
  title: "第一章 系统觉醒",
  content: `林远觉得自己这辈子就这样了。

二十四岁，大专毕业两年，在城东一家快递站点当分拣员。每天早上六点起床，晚上九点回到那间月租八百的隔断房，累得连泡面都不想泡。

他不是没努力过。

高中时拼命刷题，差本科线十一分。复读一年，差了八分。家里拿不出第二年复读的钱，他去读了大专，学了个"物流管理"。毕业后投了两百多份简历，面试了三十几家公司，最后还是回到了快递站。

不是他不够聪明，也不是他不够勤奋。他只是……普通。

普通到任何事情都比别人慢半拍。别人三天能上手的业务，他要一周。别人随便练练就能过的驾照科目二，他挂了三次。高中同桌随手翻翻书就能考前十，他把课本翻烂了还是中游偏下。

周五晚上九点半，林远拖着酸痛的身体回到出租屋。

今天他搬了一千二百多个包裹。手指上的胶带残胶洗了三遍还是黏糊糊的，腰像是被人打了一锤子。他把外套扔在床上，整个人倒进那张吱呀作响的折叠床里。

手机亮了。

是高中班级群。他本来不想看，但手指划开了屏幕。

"陈嘉豪刚拿了B轮融资，估值两个亿，牛逼啊！"

下面一串恭喜。

陈嘉豪。高中时坐他后排的男生，上课打游戏，考试照样前五。后来去了985，大三开始创业，现在已经是"青年企业家"。

林远盯着屏幕看了几秒，退出了群聊。

不是嫉妒。是那种更深的东西——一种从骨头里渗出来的无力感。就像你站在一条传送带上，拼命跑，脚下的带子却在往后退，你永远跑不到前面去。

他闭上眼。

然后头痛开始了。

不是普通的头痛，是像有什么东西在颅骨内壁上用指甲刮，从后脑勺一直刮到眉心。林远"嘶"了一声，猛地坐起来，双手抱住脑袋。

疼痛持续了大概十几秒，然后戛然而止。

取而代之的，是一行半透明的淡蓝色文字，悬浮在他视野正中央。

【万物熟练度系统已激活】

林远愣了。

他眨了眨眼。那行字还在。

他伸手去碰——手指穿过了文字，什么也摸不到。

"我他妈不会是脑子出问题了吧？"

话音刚落，又一行字弹出来：

【宿主状态正常。系统初始化完成。】

【核心能力：万物皆可量化。宿主的一切行为、技能、知识，均可转化为可视化的熟练度数值。熟练度提升无上限。】

林远坐在床边，一动不动地盯着虚空中的蓝色文字。

他的第一反应不是兴奋，而是恐惧。这要么是幻觉，要么是脑瘤。他掏出手机，打开搜索引擎，输入"突然出现幻觉 看到文字"。

搜索结果加载的瞬间，视野边缘跳出了一个小小的提示：

【检测到行为：信息检索】
【信息检索 Lv.1 — 0/100】
【+1 熟练度】

林远的手指停在了屏幕上。

他又搜了一条。

【信息检索 Lv.1 — 2/100】
【+1 熟练度】

他深吸一口气，放下手机。

好。就算是幻觉，这个幻觉也太有条理了。他决定做一个实验。

林远站起来，走到那张充当餐桌的折叠桌前。桌上放着一把水果刀和两个苹果——昨天超市打折买的。

他拿起刀，开始削苹果。

【检测到行为：刀具操作（削皮）】
【刀具操作 Lv.1 — 0/200】
【+1 熟练度】

果皮断了。他削苹果一直很烂，每次都是坑坑洼洼。

他继续削。第二刀，+1。第三刀，+1。

削完一个苹果，熟练度涨到了12。苹果被他削得像个被狗啃过的土豆。

他开始削第二个。

到第二个苹果削完的时候，熟练度变成了23。他低头看了看手里的苹果——仍然丑，但至少比第一个好一点。皮薄了一些，没有之前那么多深坑。

但这也可能是心理作用。

林远把苹果放下，站到房间中央。隔断房只有六平米，站在中间伸开手臂，两侧都快碰到墙。

他开始做俯卧撑。

【检测到行为：俯卧撑】
【俯卧撑 Lv.1 — 0/50】
【+1 熟练度】

一个。两个。三个。

每做一个，跳一次提示。

他平时的极限是十五个。到第十三个的时候手臂开始发抖，第十五个勉强撑起来，第十六个——

撑不起来了。

他趴在地上喘气，看了眼面板：

【俯卧撑 Lv.1 — 15/50】

没有因为有了系统就突然变成超人。该做不动还是做不动。

这反而让林远安心了一点。如果做了一个俯卧撑就能飞天，那一定是幻觉。但这个系统似乎只是在忠实地记录——他做了什么，做了多少，然后把这些变成一个数字。

他坐起来，靠着墙，开始认真地阅读系统界面。

他发现只要在心里默念"面板"，就能调出一个完整的状态页面：

——

【林远 — 个人面板】

- 到底有没有上限？

【检测到行为：信息检索】
【信息检索 Lv.1 — 3/100】
【+1 熟练度】

林远愣了一下。

记笔记也算信息检索？

不对……他回想了一下，"信息检索"这个技能是昨晚搜索引擎查东西的时候触发的。现在他在备忘录里整理信息、归纳规律——这也算吗？

也许"信息检索"这个名字不够准确。也许它的本质是"信息处理"——搜集、整理、分析信息的能力。

他又打了两行字。+1。

有意思。

【信息检索 Lv.1 — 5/100】

林远收起手机，骑上电动车。夜风从两侧吹过来，带着春天特有的那种潮湿的泥土味，还有远处烧烤摊的烟火气。

他骑得很慢，不是因为累，而是因为他在想事情。

以前他每天下班骑车回家的这二十分钟，脑子里要么是空的，要么在想"明天又要搬多少包裹"。那是一种钝的、灰色的疲惫。

今天不一样。

今天他的脑子里有一张表格，有待验证的假设，有明天要做的实验。

他还想到了一件事——

俯卧撑还差29个就满了。

回到出租屋，洗完澡，林远站在那六平米的房间中央。

九点四十分。身体已经很疲惫了。搬了一整天的包裹，胳膊和腰都在抗议。

但是29个。

他趴下去，开始做。

第一个就很费力。身体跟他说不行了，每一根肌肉纤维都在喊停。

但数字跳了。22/50。

第二个。23。

他咬着牙。每一个俯卧撑之间的间隔越来越长，从两秒变成五秒，从五秒变成十秒。到了第三十个的时候，他的手臂在剧烈发抖，汗水滴在地板上，呼吸粗得像拉风箱。

30/50。还差20个。

今天做不完。

他清楚地知道这一点。不是意志力的问题，是肌肉真的到了极限。如果硬撑，受伤的概率比完成的概率大。

林远趴在地板上，胸口紧贴着冰凉的瓷砖，喘了足足两分钟。

然后他慢慢撑起身体，没有再做下一个。

【俯卧撑 Lv.1 — 30/50】

还差20个。

他擦了擦脸上的汗，坐到床边，拿起了那把水果刀和冰箱里最后一个苹果。

如果身体练不动了，就练别的。

他开始削苹果。这次他比昨晚更认真——刻意放慢速度，尽量让果皮保持连续，控制刀刃入肉的深度。每一刀下去他都在观察：这里削深了，那里角度歪了，手腕应该再稳一点。

【刀具操作 Lv.1 — 24/200】

25，26，27……

一个苹果削完了，果皮断了五次，但比昨天的七次少了两次。苹果的形状也没那么坑洼了，至少像个苹果而不是土豆了。

他把削好的苹果切成四块，慢慢吃掉。甜的，汁水很多。超市打折的苹果，一块五一个，但削干净了吃起来跟五块钱的也没区别。

吃完苹果，他看了一眼面板。

【刀具操作 Lv.1 — 35/200】

他把水果刀洗干净，擦干，放回桌上。

然后他躺到床上，关了灯。

黑暗里，他又调出了面板。五个技能，大部分还在Lv.1，数字小得可怜。最高的"包裹分拣"也才Lv.2，效果是"轻微的记忆增强"。

如果让陈嘉豪看到这个面板，大概会笑出来吧——你的人生面板上最强的技能是"快递分拣"？

但林远没有觉得丢人。

因为他发现了一件事。这一整天，从早上六点到现在，将近十六个小时——他没有一刻觉得自己的时间是被浪费的。

以前那种"在传送带上跑却永远跑不到前面"的感觉消失了。

取而代之的是另一种感觉：他在走一条路。很长很长的路，但每一步都有脚印，每一步都在往前。

他看着黑暗中那些淡蓝色的数字，嘴角不自觉地翘了起来。

然后他想到了一件事。

明天是周六。站里轮休，他不用上班。

一整天的空闲时间。

他可以用来做很多实验。

林远闭上眼睛。这一次，他很快就睡着了。`

  title: "第三章 实验日",
  content: `周六早上八点，林远被阳光晃醒了。

这是两个月以来他第一次睡到自然醒。没有闹钟，没有赵哥的催促，窗外是懒洋洋的春日阳光，隔壁也没有电视的声音——那个合租的外卖小哥周末估计也在补觉。

他躺在床上，第一件事就是调出面板。

【林远 — 个人面板】

信息检索 Lv.1 — 5/100
刀具操作 Lv.1 — 35/200
俯卧撑 Lv.1 — 30/50
包裹分拣 Lv.2 — 38/500
定点投掷 Lv.1 — 1/150

五个技能，静静地排在那里。

林远在心里盘算了一下今天的计划。他有一整天的时间，没有任何安排。这是他拥有系统以来第一个完整的"实验日"。

他要做三件事。

第一，把俯卧撑升到Lv.2。还差20个，今天一定能完成。

第二，尽可能多地触发新技能，验证昨天"意图假说"的边界。

第三，观察不同技能之间有没有关联。

他翻身下床，洗漱完毕，啃了两个馒头，喝了一杯热水。然后站到房间中央，开始做俯卧撑。

经过一晚的休息，身体恢复了不少。前十个做得很流畅，手臂虽然还有些酸，但不像昨晚那样每一个都要拼命。

31，32，33……

到第四十个的时候，肌肉开始抗议了。胳膊发抖，呼吸变粗，额头上渗出汗珠。

他咬牙又做了五个。

【俯卧撑 Lv.1 — 45/50】

还差5个。

他趴在地上喘了一分钟，然后撑起来。

46。

47。

48——胳膊猛地一软，他差点摔在地上，用膝盖撑住了。

休息。两分钟。

49。

浑身都在发抖。但他撑住了。

最后一个。

林远深吸一口气，把注意力集中到手掌和地板的接触面上，两只手慢慢弯曲，胸口贴近地面，然后——

撑起来。

【俯卧撑 Lv.1 — 50/50】

金色的文字再次出现。

【俯卧撑 — 升级！】
【Lv.1 → Lv.2】
【下一级：0/120】

【Lv.2效果：肌肉恢复加速（初级）——运动后肌肉疲劳的恢复速度小幅提升。微弱的肌肉记忆增强。】

林远趴在地上，喘着粗气，嘴角却翘了起来。

肌肉恢复加速。

他立刻注意到了一件事——这个效果不是"做俯卧撑时力量更大"，而是"做完之后恢复得更快"。系统给的增强不是直接加属性，而是优化整个过程的某个环节。

而且"微弱的肌肉记忆增强"这条更有意思。肌肉记忆是什么？就是你做一个动作做多了之后，身体自动记住了最优的发力方式，不需要大脑刻意控制。

换句话说，同样做50个俯卧撑，别人的身体可能需要三个月才能形成肌肉记忆，而他可能只需要……更短的时间。

这不是一个一次性的增强，这是一个加速器。

而且升到Lv.2之后，下一级只需要120。比分拣的500少很多。俯卧撑这种纯体力技能，升级门槛确实更低。

他记下这个数据点，然后站起来。

身体确实还是酸的，但好像……没有昨晚那么酸？是心理作用，还是Lv.2的效果已经开始生效了？

分不清。但这不重要。

===

接下来是今天的重头戏——触发新技能。

林远坐在折叠桌前，摊开手机备忘录，把自己能想到的"可以被改进的行为"列了一个清单：

跑步。打字。做饭。画画。唱歌。看书。下棋。打扫卫生。叠衣服。系鞋带。

他决定从最简单的开始。

首先，打字。

他打开手机的备忘录，认真地开始打一段话。不是随便乱打，而是有意识地追求速度和准确性——他想打得更快，打得更准。

"今天是系统激活的第二天，我要测试尽可能多的技能触发条件……"

【检测到行为：文字输入】
【文字输入 Lv.1 — 0/120】
【+1 熟练度】

成功。

他又打了几行。每一行+1。他注意到"文字输入"而不是"打字"——系统对技能的命名似乎有自己的规则。

接下来，叠衣服。

林远把床上那堆揉成一团的衣服拿出来，认真地叠了起来。他以前叠衣服都是随便对折几下塞进柜子，但这次他有意识地想着"要叠整齐"。

【检测到行为：衣物整理】
【衣物整理 Lv.1 — 0/80】
【+1 熟练度】

80就能升级。果然，越日常、越简单的技能，门槛越低。

然后他扫了地。六平米的房间不需要扫多久，但他认真地把每个角落都扫到了。

【检测到行为：清洁打扫】
【清洁打扫 Lv.1 — 0/100】
【+1 熟练度】

三个新技能，不到二十分钟。

他越来越兴奋。但他强迫自己冷静下来。开新技能很容易，关键是——开了之后有什么用？每个技能升到Lv.2才能获得效果增强。而升级需要大量重复。

如果他什么都练，结果就是什么都是Lv.1，什么增强都没有。

质量还是数量？

他在备忘录上写下了这个问题，然后画了一条线，在线的两边分别写了两个策略：

策略A：广撒网。尽量开更多技能，期待某些技能之间产生组合效应。
策略B：深挖掘。集中精力把少数技能练到高等级，先把单个技能的增强效果吃透。

目前信息太少，他无法判断哪个更优。但直觉告诉他，两个都需要。

先广撒网，找到那些有潜力的技能；然后深挖掘，把有潜力的技能练上去。

【信息检索 Lv.1 — 7/100】

连分析策略都算信息检索。这个技能的触发范围比他想象的还广。

===

上午十点，林远出了门。

他不打算在那六平米的房间里待一整天。外面有更大的世界，有更多的技能等着他去触发。

第一站，小区楼下的空地。

准确地说，是一块被居民自发改造成健身角的空地。两副单杠，一个石桌石凳，地上画了几个跳房子的格子，已经被踩得看不太清了。

林远走到单杠前，双手握住横杆，试着把自己拉上去。

他上一次做引体向上大概是高中体测的时候。那时候他勉强能做三个。现在嘛——

他挣扎着拉了一下，下巴刚到横杆的高度，手臂就撑不住了，整个人又掉了下来。

但提示跳出来了。

【检测到行为：引体向上】
【引体向上 Lv.1 — 0/80】
【+1 熟练度】

他又试了两次。第二次勉强过了杆，第三次只拉到一半就掉了。

3/80。

引体向上的升级门槛也是80，跟衣物整理一样。但做一个引体向上的难度比叠一件衣服高多了。这说明升级门槛不完全跟"难度"挂钩，可能更多跟"复杂度"有关——引体向上虽然吃力，但动作模式单一；而包裹分拣需要识别、判断、搬运、投放，所以门槛更高。

又一个数据点。

他在空地上还做了几组深蹲和开合跳，分别触发了"深蹲"和"跳跃"两个新技能。门槛分别是60和70。

然后他沿着小区的步道跑了一圈，大概八百米。

【检测到行为：跑步】
【跑步 Lv.1 — 0/100】
【+1 熟练度】

跑步这个技能有点特殊。他发现每跑大约一百米，熟练度就+1。不是按"次数"计算的，而是按某种"有效距离"或"持续时间"计算的。

他跑了三圈，大概两千四百米。跑完气喘吁吁，大腿发酸。

【跑步 Lv.1 — 24/100】

这时候已经快十一点了。他坐在石凳上休息，调出面板看了看：

【林远 — 个人面板】

信息检索 Lv.1 — 8/100
刀具操作 Lv.1 — 35/200
俯卧撑 Lv.2 — 0/120
包裹分拣 Lv.2 — 38/500

清洁打扫 Lv.1 — 1/100
引体向上 Lv.1 — 3/80
深蹲 Lv.1 — 15/60
跳跃 Lv.1 — 8/70
跑步 Lv.1 — 24/100

十二个技能。

一个上午，从五个变成了十二个。面板变得拥挤了起来，但看着那些整整齐齐的数字，林远有一种说不出的满足感。

不过他注意到了一个问题——技能列表是按照获得顺序排列的，没有分类。如果以后技能变成几十个甚至上百个，找起来会很麻烦。

他试着在心里想"分类"这个词。

没有反应。

又试了"排序"。

还是没有。

看来面板的功能目前就是这样，不支持自定义。也许等级更高之后会解锁新功能？又一个未知数。

===

中午，林远在路边的兰州拉面馆吃了一碗牛肉面。九块钱，加了个鸡蛋。

他坐在塑料凳上吸溜面条的时候，突然想到一件事。

吃饭算不算技能？

他放慢了速度，认真地感受了一下筷子夹面条的过程。左手端碗，右手用筷子把面条挑起来，送到嘴里，吸入，咀嚼。

没有提示。

他又试了一次，这次集中注意力想着"我要把筷子用得更好"。

还是没有。

吃饭太本能了？还是说，"吃饭"这个行为无法被"改进"——你不可能把饭吃得"更好"？

但是……厨师呢？品酒师呢？他们的"吃"就是一种可以精进的技能。

也许不是"吃饭"不行，而是他的目标太模糊了。"把筷子用得更好"——更好是什么意思？更快？更准？更优雅？

他换了一个思路。

林远拿起筷子，夹起碗里的一片牛肉薄片——很薄，很滑，在面汤里飘来飘去。他集中注意力，想着"我要一次夹起这片肉，不掉"。

筷子合拢，夹住肉片，提起——

肉片滑落，掉回碗里。

没有提示。

他皱了皱眉，又试了一次。这次夹住了，但在提到嘴边的半路上又滑了。

第三次。他调整了筷子的角度，用筷子尖而不是筷子肚去夹，手指略微用力——

夹住了。送到嘴里。没掉。

【检测到行为：精细操作（筷子）】
【精细操作 Lv.1 — 0/200】
【+1 熟练度】

林远差点被面条呛到。

精细操作！

不是"吃饭"，不是"使用筷子"，而是"精细操作"——后面括号里标注了"筷子"，说明这是一个大类技能下的子分支。

而且注意门槛：200。跟"刀具操作"一样。

他立刻想到——"刀具操作"会不会也是"精细操作"的一个子分支？

他看了看面板。"刀具操作"和"精细操作"是两个独立的条目，各有各的进度。但它们的升级门槛一样，名字也有相似性。

如果它们之间有某种关联……

他暂时没法验证，但把这个猜想记在了备忘录里。

===

下午两点，林远来到了离出租屋最近的一家公共图书馆。

说是图书馆，其实就是街道社区服务中心二楼的一个阅览室，面积不大，书也不多，但有空调。周六下午人不多，只有几个老人在看报纸，一个戴眼镜的中学生在写作业。

林远在书架前站了一会儿，最后抽出一本《五分钟速写入门》。他从没学过画画，连火柴人都画不好。

他找了个空位坐下，翻开书，照着第一页的示范开始画。

一支铅笔，一张纸。画的是一个圆——书上说，所有速写的基础都是线条和形状，先学画圆。

他的圆歪歪扭扭，像个被坐扁了的鸡蛋。

【检测到行为：绘画】
【绘画 Lv.1 — 0/300】
【+1 熟练度】

300。绘画的门槛是300，跟包裹分拣一样高。

这说明绘画在系统的评估体系里是一个"高复杂度"技能。想想也对——绘画涉及手眼协调、空间感知、线条控制、审美判断，远比做俯卧撑复杂得多。

林远在那张纸上画了一个又一个圆。大的，小的，快的，慢的。二十分钟后，纸上密密麻麻全是圆圈，像一张月球表面的照片。

【绘画 Lv.1 — 23/300】

他的圆还是不圆。但比最开始的鸡蛋好了一点——至少首尾能接上了。

然后他翻到下一页，开始画直线。横线，竖线，对角线。书上说，画出又直又匀的线条是速写的基本功。

他画的线条跟蛇走过的路一样弯弯曲曲。但每一条线都是+1。

在图书馆待了两个小时。除了画画，他还做了另一件事——阅读。

他拿了一本关于物流行业的书，认认真真地看了五十多页。不是那种"翻一翻就放下"的看法，而是带着"我要理解这个行业的运作逻辑"的目的去读的。

【检测到行为：阅读理解】
【阅读理解 Lv.1 — 0/150】
【+1 熟练度】

又一个新技能。门槛150。

他注意到"信息检索"和"阅读理解"是两个不同的技能。信息检索偏向搜集和整理，阅读理解偏向深度消化。

系统对技能的分类比他想象的更细致。

===

下午四点半，林远走出图书馆。

阳光还很好，街道上人来人往。他站在路边，掏出手机看了一眼面板——十四个技能了。

林远请了半天假，坐公交过去的。他特意穿了一件干净的衬衫——去年过年老妈寄来的，一直没穿过。

仓库比他想象的大。是一个标准的钢结构厂房，面积大概是他们快递站的十倍。里面分了好几个区域——入库区、分拣区、出库区、暂存区。有传送带，有叉车，有十几个工人在忙碌。

张经理在办公室等他。四十岁左右，戴眼镜，说话很快。

"坐，喝水。"

林远坐下。

"赵站长跟我说了你的情况。干了两年快递分拣，最近进步很快。上周你们站里的内部赛，他说你一周之内把速度提升了50%以上。"

"是。"

"我需要的不是分拣速度最快的人。"张经理推了推眼镜，"我需要的是一个能理解分拣流程、能优化排班、能管理人员的调度。你知道调度是干什么的吗？"

"安排什么时候干什么活，谁干什么活。"

"差不多。但不只是排个班表那么简单。我们这个仓库一天处理八千到一万件包裹。高峰期的订单量是平时的三到五倍。怎么在高峰期不崩溃，怎么在低谷期不浪费人力，这才是调度的核心。"

林远点了点头。

张经理带他参观了仓库。走一圈大概花了二十分钟。林远一边走一边看，一边在心里默默记录。

{{T: 入库区有两个卸货口，同时只能卸两辆车。如果三辆车同时到，第三辆要等。等待时间越长，下游分拣压力越大。}}

{{T: 分拣区的布局跟我们站里差不多，但大了四五倍。十二个格口变成了三十六个。分拣员有十个人，但分布不均匀——靠近传送带的区域人多，远端的区域只有两个人。}}

{{T: 出库区有一个明显的瓶颈——称重和贴标签的环节只有一台机器，所有包裹都要排队过。}}

他没有说出来，但这些观察被自动整理成了一张流程图储存在了脑子里。

信息检索Lv.2的"信息关联增强"在工作。

张经理走完一圈，回到办公室，问他："你觉得我们仓库有什么问题？"

林远想了三秒。

"出库区的称重贴标是瓶颈。前面分拣再快，到这里都得排队。如果加一台设备或者增加一个人工称重的工位，出库效率至少能提升30%。"

张经理看了他一眼。那个眼神林远见过——赵哥和唐峰都用过类似的眼神。行家打量新人时的那种目光。

"你怎么看出来的？"

"走的时候看了一下各个环节的包裹堆积量。入库区和分拣区的堆积量都不大，说明处理速度够快。但出库区前面堆了大概两三百件等待称重，说明上游来的速度比这里消化的速度快。"

张经理沉默了几秒，然后笑了。

"赵站长没说错。你确实有点东西。"

"月薪六千，五险，每月八号发。试用期三个月，试用期薪资一样。你什么时候能来？"

===

回去的路上，林远没有坐公交。他跑回去的。

六公里，跑了二十八分钟。到快递站的时候，正好赶上下午的分拣。他换了工服，照常干活。

但脑子里一直在想那个仓库。

调度岗位意味着什么？

意味着他不用再每天搬一千多个包裹了。但也意味着他需要学习一大堆新东西——排班、人员管理、数据分析、流程优化。

从系统的角度来看，这是一个巨大的"技能池扩张"机会。调度工作可能触发的技能：

{{NOTE}}
## 新岗位可能触发的技能
- 人员管理 / 沟通协调
- 数据分析（进阶版的信息检索？）
- 流程优化（可能是全新技能）
- 排班规划（策略类技能）
- 应急处理（突发情况应对）
- 口头表达 / 汇报
{{/NOTE}}

至少六个潜在新技能。而且这些是"认知类"和"管理类"技能——跟体能类完全不同的赛道。

他做了一个决定：接受这份工作。

但不是立刻。他打算在快递站再干两周，把手头的技能推到一个满意的阶段，然后再跳过去。

他需要跟赵哥谈谈。

===

下班后，林远找到了赵哥。

赵哥在他那个纸板隔出来的小办公室里，正在填什么表格。

"赵哥，我想跟您说个事。"

赵哥抬头。"张经理的事？"

"您知道了。"

"废话，是我推荐你的。"赵哥放下笔，靠回椅子，"你去吧。在这站里分拣一辈子没意思。"

"我想再干两周。"

赵哥皱了皱眉。"为什么？"

"我想把手里的活交接好。您帮我带的这些，我不想走得太急。"

这不完全是真话。但也不完全是假话。

赵哥看了他几秒，然后点了点头。

"行。两周后走。这两周你抓紧把投掷的手法教教张磊和小孙他们。你走了之后，站里不能没人会扔件。"

"好。"

林远转身要走的时候，赵哥在后面说了一句。

"小林。"

"嗯？"

"你最近变化挺大的。不知道你怎么做到的，但挺好的。继续。"

赵哥说完低头继续填表格了。

林远站在门口，喉咙有点紧。

他从来没有被一个"领导"这样肯定过。高中的时候班主任说他"努力但不聪明"。大专的时候导员连他名字都记不住。

而赵哥——一个快递站站长，一个曾经日分三千件的分拣高手——说他"挺好的"。

{{T: 这两个字比任何系统提示都让他心跳加速。}}

他走出棚子，站在夜色里，深吸了一口气。

然后开始跑步回家。

四公里的路，他跑得飞快。

【跑步 Lv.2 — 203/250】`

  title: "第十五章 传授",
  content: `{{TIME: 第四周 · 周四至第五周 · 周三}}

接下来的两周，林远的日子被分成了两个部分。

白天在快递站，他做两件事：分拣，和教人。

赵哥让他教张磊和小孙投掷分拣的手法。张磊是之前找他学过一次的那个，小孙是今年刚来的新人，比林远还年轻两岁。

教人比他想象的难。

他以为只要把赵哥教他的那句话——"手肘固定，手腕拨"——传递下去就行了。但当他看着张磊做的时候，他发现不行。

张磊的问题不是手腕不会拨。而是他站的位置不对——离格口太近了，没有给抛物线留足够的空间。

小孙的问题又不一样。小孙的手腕力量不够，拨出去的包裹飞行距离太短。他需要的不是"手腕拨"，而是先把手腕力量练上来。

同一个技能，不同的人卡在不同的环节。

{{T: 我以前以为教学就是"告诉别人怎么做"。现在才知道，教学的核心是"看出别人卡在哪里"。}}

他开始观察每个人的动作，找到他们各自的短板，然后给出针对性的建议。

对张磊："退后一步。你太近了，包裹还没形成抛物线就到了。"

对小孙："先别扔远的。两米以内开始，把手腕的感觉找到再加距离。"

效果出来了。一周之后，张磊的命中率从50%提升到了75%。小孙从完全扔不进，到了两米以内60%的命中率。

【口头教学 Lv.1 — 67/200】

涨得不快——教学不像分拣那样可以大量重复。但每一次有效的教学互动都+1。

而且他发现了一件有趣的事：教别人的时候，他自己的理解也在加深。

有一次他在帮张磊纠正姿势的时候，突然意识到一个他自己以前没有注意到的细节——投掷时，脚尖的朝向会影响手臂的发力方向。脚尖朝着格口，投出去的包裹更容易走直线。

他试了一下。果然。

【定点投掷 Lv.2 — 312/350】

教学不仅是在帮别人，也是在帮自己。

===

工作之外的两周也没有闲着。

每周二、四、六去拳馆。唐峰的课从"打空气"进阶到了"打靶"。

打靶就是教练拿着一对手靶，你对着靶面打拳。靶面是活动的——教练会移动位置、变换角度，你要在移动中找到目标打上去。

比打空气难了一个数量级。

打空气的时候你可以慢慢来，随便打。打靶要求速度、准确、力量，三者缺一不可。唐峰举靶的时候，如果你打得太慢，他会把靶收回去："太慢了，打空了。"

前几次课林远打得很狼狈。不是打偏就是打慢，偶尔打到了力量又不够——拳头砸在靶面上发出一声"啪"的闷响，跟唐峰示范时那种清脆的"啪！"完全不同。

但他在进步。每一堂课都在进步。

直拳到了165/200。组合拳到了94/300。格斗站架到了152/200。

而且他发现了一个现象——打靶的时候，他的"定点投掷"和"移动投掷"的经验在起作用。

投掷的本质是什么？判断距离→控制力度→在移动中命中目标。

打靶的本质是什么？判断距离→控制力度→在移动中命中目标。

底层逻辑几乎一模一样。

深蹲Lv.3的"爆发力感知"让他出拳更有爆发力。跑步Lv.2的"心肺耐力"让他打三个回合不气喘吁吁。俯卧撑Lv.3的"核心力量感知"让他的腰部旋转更有力。

所有以前积累的体能技能都在格斗中汇合了。

{{EM: 格斗，是他目前所有技能的最佳交汇点。}}

唐峰注意到了他的进步速度。

第三堂课结束后，唐峰叫住了他。

"你除了来这儿，平时自己有练？"

"每天跑步，做俯卧撑和深蹲。回家也会练拳。"

"嗯。"唐峰拿毛巾擦了擦汗，"你的基础出拳已经可以了。下周开始教你踢。"

踢。腿法。

林远的心跳加速了。

新技能。

===

{{TIME: 第五周 · 周三 · 最后一天}}

这是林远在快递站的最后一天。

早上他提前十分钟到，把自己工位周围收拾了一下。没什么东西——一副手套，一个水杯，一卷他自己买的胶带。

分拣的时候他特别认真。每一个包裹都处理得干净利落。

他看了一眼面板。

{{PANEL}}
## 包裹分拣
Lv.3 | 687/800
{{/PANEL}}

还差113就Lv.4。但他不会在这里等到Lv.4了。

下午五点，分拣结束。赵哥没有搞什么欢送仪式——快递站不兴这个。但他让老周和李萌提前十分钟收工。

几个人站在棚子外面。

老周递了一根烟过来。林远不抽烟，但他接了。没点，夹在手指间。

"到了新地方好好干。"老周说，"干不下去了随时回来。"

"谢周哥。"

李萌站在旁边，沉默了一会儿，然后递过来一个塑料袋。

"给你的。搬家礼物。"

林远打开一看——一把水果刀。比他现在用的好很多，刀刃更薄更亮，手柄是防滑的。

"你不是天天削苹果吗。用好一点的刀。"

林远看了看刀，又看了看李萌。

"谢谢。"

"走了啊。"李萌转身就走了，马尾辫在脑后晃了晃。

赵哥最后走过来，拍了一下他的肩膀。

"好好干。"

没有多余的话。赵哥从来不说多余的话。

林远把东西装进背包，走出了快递站。

站在巷子口，他回头看了一眼那个两层铁皮棚子。夏天像蒸笼，冬天像冰窖。他在这里待了两年零三个月。

两年前他走进这里的时候，什么都不会。

现在他走出来的时候——

他看了一眼面板。二十一个技能。最高的"包裹分拣"Lv.3。五个Lv.2。三个Lv.3。

这些数字不会显示在简历上。没有人会知道他有一个系统。

但数字不会骗人。

他转身，开始跑步。

不是跑回出租屋。是跑向城东开发区的方向。

明天开始，新的工作，新的技能，新的起点。

四公里变成了六公里。但他跑得很轻松。

【跑步 Lv.2 — 241/250】

快了。

还差九公里。`

  title: "第十六章 调度员林远",
  content: `{{TIME: 第五周 · 周四 · 新工作第一天}}

张经理带他做了简单的入职流程，然后把他交给了仓库主管老马。

而且他发现了一个有趣的现象——"口头沟通"和"口头教学"是两个不同的技能。教学的核心是"让对方理解一个技能"，沟通的核心是"让对方接受一个决定"。

===

新工作的收入变化也很明显。

第一个月的工资到账——六千整。扣掉五险个人部分大概五六百，到手五千四左右。

比快递站多了一千四。

他坐在出租屋里，看着银行卡余额，做了一个决定：

续费拳馆。四百八一个月。

然后他算了一下——每月到手五千四，房租八百，伙食费一千二（自己做饭后降低了），拳馆四百八，交通和杂项五百。

每月能存两千四。

// ===== 状态管理 =====
const STATE_KEY = 'novel_reader_state';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STATE_KEY)) || {};
  } catch { return {}; }
}

function saveState(patch) {
  const state = { ...loadState(), ...patch };
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

// ===== 初始化 =====
let currentChapter = 0;
let fontSize = 17;
let theme = 'light';
let barsVisible = true;
let settingsVisible = false;

function init() {
  const state = loadState();
  currentChapter = state.chapter || 0;
  fontSize = state.fontSize || 17;

  // 首次访问跟随系统暗色偏好
  if (!state.theme && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    theme = 'dark';
  } else {
    theme = state.theme || 'light';
  }

  applyTheme(theme);
  applyFontSize(fontSize);
  renderChapterList();
  updateContinueBtn();
}

// ===== 书架 =====
function renderChapterList() {
  const state = loadState();
  const lastRead = state.chapter || 0;
  const container = document.getElementById('chapterListContainer');
  container.innerHTML = chapters.map((ch, i) => `
    <div class="chapter-item" onclick="openChapter(${i})">
      <span class="ch-title">${ch.title}</span>
      ${i === lastRead ? '<span class="ch-read">上次读到</span>' : (i < lastRead ? '<span class="ch-read" style="color:var(--text-secondary)">已读</span>' : '')}
    </div>
  `).join('');
}

function updateContinueBtn() {
  const state = loadState();
  const ch = state.chapter || 0;
  const btn = document.getElementById('continueBtn');
  btn.textContent = ch > 0 ? `继续阅读 · ${chapters[ch].title}` : `开始阅读`;
}

function continueReading() {
  const state = loadState();
  openChapter(state.chapter || 0);
}

// ===== 阅读 =====
function openChapter(index) {
  if (index < 0 || index >= chapters.length) return;
  currentChapter = index;
  saveState({ chapter: index });

  const ch = chapters[index];
  document.getElementById('readerChName').textContent = ch.title;

  // 渲染内容
  const content = document.getElementById('readerContent');
  let html = `<h2>${ch.title}</h2>`;

  const paragraphs = ch.content.split('\n').filter(line => line.trim() !== '');

  let i = 0;
  while (i < paragraphs.length) {
    const trimmed = paragraphs[i].trim();

    // 分隔线
    if (trimmed === '===') {
      html += '<div class="separator">* * *</div>';
    } else if (trimmed === '——') {
      html += '<div class="separator">——</div>';

    // 时间标记 {{TIME: ...}}
    } else if (trimmed.startsWith('{{TIME:') && trimmed.endsWith('}}')) {
      html += `<div class="time-stamp">${escapeHtml(trimmed.slice(7, -2).trim())}</div>`;

    // 升级特效 {{LEVELUP: ...}}
    } else if (trimmed.startsWith('{{LEVELUP:') && trimmed.endsWith('}}')) {
      html += `<div class="levelup">${escapeHtml(trimmed.slice(10, -2).trim())}</div>`;

    // 强调段 {{EM: ...}}
    } else if (trimmed.startsWith('{{EM:') && trimmed.endsWith('}}')) {
      html += `<p class="emphasis">${escapeHtml(trimmed.slice(5, -2).trim())}</p>`;

    // 内心独白 {{T: ...}}
    } else if (trimmed.startsWith('{{T:') && trimmed.endsWith('}}')) {
      html += `<p class="thought">${escapeHtml(trimmed.slice(4, -2).trim())}</p>`;

    // 系统面板块 {{PANEL}} ... {{/PANEL}}
    } else if (trimmed === '{{PANEL}}') {
      let panelHtml = '<div class="system-panel">';
      i++;
      while (i < paragraphs.length && paragraphs[i].trim() !== '{{/PANEL}}') {
        const line = paragraphs[i].trim();
        if (line.startsWith('##')) {
          panelHtml += `<div class="panel-title">${escapeHtml(line.slice(2).trim())}</div>`;
        } else if (line.includes('|')) {
          const parts = line.split('|');
          panelHtml += `<div class="panel-line"><span>${escapeHtml(parts[0].trim())}</span><span>${escapeHtml(parts[1].trim())}</span></div>`;
        } else {
          panelHtml += `<div>${escapeHtml(line)}</div>`;
        }
        i++;
      }
      panelHtml += '</div>';
      html += panelHtml;

    // 笔记块 {{NOTE}} ... {{/NOTE}}
    } else if (trimmed === '{{NOTE}}') {
      let noteHtml = '<div class="notebook">';
      i++;
      while (i < paragraphs.length && paragraphs[i].trim() !== '{{/NOTE}}') {
        const line = paragraphs[i].trim();
        if (line.startsWith('##')) {
          noteHtml += `<div class="nb-title">${escapeHtml(line.slice(2).trim())}</div>`;
        } else {
          noteHtml += `<div>${escapeHtml(line)}</div>`;
        }
        i++;
      }
      noteHtml += '</div>';
      html += noteHtml;

    // 进度条 {{BAR: 名称 | 当前/总数}}
    } else if (trimmed.startsWith('{{BAR:') && trimmed.endsWith('}}')) {
      const inner = trimmed.slice(6, -2).trim();
      const parts = inner.split('|');
      if (parts.length === 2) {
        const name = parts[0].trim();
        const val = parts[1].trim();
        const nums = val.match(/(\d+)\/(\d+)/);
        const pct = nums ? (parseInt(nums[1]) / parseInt(nums[2]) * 100) : 0;
        html += `<div class="stat-bar"><span class="stat-name">${escapeHtml(name)}</span><div class="stat-track"><div class="stat-fill" style="width:${pct}%"></div></div><span class="stat-val">${escapeHtml(val)}</span></div>`;
      }

    // 系统文字（【...】开头）
    } else if (trimmed.startsWith('【')) {
      html += `<p class="system-text">${escapeHtml(trimmed)}</p>`;

    // 普通段落（支持行内标记）
    } else {
      let text = escapeHtml(trimmed);
      // 行内加粗 **...**
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // 行内强调色 !!...!!
      text = text.replace(/!!(.+?)!!/g, '<span style="color:var(--accent);font-weight:600">$1</span>');
      html += `<p>${text}</p>`;
    }
    i++;
  }

  html += `<div class="end-mark">— 本章完 —</div>`;
  content.innerHTML = html;

  // 切换视图
  document.getElementById('bookshelf').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  document.getElementById('progressBar').style.width = '0%';

  // 更新按钮状态
  document.getElementById('prevBtn').disabled = (index === 0);
  document.getElementById('nextBtn').disabled = (index === chapters.length - 1);

  // 恢复滚动位置
  const state = loadState();
  const scrollKey = `scroll_${index}`;
  if (state[scrollKey]) {
    setTimeout(() => window.scrollTo(0, state[scrollKey]), 50);
  } else {
    window.scrollTo(0, 0);
  }

  barsVisible = true;
  settingsVisible = false;
  document.getElementById('settingsPanel').classList.remove('show');
}

function goBack() {
  saveScrollPos();
  document.getElementById('bookshelf').style.display = 'block';
  document.getElementById('reader').style.display = 'none';
  document.getElementById('progressBar').style.width = '0%';
  renderChapterList();
  updateContinueBtn();
  window.scrollTo(0, 0);
}

function prevChapter() { openChapter(currentChapter - 1); }
function nextChapter() { openChapter(currentChapter + 1); }

// ===== 保存滚动位置 =====
function saveScrollPos() {
  saveState({ [`scroll_${currentChapter}`]: window.scrollY });
}

let scrollTimer;
window.addEventListener('scroll', () => {
  // 更新进度条
  if (document.getElementById('reader').style.display === 'block') {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = docHeight > 0 ? (scrollTop / docHeight * 100) : 0;
    document.getElementById('progressBar').style.width = progress + '%';
  }

  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(saveScrollPos, 300);
});

// ===== 点击切换顶栏底栏 =====
document.addEventListener('click', (e) => {
  if (document.getElementById('reader').style.display !== 'block') return;
  if (e.target.closest('.reader-topbar, .reader-bottombar, .settings-panel, .nav-btn, .back-btn, .size-btn, .theme-btn')) return;

  barsVisible = !barsVisible;
  document.getElementById('topbar').classList.toggle('hidden', !barsVisible);
  document.getElementById('bottombar').classList.toggle('hidden', !barsVisible);
  if (!barsVisible) {
    settingsVisible = false;
    document.getElementById('settingsPanel').classList.remove('show');
  }
});

// ===== 设置 =====
function toggleSettings() {
  settingsVisible = !settingsVisible;
  document.getElementById('settingsPanel').classList.toggle('show', settingsVisible);
}

function changeFontSize(delta) {
  fontSize = Math.max(14, Math.min(24, fontSize + delta));
  applyFontSize(fontSize);
  saveState({ fontSize });
}

function applyFontSize(size) {
  document.getElementById('fontSizeVal').textContent = size;
  document.querySelectorAll('.reader-content p').forEach(p => p.style.fontSize = size + 'px');
  // 也存到 CSS 变量上，让新渲染的内容也生效
  document.documentElement.style.setProperty('--reader-font-size', size + 'px');
}

function setTheme(t) {
  theme = t;
  applyTheme(t);
  saveState({ theme: t });
}

function applyTheme(t) {
  document.body.className = t === 'light' ? '' : t;
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === t);
  });
  updateNightIcon(t);
}

function toggleNight() {
  if (theme === 'dark') {
    // 切回上次的非暗黑主题，默认米黄
    const state = loadState();
    const prev = state.prevTheme || 'light';
    setTheme(prev);
  } else {
    saveState({ prevTheme: theme });
    setTheme('dark');
  }
}

function updateNightIcon(t) {
  const icon = document.getElementById('nightIcon');
  if (icon) icon.textContent = t === 'dark' ? '☀️' : '🌙';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== 启动 =====
init();
</script>
